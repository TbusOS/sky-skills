          <rect x="16" y="140" width="528" height="52" rx="8" class="glass-svg-node"/>
          <text x="28" y="170" font-family="'Inter', sans-serif" font-size="13.5" font-weight="600" class="glass-svg-ink">payload — column-coded key/value pairs</text>
          <text x="16" y="222" font-family="'JetBrains Mono', monospace" font-size="11.5" letter-spacing="1.5" class="glass-svg-ink-3">SHARD FIELD ROUTES WITHOUT PARSING THE PAYLOAD</text>
