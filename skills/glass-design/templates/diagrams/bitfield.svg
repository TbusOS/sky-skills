<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Event envelope wire format: a 128-bit header in five fields, then the payload" viewBox="0 0 560 240">
  <style>
    /* Standalone preview values = glass dark theme. When pasted into a glass
       page, DELETE this style block — glass.css provides these classes with
       theme-switching tokens (.glass-svg-* / light mode safe). */
    .glass-svg-ink   { fill: #F4F7FF; }
    .glass-svg-ink-2 { fill: rgba(231,238,255,0.74); }
    .glass-svg-ink-3 { fill: rgba(231,238,255,0.55); }
    .glass-svg-node  { fill: rgba(255,255,255,0.06); stroke: rgba(255,255,255,0.14); }
    .glass-svg-node-strong { fill: rgba(255,255,255,0.05); stroke: #22D3EE; }
    .glass-svg-line  { stroke: rgba(255,255,255,0.08); }
    .glass-svg-grid  { stroke: rgba(255,255,255,0.08); stroke-dasharray: 2 6; }
    .glass-svg-accent-ink { fill: #22D3EE; }
  </style>
  <rect width="100%" height="100%" fill="#0B1020"/>
          <text x="16" y="40" font-family="'JetBrains Mono', monospace" font-size="11.5" letter-spacing="1.5" class="glass-svg-ink-3">128-BIT HEADER · LITTLE ENDIAN</text>
          <rect x="16" y="60" width="168" height="52" class="glass-svg-node"/>
          <rect x="184" y="60" width="128" height="52" class="glass-svg-node"/>
          <rect x="312" y="60" width="88" height="52" class="glass-svg-node-strong"/>
          <rect x="400" y="60" width="80" height="52" class="glass-svg-node"/>
          <rect x="480" y="60" width="64" height="52" class="glass-svg-node"/>
          <g font-family="'JetBrains Mono', monospace" font-size="12" font-weight="600" class="glass-svg-ink">
            <text x="28" y="82">timestamp</text>
            <text x="196" y="82">stream id</text>
            <text x="322" y="82">shard</text>
            <text x="410" y="82">flags</text>
            <text x="488" y="82">crc</text>
          </g>
          <g font-family="'JetBrains Mono', monospace" font-size="11" class="glass-svg-ink-3">
            <text x="28" y="100">48</text>
