<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Deploy rollout timeline: canary, two waves, full fleet across ninety minutes" viewBox="0 0 560 240">
  <style>
    /* Standalone preview values = glass dark theme. When pasted into a glass
