<!-- glass-design diagram template · hierarchy · paste into a glass page and delete the embedded <style> + background rect (glass.css provides the classes; the page provides the canvas). Craft rules: diagram-craft.md -->
<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Hierarchy: a research coordinator fans out to two search workers and two analysis workers; tint encodes the lane and partial results merge back into one answer" viewBox="0 0 1240 396">
  <style>
    /* Standalone preview values = glass dark theme. When pasted into a glass
       page, DELETE this style block — glass.css provides these classes with
       theme-switching tokens (.glass-svg-* / light mode safe). */
    .glass-svg-ink   { fill: #F4F7FF; }
    .glass-svg-ink-2 { fill: rgba(231,238,255,0.74); }
    .glass-svg-ink-3 { fill: rgba(231,238,255,0.55); }
    .glass-svg-node  { fill: rgba(255,255,255,0.06); stroke: rgba(255,255,255,0.14); }
    .glass-svg-node-strong { fill: rgba(255,255,255,0.05); stroke: #22D3EE; }
    .glass-svg-node--cyan { fill: rgba(34,211,238,0.10); stroke: rgba(34,211,238,0.50); }
    .glass-svg-node--indigo { fill: rgba(129,140,248,0.12); stroke: rgba(129,140,248,0.50); }
    .glass-svg-line  { stroke: rgba(255,255,255,0.08); }
    .glass-svg-grid  { stroke: rgba(255,255,255,0.08); stroke-dasharray: 2 6; }
    .glass-svg-accent-ink { fill: #22D3EE; }
    .glass-svg-ref-ink { fill: #818CF8; }
  </style>
  <rect width="100%" height="100%" fill="#0B1020"/>
        <text x="24" y="36" font-family="'JetBrains Mono', monospace" font-size="11.5" letter-spacing="1.5" class="glass-svg-ink-3">ONE COORDINATOR · FOUR WORKERS · FAN OUT, MERGE BACK</text>

        <!-- fan-out connectors -->
        <path d="M540 132 L540 168 L170 168 L170 240" stroke="#22D3EE" stroke-width="2" fill="none"/>
        <path d="M590 132 L590 192 L470 192 L470 240" stroke="#22D3EE" stroke-width="2" fill="none"/>
        <path d="M650 132 L650 192 L770 192 L770 240" stroke="#22D3EE" stroke-width="2" fill="none"/>
        <path d="M700 132 L700 168 L1070 168 L1070 240" stroke="#22D3EE" stroke-width="2" fill="none"/>

        <!-- coordinator (focus) -->
        <rect x="470" y="56" width="300" height="76" rx="16" class="glass-svg-node-strong"/>
        <text x="494" y="88" font-family="'Inter', sans-serif" font-size="15" font-weight="600" class="glass-svg-ink">Coordinator</text>
        <text x="494" y="110" font-family="'Inter', sans-serif" font-size="12" class="glass-svg-ink-2">plans · delegates · merges partials</text>
        <circle cx="740" cy="84" r="4.5" fill="#22D3EE"/>

        <!-- worker tier: cyan = search lane, indigo = analysis lane -->
        <rect x="40" y="240" width="260" height="88" rx="14" class="glass-svg-node glass-svg-node--cyan"/>
        <rect x="340" y="240" width="260" height="88" rx="14" class="glass-svg-node glass-svg-node--cyan"/>
        <rect x="640" y="240" width="260" height="88" rx="14" class="glass-svg-node glass-svg-node--indigo"/>
        <rect x="940" y="240" width="260" height="88" rx="14" class="glass-svg-node glass-svg-node--indigo"/>
        <g font-family="'Inter', sans-serif" font-size="14" font-weight="600" class="glass-svg-ink">
          <text x="64" y="272">Search · web</text>
          <text x="364" y="272">Search · docs</text>
          <text x="664" y="272">Analyse · data</text>
          <text x="964" y="272">Analyse · code</text>
        </g>
        <g font-family="'Inter', sans-serif" font-size="11.5" class="glass-svg-ink-2">
          <text x="64" y="292">worker 1 · breadth queries</text>
          <text x="364" y="292">worker 2 · internal corpus</text>
          <text x="664" y="292">worker 3 · notebooks + SQL</text>
          <text x="964" y="292">worker 4 · repo + traces</text>
        </g>

        <!-- legend + takeaway -->
        <rect x="24" y="354" width="14" height="14" rx="4" class="glass-svg-node glass-svg-node--cyan"/>
        <text x="46" y="366" font-family="'Inter', sans-serif" font-size="11.5" class="glass-svg-ink-2">search lane</text>
        <rect x="150" y="354" width="14" height="14" rx="4" class="glass-svg-node glass-svg-node--indigo"/>
        <text x="172" y="366" font-family="'Inter', sans-serif" font-size="11.5" class="glass-svg-ink-2">analysis lane</text>
        <text x="1216" y="366" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="11" letter-spacing="1.5" class="glass-svg-ink-3">PARTIALS MERGE BACK INTO ONE ANSWER</text>
      </svg>
