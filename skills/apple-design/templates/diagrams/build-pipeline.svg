<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="8 36 1052 300" role="img" aria-label="Linux kernel build pipeline: .config and Kconfig compiled by gcc into objects, linked by ld into vmlinux, stripped by objcopy to Image.gz, merged with the dtc-built devicetree blobs by mkimage into the final boot.itb FIT image" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="abldSoft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <marker id="abldArrB" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0.5 L7.5,4 L0,7.5 Z" fill="#0071e3"/>
    </marker>
    <marker id="abldArrN" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0.5 L7.5,4 L0,7.5 Z" fill="#aeaeb2"/>
    </marker>
  </defs>

  <!-- panel -->
  <rect x="8" y="36" width="1052" height="300" fill="#ffffff"/>

  <!-- main chain (blue 1.8px) -->
  <g fill="none" stroke="#0071e3" stroke-width="1.8">
    <line x1="200" y1="100" x2="244" y2="100" marker-end="url(#abldArrB)"/>
    <line x1="372" y1="100" x2="416" y2="100" marker-end="url(#abldArrB)"/>
    <line x1="524" y1="100" x2="568" y2="100" marker-end="url(#abldArrB)"/>
    <line x1="696" y1="100" x2="740" y2="100" marker-end="url(#abldArrB)"/>
    <line x1="864" y1="100" x2="908" y2="100" marker-end="url(#abldArrB)"/>
    <path d="M974,136 V180 Q974,188 966,188 H790 Q782,188 782,196 V236" marker-end="url(#abldArrB)"/>
    <line x1="856" y1="276" x2="900" y2="276" marker-end="url(#abldArrB)"/>
  </g>

  <!-- devicetree branch (gray 1.2px solid) -->
  <g fill="none" stroke="#aeaeb2" stroke-width="1.2">
    <line x1="144" y1="276" x2="188" y2="276" marker-end="url(#abldArrN)"/>
    <line x1="336" y1="276" x2="380" y2="276" marker-end="url(#abldArrN)"/>
    <line x1="496" y1="276" x2="704" y2="276" marker-end="url(#abldArrN)"/>
  </g>
  <text x="600" y="264" font-size="11.5" fill="#86868b" text-anchor="middle">make dtbs · runs in parallel</text>

  <!-- node cards: white, borderless, soft shadow -->
  <g filter="url(#abldSoft)">
    <rect x="32" y="64" width="168" height="72" rx="14" fill="#ffffff"/>
    <rect x="248" y="64" width="124" height="72" rx="14" fill="#ffffff"/>
    <rect x="420" y="64" width="104" height="72" rx="14" fill="#ffffff"/>
    <rect x="572" y="64" width="124" height="72" rx="14" fill="#ffffff"/>
    <rect x="744" y="64" width="120" height="72" rx="14" fill="#ffffff"/>
    <rect x="912" y="64" width="124" height="72" rx="14" fill="#ffffff"/>
    <rect x="32" y="240" width="112" height="72" rx="14" fill="#ffffff"/>
    <rect x="192" y="240" width="144" height="72" rx="14" fill="#ffffff"/>
    <rect x="384" y="240" width="112" height="72" rx="14" fill="#ffffff"/>
    <rect x="708" y="240" width="148" height="72" rx="14" fill="#ffffff"/>
  </g>

  <!-- focus card: final deliverable, the only bordered card -->
  <rect x="904" y="240" width="132" height="72" rx="14" fill="#ffffff" stroke="#0071e3" stroke-width="1.5" filter="url(#abldSoft)"/>

  <!-- card names -->
  <g font-size="13.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">
    <text x="116" y="94">.config + Kconfig</text>
    <text x="310" y="94">gcc -c</text>
    <text x="472" y="94">*.o</text>
    <text x="634" y="94">ld vmlinux</text>
    <text x="804" y="94">objcopy</text>
    <text x="974" y="94">Image.gz</text>
    <text x="88" y="270">*.dts</text>
    <text x="264" y="270">dtc</text>
    <text x="440" y="270">*.dtb</text>
    <text x="782" y="270">mkimage FIT</text>
    <text x="970" y="270">boot.itb</text>
  </g>

  <!-- card sub-labels -->
  <g font-size="11.5" fill="#86868b" text-anchor="middle">
    <text x="116" y="116">build configuration</text>
    <text x="310" y="116">compile per-TU</text>
    <text x="472" y="116">object files</text>
    <text x="634" y="116">ELF + symbols</text>
    <text x="804" y="116">strip to binary</text>
    <text x="974" y="116">compressed kernel</text>
    <text x="88" y="292">board source</text>
    <text x="264" y="292">devicetree compiler</text>
    <text x="440" y="292">flattened blob</text>
    <text x="782" y="292">kernel + dtb pack</text>
    <text x="970" y="292">bootable FIT image</text>
  </g>

  <!-- numbered badges on the tool steps of the main chain -->
  <g font-size="11" font-weight="600" text-anchor="middle">
    <circle cx="252" cy="68" r="10" fill="#0071e3"/><text x="252" y="72" fill="#ffffff">1</text>
    <circle cx="576" cy="68" r="10" fill="#0071e3"/><text x="576" y="72" fill="#ffffff">2</text>
    <circle cx="748" cy="68" r="10" fill="#0071e3"/><text x="748" y="72" fill="#ffffff">3</text>
    <circle cx="712" cy="244" r="10" fill="#0071e3"/><text x="712" y="248" fill="#ffffff">4</text>
  </g>
</svg>
