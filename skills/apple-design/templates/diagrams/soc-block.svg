<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 624" role="img" aria-label="Quartz-3550 SoC block diagram: dual Cortex-A55 cluster with L2 and GIC-600, clock and reset unit, AXI NoC interconnect fanning out to memory, high-speed and low-speed peripherals; the blue path traces a CPU load miss through L2 and the NoC to the DDR4 controller" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="asocSoft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <marker id="asocArrB" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0.5 L7.5,4 L0,7.5 Z" fill="#0071e3"/>
    </marker>
    <marker id="asocArrN" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0.5 L7.5,4 L0,7.5 Z" fill="#aeaeb2"/>
    </marker>
  </defs>

  <rect width="1160" height="624" fill="#ffffff"/>

  <!-- zones: pale gray, rx 18, no border, normal-case labels -->
  <rect x="24" y="24" width="712" height="168" rx="18" fill="#f5f5f7"/>
  <text x="52" y="60" font-size="12" font-weight="500" fill="#86868b">CPU subsystem</text>
  <rect x="760" y="24" width="376" height="168" rx="18" fill="#f5f5f7"/>
  <text x="788" y="60" font-size="12" font-weight="500" fill="#86868b">Clock &amp; reset</text>
  <rect x="24" y="360" width="360" height="240" rx="18" fill="#f5f5f7"/>
  <text x="52" y="396" font-size="12" font-weight="500" fill="#86868b">Memory</text>
  <rect x="408" y="360" width="360" height="240" rx="18" fill="#f5f5f7"/>
  <text x="436" y="396" font-size="12" font-weight="500" fill="#86868b">High-speed I/O</text>
  <rect x="792" y="360" width="344" height="240" rx="18" fill="#f5f5f7"/>
  <text x="820" y="396" font-size="12" font-weight="500" fill="#86868b">Low-speed I/O</text>

  <!-- connectors: blue main path (load miss CPU -> L2 -> NoC -> DDR), gray everything else -->
  <g fill="none">
    <path d="M248,128 H288" stroke="#0071e3" stroke-width="1.8" marker-end="url(#asocArrB)"/>
    <path d="M384,172 V236" stroke="#0071e3" stroke-width="1.8" marker-end="url(#asocArrB)"/>
    <path d="M340,300 V320 Q340,328 332,328 H212 Q204,328 204,336 V416" stroke="#0071e3" stroke-width="1.8" marker-end="url(#asocArrB)"/>
    <path d="M608,172 V236" stroke="#aeaeb2" stroke-width="1.2" marker-end="url(#asocArrN)"/>
    <path d="M864,172 V204 Q864,212 856,212 H728 Q720,212 720,220 V236" stroke="#aeaeb2" stroke-width="1.2" marker-end="url(#asocArrN)"/>
    <path d="M588,300 V360" stroke="#aeaeb2" stroke-width="1.2" marker-start="url(#asocArrN)" marker-end="url(#asocArrN)"/>
    <path d="M748,268 H856" stroke="#aeaeb2" stroke-width="1.2" marker-end="url(#asocArrN)"/>
    <path d="M956,300 V360" stroke="#aeaeb2" stroke-width="1.2" marker-end="url(#asocArrN)"/>
  </g>
  <text x="876" y="200" font-size="12" fill="#86868b">clk · rst</text>

  <!-- IP cards: white, rx 14, no stroke, soft shadow; A55 cluster is the single blue focus card -->
  <g filter="url(#asocSoft)">
    <rect x="56" y="84" width="192" height="88" rx="14" fill="#ffffff" stroke="#0071e3" stroke-width="1.5"/>
    <rect x="288" y="84" width="192" height="88" rx="14" fill="#ffffff"/>
    <rect x="512" y="84" width="192" height="88" rx="14" fill="#ffffff"/>
    <rect x="792" y="84" width="144" height="88" rx="14" fill="#ffffff"/>
    <rect x="960" y="84" width="144" height="88" rx="14" fill="#ffffff"/>
    <rect x="300" y="236" width="448" height="64" rx="14" fill="#ffffff"/>
    <rect x="856" y="236" width="200" height="64" rx="14" fill="#ffffff"/>
    <rect x="52" y="416" width="304" height="72" rx="14" fill="#ffffff"/>
    <rect x="436" y="416" width="304" height="72" rx="14" fill="#ffffff"/>
    <rect x="820" y="416" width="136" height="72" rx="14" fill="#ffffff"/>
    <rect x="972" y="416" width="136" height="72" rx="14" fill="#ffffff"/>
    <rect x="52" y="504" width="144" height="72" rx="14" fill="#ffffff"/>
    <rect x="212" y="504" width="144" height="72" rx="14" fill="#ffffff"/>
    <rect x="436" y="504" width="144" height="72" rx="14" fill="#ffffff"/>
    <rect x="596" y="504" width="144" height="72" rx="14" fill="#ffffff"/>
    <rect x="820" y="504" width="136" height="72" rx="14" fill="#ffffff"/>
    <rect x="972" y="504" width="136" height="72" rx="14" fill="#ffffff"/>
  </g>

  <!-- numbered badges on the main path -->
  <g font-size="11.5" font-weight="600" text-anchor="middle">
    <circle cx="268" cy="128" r="10" fill="#0071e3"/><text x="268" y="132" fill="#ffffff">1</text>
    <circle cx="384" cy="204" r="10" fill="#0071e3"/><text x="384" y="208" fill="#ffffff">2</text>
    <circle cx="272" cy="328" r="10" fill="#0071e3"/><text x="272" y="332" fill="#ffffff">3</text>
  </g>

  <!-- card names -->
  <g font-weight="600" fill="#1d1d1f">
    <g font-size="15">
      <text x="80" y="120">Cortex-A55 ×2</text>
      <text x="312" y="120">L2 cache 512K</text>
      <text x="536" y="120">GIC-600</text>
      <text x="816" y="120">PLL ×3</text>
      <text x="984" y="120">CRU</text>
    </g>
    <g font-size="14">
      <text x="324" y="260">AXI NoC · 64-bit @ 800 MHz</text>
      <text x="880" y="260">APB bridge</text>
      <text x="76" y="444">DDR4 ctrl + PHY</text>
      <text x="460" y="444">PCIe Gen3 ×2</text>
      <text x="840" y="444">UART ×4</text>
      <text x="992" y="444">I2C ×3</text>
      <text x="72" y="532">SRAM 256K</text>
      <text x="232" y="532">Boot ROM</text>
      <text x="456" y="532">USB 3.0</text>
      <text x="616" y="532">GbE MAC</text>
      <text x="840" y="532">SPI ×2</text>
      <text x="992" y="532">GPIO</text>
    </g>
  </g>

  <!-- card sub-lines -->
  <g font-size="12" fill="#86868b">
    <text x="80" y="144">L1 32K I/D per core</text>
    <text x="312" y="144">unified · ECC</text>
    <text x="536" y="144">interrupt distributor</text>
    <text x="816" y="144">core · ddr · peri</text>
    <text x="984" y="144">gate · soft reset</text>
    <text x="324" y="284">system interconnect · QoS arbitration · 4 masters</text>
    <text x="880" y="284">AXI-to-APB · 100 MHz</text>
    <text x="76" y="468">DDR4-3200 · 32-bit + ECC</text>
    <text x="460" y="468">root complex · MSI-X</text>
    <text x="840" y="468">16550A-compat</text>
    <text x="992" y="468">400 kHz Fast-mode</text>
    <text x="72" y="556">on-chip scratch</text>
    <text x="232" y="556">64K mask ROM</text>
    <text x="456" y="556">xHCI dual-role</text>
    <text x="616" y="556">RGMII · TSO</text>
    <text x="840" y="556">mode 0-3 · DMA</text>
    <text x="992" y="556">4 banks ×32</text>
  </g>
</svg>
