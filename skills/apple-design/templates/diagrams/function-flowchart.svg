<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 20 960 548" role="img" aria-label="mydev_probe() flowchart: blue happy path through devm_kzalloc, ioremap, request_irq and chardev registration, three error checks branching to a shared return -errno exit" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="affc-soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <marker id="affc-arrB" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0.5 L7.5,4 L0,7.5 Z" fill="#0071e3"/>
    </marker>
    <marker id="affc-arrN" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0.5 L7.5,4 L0,7.5 Z" fill="#aeaeb2"/>
    </marker>
  </defs>
  <rect x="0" y="20" width="960" height="548" fill="#ffffff"/>

  <!-- error lane: gray dashed, converging on return -errno -->
  <g fill="none" stroke="#aeaeb2" stroke-width="1.2" stroke-dasharray="4 3">
    <path d="M488,84 L488,52 Q488,44 496,44 L908,44 Q916,44 916,52 L916,476" marker-end="url(#affc-arrN)"/>
    <path d="M96,372 L96,516 Q96,524 104,524 L732,524" marker-end="url(#affc-arrN)"/>
    <path d="M480,372 L480,492 Q480,500 488,500 L732,500" marker-end="url(#affc-arrN)"/>
  </g>

  <!-- happy path: the single blue story -->
  <g fill="none" stroke="#0071e3" stroke-width="1.8">
    <line x1="196" y1="124" x2="220" y2="124" marker-end="url(#affc-arrB)"/>
    <line x1="388" y1="124" x2="412" y2="124" marker-end="url(#affc-arrB)"/>
    <line x1="564" y1="124" x2="588" y2="124" marker-end="url(#affc-arrB)"/>
    <path d="M688,156 L688,220 Q688,228 680,228 L104,228 Q96,228 96,236 L96,292" marker-end="url(#affc-arrB)"/>
    <line x1="172" y1="332" x2="196" y2="332" marker-end="url(#affc-arrB)"/>
    <line x1="380" y1="332" x2="404" y2="332" marker-end="url(#affc-arrB)"/>
    <line x1="540" y1="332" x2="564" y2="332" marker-end="url(#affc-arrB)"/>
    <line x1="756" y1="332" x2="780" y2="332" marker-end="url(#affc-arrB)"/>
  </g>

  <!-- soft-shadow white cards -->
  <g filter="url(#affc-soft)">
    <rect x="24" y="102" width="168" height="44" rx="22" fill="#ffffff"/>
    <rect x="224" y="92" width="160" height="64" rx="14" fill="#ffffff"/>
    <rect x="592" y="92" width="192" height="64" rx="14" fill="#ffffff"/>
    <rect x="200" y="300" width="176" height="64" rx="14" fill="#ffffff"/>
    <rect x="568" y="300" width="184" height="64" rx="14" fill="#ffffff"/>
    <rect x="784" y="310" width="112" height="44" rx="22" fill="#ffffff"/>
  </g>

  <!-- shared error exit: muted gray card -->
  <rect x="736" y="480" width="200" height="64" rx="14" fill="#f5f5f7"/>

  <!-- decision diamonds: the only tinted blocks -->
  <g fill="#eaf3fe" stroke="#0071e3" stroke-width="1.5">
    <path d="M416,124 L488,88 L560,124 L488,160 Z"/>
    <path d="M24,332 L96,296 L168,332 L96,368 Z"/>
    <path d="M408,332 L472,296 L536,332 L472,368 Z"/>
  </g>

  <!-- icons -->
  <g fill="none" stroke="#6e6e73" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- devm_kzalloc: RAM chip -->
    <g transform="translate(238,112)">
      <rect x="3" y="7" width="18" height="10" rx="2"/>
      <path d="M7 7 V4 M12 7 V4 M17 7 V4 M7 17 V20 M12 17 V20 M17 17 V20"/>
    </g>
    <!-- ioremap: register window -->
    <g transform="translate(606,112)">
      <rect x="3" y="5" width="18" height="14" rx="2"/>
      <path d="M3 9 H21 M9 9 V19 M15 9 V19"/>
    </g>
    <!-- request_irq: bolt -->
    <g transform="translate(214,320)">
      <path d="M13 3 L6 13.5 H11 L9 21 L18 10.5 H13 Z"/>
    </g>
    <!-- register chardev: terminal -->
    <g transform="translate(582,320)">
      <rect x="3" y="5" width="18" height="14" rx="2"/>
      <path d="M7 10 L10 12.5 L7 15"/>
      <path d="M13 15 H17"/>
    </g>
  </g>

  <!-- entry / exit capsules -->
  <text x="108" y="129" font-size="13.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">mydev_probe(pdev)</text>
  <text x="840" y="337" font-size="13.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">return 0</text>

  <!-- step cards -->
  <text x="274" y="120" font-size="13.5" font-weight="600" fill="#1d1d1f">devm_kzalloc</text>
  <text x="274" y="140" font-size="11.5" fill="#86868b">ctx, GFP_KERNEL</text>
  <text x="642" y="120" font-size="13.5" font-weight="600" fill="#1d1d1f">ioremap registers</text>
  <text x="642" y="140" font-size="11.5" fill="#86868b">MMIO resource 0</text>
  <text x="250" y="328" font-size="13.5" font-weight="600" fill="#1d1d1f">request_irq</text>
  <text x="250" y="348" font-size="11.5" fill="#86868b">mydev_isr handler</text>
  <text x="618" y="328" font-size="13.5" font-weight="600" fill="#1d1d1f">register chardev</text>
  <text x="618" y="348" font-size="11.5" fill="#86868b">cdev_add, fops</text>

  <!-- decision questions -->
  <text x="488" y="128" font-size="12" font-weight="600" fill="#1d1d1f" text-anchor="middle">ctx == NULL?</text>
  <text x="96" y="336" font-size="12" font-weight="600" fill="#1d1d1f" text-anchor="middle">IS_ERR(base)?</text>
  <text x="472" y="336" font-size="12" font-weight="600" fill="#1d1d1f" text-anchor="middle">ret &lt; 0?</text>

  <!-- branch labels -->
  <text x="576" y="144" font-size="11" font-weight="600" fill="#0071e3" text-anchor="middle">no</text>
  <text x="184" y="352" font-size="11" font-weight="600" fill="#0071e3" text-anchor="middle">no</text>
  <text x="552" y="352" font-size="11" font-weight="600" fill="#0071e3" text-anchor="middle">no</text>
  <text x="700" y="64" font-size="11" fill="#86868b" text-anchor="middle">yes &#183; -ENOMEM</text>
  <text x="300" y="512" font-size="11" fill="#86868b" text-anchor="middle">yes &#183; PTR_ERR(base)</text>
  <text x="600" y="488" font-size="11" fill="#86868b" text-anchor="middle">yes &#183; ret</text>

  <!-- shared error exit -->
  <text x="836" y="508" font-size="13.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">return -errno</text>
  <text x="836" y="528" font-size="11.5" fill="#86868b" text-anchor="middle">devm_* resources auto-freed</text>

  <!-- numbered badges on the happy path -->
  <g font-size="11" font-weight="600" text-anchor="middle">
    <circle cx="228" cy="96" r="10" fill="#0071e3"/><text x="228" y="100" fill="#ffffff">1</text>
    <circle cx="596" cy="96" r="10" fill="#0071e3"/><text x="596" y="100" fill="#ffffff">2</text>
    <circle cx="204" cy="304" r="10" fill="#0071e3"/><text x="204" y="308" fill="#ffffff">3</text>
    <circle cx="572" cy="304" r="10" fill="#0071e3"/><text x="572" y="308" fill="#ffffff">4</text>
  </g>
</svg>
