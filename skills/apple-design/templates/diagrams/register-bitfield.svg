<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 944 352" role="img" aria-label="UART_CTRL register bit-field map at offset 0x04, reset value 0x0000_0301, showing BAUD_DIV, PARITY, STOP, DATA8 and FIFO_TH fields with the TX_EN and RX_EN enable bits highlighted" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif">
  <!-- panel -->
  <rect x="0" y="0" width="944" height="352" fill="#ffffff"/>

  <!-- field fills (row 1: bits 31..16) -->
  <path d="M472 80 H912 Q920 80 920 88 V116 Q920 124 912 124 H472 Z" fill="#f5f5f7"/>

  <!-- field fills (row 2: bits 15..0) -->
  <rect x="248" y="168" width="112" height="44" fill="#f5f5f7"/>
  <rect x="360" y="168" width="56" height="44" fill="#f5f5f7"/>
  <rect x="416" y="168" width="56" height="44" fill="#f5f5f7"/>
  <rect x="472" y="168" width="224" height="44" fill="#f5f5f7"/>
  <path d="M808 168 H912 Q920 168 920 176 V204 Q920 212 912 212 H808 Z" fill="#eaf3fe"/>

  <!-- bit lattice hairlines, row 1 -->
  <g stroke="#d2d2d7" stroke-width="1">
    <line x1="80" y1="80" x2="80" y2="124"/>
    <line x1="136" y1="80" x2="136" y2="124"/>
    <line x1="192" y1="80" x2="192" y2="124"/>
    <line x1="248" y1="80" x2="248" y2="124"/>
    <line x1="304" y1="80" x2="304" y2="124"/>
    <line x1="360" y1="80" x2="360" y2="124"/>
    <line x1="416" y1="80" x2="416" y2="124"/>
    <line x1="528" y1="80" x2="528" y2="124"/>
    <line x1="584" y1="80" x2="584" y2="124"/>
    <line x1="640" y1="80" x2="640" y2="124"/>
    <line x1="696" y1="80" x2="696" y2="124"/>
    <line x1="752" y1="80" x2="752" y2="124"/>
    <line x1="808" y1="80" x2="808" y2="124"/>
    <line x1="864" y1="80" x2="864" y2="124"/>
  </g>
  <line x1="472" y1="80" x2="472" y2="124" stroke="#aeaeb2" stroke-width="1"/>

  <!-- bit lattice hairlines, row 2 -->
  <g stroke="#d2d2d7" stroke-width="1">
    <line x1="80" y1="168" x2="80" y2="212"/>
    <line x1="136" y1="168" x2="136" y2="212"/>
    <line x1="192" y1="168" x2="192" y2="212"/>
    <line x1="304" y1="168" x2="304" y2="212"/>
    <line x1="528" y1="168" x2="528" y2="212"/>
    <line x1="584" y1="168" x2="584" y2="212"/>
    <line x1="640" y1="168" x2="640" y2="212"/>
    <line x1="752" y1="168" x2="752" y2="212"/>
    <line x1="864" y1="168" x2="864" y2="212"/>
  </g>
  <g stroke="#aeaeb2" stroke-width="1">
    <line x1="248" y1="168" x2="248" y2="212"/>
    <line x1="360" y1="168" x2="360" y2="212"/>
    <line x1="416" y1="168" x2="416" y2="212"/>
    <line x1="472" y1="168" x2="472" y2="212"/>
    <line x1="696" y1="168" x2="696" y2="212"/>
  </g>

  <!-- row borders -->
  <rect x="24" y="80" width="896" height="44" rx="8" fill="none" stroke="#d2d2d7" stroke-width="1"/>
  <rect x="24" y="168" width="896" height="44" rx="8" fill="none" stroke="#d2d2d7" stroke-width="1"/>

  <!-- focus field outline: the single blue story -->
  <path d="M808 168 H912 Q920 168 920 176 V204 Q920 212 912 212 H808 Z" fill="none" stroke="#0071e3" stroke-width="1.5"/>

  <!-- divider -->
  <line x1="24" y1="240" x2="920" y2="240" stroke="#d2d2d7" stroke-width="1"/>

  <!-- access chips -->
  <rect x="128" y="252" width="36" height="24" rx="10" fill="#f5f5f7"/>
  <rect x="128" y="280" width="36" height="24" rx="10" fill="#f5f5f7"/>
  <rect x="128" y="308" width="36" height="24" rx="10" fill="#f5f5f7"/>

  <!-- title -->
  <text x="24" y="32" font-size="14" font-weight="600" fill="#1d1d1f">UART_CTRL</text>
  <text x="920" y="32" font-size="12" fill="#86868b" text-anchor="end">offset 0x04 · reset 0x0000_0301</text>

  <!-- bit numbers, row 1 -->
  <g font-size="11" fill="#86868b" text-anchor="middle">
    <text x="52" y="72">31</text>
    <text x="108" y="72">30</text>
    <text x="164" y="72">29</text>
    <text x="220" y="72">28</text>
    <text x="276" y="72">27</text>
    <text x="332" y="72">26</text>
    <text x="388" y="72">25</text>
    <text x="444" y="72">24</text>
    <text x="500" y="72">23</text>
    <text x="556" y="72">22</text>
    <text x="612" y="72">21</text>
    <text x="668" y="72">20</text>
    <text x="724" y="72">19</text>
    <text x="780" y="72">18</text>
    <text x="836" y="72">17</text>
    <text x="892" y="72">16</text>
  </g>

  <!-- bit numbers, row 2 -->
  <g font-size="11" fill="#86868b" text-anchor="middle">
    <text x="52" y="160">15</text>
    <text x="108" y="160">14</text>
    <text x="164" y="160">13</text>
    <text x="220" y="160">12</text>
    <text x="276" y="160">11</text>
    <text x="332" y="160">10</text>
    <text x="388" y="160">9</text>
    <text x="444" y="160">8</text>
    <text x="500" y="160">7</text>
    <text x="556" y="160">6</text>
    <text x="612" y="160">5</text>
    <text x="668" y="160">4</text>
    <text x="724" y="160">3</text>
    <text x="780" y="160">2</text>
    <text x="836" y="160">1</text>
    <text x="892" y="160">0</text>
  </g>

  <!-- field names -->
  <g font-size="12" font-weight="600" fill="#1d1d1f" text-anchor="middle">
    <text x="696" y="108">BAUD_DIV</text>
    <text x="304" y="196">PARITY</text>
    <text x="388" y="196">STOP</text>
    <text x="444" y="196">DATA8</text>
    <text x="584" y="196">FIFO_TH</text>
  </g>
  <g font-size="12" font-weight="600" fill="#0071e3" text-anchor="middle">
    <text x="836" y="196">RX_EN</text>
    <text x="892" y="196">TX_EN</text>
  </g>

  <!-- reserved markers -->
  <g font-size="12" fill="#86868b" text-anchor="middle">
    <text x="248" y="108">—</text>
    <text x="136" y="196">—</text>
    <text x="752" y="196">—</text>
  </g>

  <!-- field spec lines -->
  <g font-size="12" font-weight="600" fill="#1d1d1f">
    <text x="24" y="268">BAUD_DIV</text>
    <text x="24" y="296">FIFO_TH</text>
    <text x="24" y="324">TX_EN / RX_EN</text>
  </g>
  <g font-size="11" font-weight="600" fill="#6e6e73" text-anchor="middle">
    <text x="146" y="268">RW</text>
    <text x="146" y="296">RW</text>
    <text x="146" y="324">RW</text>
  </g>
  <g font-size="12" fill="#86868b">
    <text x="180" y="268">baud = clk / (16 · div) — divisor sampled at frame start, write while TX_EN = 0</text>
    <text x="180" y="296">TX_IRQ asserts when FIFO fill level drops below threshold (0–15 entries)</text>
    <text x="180" y="324">transmit / receive enables — reset 0x0301 starts TX only, driver sets RX_EN at probe</text>
  </g>
</svg>
