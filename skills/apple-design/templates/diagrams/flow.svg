<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow-apple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1D1D1F"/>
    </marker>
    <style>
      .node { fill: #FFFFFF; stroke: #D2D2D7; stroke-width: 1; }
      .node-text { fill: #1D1D1F; font-size: 13px; text-anchor: middle; dominant-baseline: middle; }
      .flow-line { stroke: #1D1D1F; stroke-width: 1.5; fill: none; }
      .gate { fill: #FFFFFF; stroke: #0071E3; stroke-width: 1.5; }
      .bg { fill: #F5F5F7; }
    </style>
  </defs>

  <rect class="bg" width="800" height="200"/>

  <rect class="node" x="20" y="75" width="140" height="50" rx="12"/>
  <text class="node-text" x="90" y="100">Input</text>

  <line class="flow-line" x1="160" y1="100" x2="200" y2="100" marker-end="url(#arrow-apple)"/>

  <rect class="node" x="200" y="75" width="140" height="50" rx="12"/>
  <text class="node-text" x="270" y="100">Process</text>

  <line class="flow-line" x1="340" y1="100" x2="380" y2="100" marker-end="url(#arrow-apple)"/>

  <polygon class="gate" points="430,75 480,100 430,125 380,100"/>
  <text class="node-text" x="430" y="103">Decision</text>

  <line class="flow-line" x1="480" y1="100" x2="520" y2="100" marker-end="url(#arrow-apple)"/>

  <rect class="node" x="520" y="75" width="140" height="50" rx="12"/>
  <text class="node-text" x="590" y="100">Output</text>
</svg>
