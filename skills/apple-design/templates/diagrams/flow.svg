<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 70 960 184" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" role="img" aria-label="Pipeline flow: soft-shadow white step cards, blue happy path, decision diamond with fail loop">
  <defs>
    <filter id="flow-soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <marker id="flow-arrB" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0.5 L7.5,4 L0,7.5 Z" fill="#0071e3"/>
    </marker>
    <marker id="flow-arrN" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0.5 L7.5,4 L0,7.5 Z" fill="#aeaeb2"/>
    </marker>
  </defs>
  <rect y="70" width="960" height="184" fill="#ffffff"/>

  <!-- happy path -->
  <g fill="none" stroke="#0071e3" stroke-width="1.8">
    <line x1="206" y1="138" x2="240" y2="138" marker-end="url(#flow-arrB)"/>
    <line x1="396" y1="138" x2="459" y2="138" marker-end="url(#flow-arrB)"/>
    <line x1="557" y1="138" x2="589" y2="138" marker-end="url(#flow-arrB)"/>
    <line x1="745" y1="138" x2="779" y2="138" marker-end="url(#flow-arrB)"/>
  </g>
  <text x="573" y="128" font-size="11" font-weight="600" fill="#0071e3" text-anchor="middle">yes</text>

  <!-- fail loop -->
  <path d="M511,180 L511,216 Q511,224 503,224 L329,224 Q321,224 321,216 L321,182" fill="none" stroke="#aeaeb2" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#flow-arrN)"/>
  <text x="416" y="216" font-size="11" fill="#86868b" text-anchor="middle">no · back-order</text>

  <!-- step cards -->
  <g filter="url(#flow-soft)">
    <rect x="56" y="102" width="150" height="72" rx="14" fill="#ffffff"/>
    <rect x="246" y="102" width="150" height="72" rx="14" fill="#ffffff"/>
    <rect x="595" y="102" width="150" height="72" rx="14" fill="#ffffff"/>
    <rect x="785" y="102" width="150" height="72" rx="14" fill="#ffffff"/>
  </g>

  <!-- decision diamond: the only tinted block -->
  <path d="M511,94 L557,138 L511,182 L465,138 Z" fill="#eaf3fe" stroke="#0071e3" stroke-width="1.5"/>
  <text x="511" y="142" font-size="12" font-weight="600" fill="#1d1d1f" text-anchor="middle">In stock?</text>

  <!-- step 1: Order -->
  <g transform="translate(72,126)" fill="none" stroke="#6e6e73" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 3 h3 l2.4 11 h8.6 l2 -7 H7"/>
    <circle cx="9.5" cy="17.5" r="1.4"/><circle cx="15.5" cy="17.5" r="1.4"/>
  </g>
  <text x="104" y="143" font-size="13.5" font-weight="600" fill="#1d1d1f">Order</text>
  <!-- step 2: Validate -->
  <g transform="translate(262,126)" fill="none" stroke="#6e6e73" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M10 2 L17 5 v5 c0 4.5 -3 7.5 -7 8 -4 -0.5 -7 -3.5 -7 -8 V5 Z"/>
    <polyline points="6.5,10 9,12.5 13.5,7.5"/>
  </g>
  <text x="294" y="143" font-size="13.5" font-weight="600" fill="#1d1d1f">Validate</text>
  <!-- step 3: Charge -->
  <g transform="translate(611,126)" fill="none" stroke="#6e6e73" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2" y="4" width="16" height="12" rx="2"/>
    <line x1="2" y1="9" x2="18" y2="9"/>
  </g>
  <text x="643" y="143" font-size="13.5" font-weight="600" fill="#1d1d1f">Charge</text>
  <!-- step 4: Ship -->
  <g transform="translate(801,126)" fill="none" stroke="#6e6e73" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M2 6 h11 v9 H2 Z"/><path d="M13 9 h4 l2 3 v3 h-6"/>
    <circle cx="6" cy="17.5" r="1.5"/><circle cx="15.5" cy="17.5" r="1.5"/>
  </g>
  <text x="833" y="143" font-size="13.5" font-weight="600" fill="#1d1d1f">Ship</text>

  <!-- numbered badges -->
  <g font-size="11" font-weight="600" text-anchor="middle">
    <circle cx="60" cy="106" r="10" fill="#0071e3"/><text x="60" y="110" fill="#ffffff">1</text>
    <circle cx="250" cy="106" r="10" fill="#0071e3"/><text x="250" y="110" fill="#ffffff">2</text>
    <circle cx="599" cy="106" r="10" fill="#0071e3"/><text x="599" y="110" fill="#ffffff">3</text>
    <circle cx="789" cy="106" r="10" fill="#0071e3"/><text x="789" y="110" fill="#ffffff">4</text>
  </g>
</svg>
