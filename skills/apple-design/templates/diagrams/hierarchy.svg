<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 350" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" role="img" aria-label="Hierarchy: blue-ringed coordinator card fanning out to four worker cards on a pale-gray panel">
  <defs>
    <filter id="hier-soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <marker id="hier-arrN" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0.5 L7.5,4 L0,7.5 Z" fill="#aeaeb2"/>
    </marker>
  </defs>
  <rect width="880" height="350" rx="18" fill="#f5f5f7"/>

  <!-- fan-out connectors (edge anchors on coordinator bottom) -->
  <g fill="none" stroke="#aeaeb2" stroke-width="1.2">
    <path d="M380,118 L380,154 Q380,162 372,162 L151,162 Q143,162 143,170 L143,220" marker-end="url(#hier-arrN)"/>
    <path d="M420,118 L420,178 Q420,186 412,186 L359,186 Q351,186 351,194 L351,220" marker-end="url(#hier-arrN)"/>
    <path d="M460,118 L460,178 Q460,186 468,186 L551,186 Q559,186 559,194 L559,220" marker-end="url(#hier-arrN)"/>
    <path d="M500,118 L500,154 Q500,162 508,162 L759,162 Q767,162 767,170 L767,220" marker-end="url(#hier-arrN)"/>
  </g>

  <!-- coordinator card (focal: blue ring + blue icon) -->
  <g filter="url(#hier-soft)">
    <rect x="320" y="34" width="240" height="84" rx="14" fill="#ffffff" stroke="#0071e3" stroke-width="1.5"/>
  </g>
  <g transform="translate(344,62)" fill="none" stroke="#0071e3" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <rect x="5" y="5" width="14" height="14" rx="2"/>
    <rect x="9.5" y="9.5" width="5" height="5"/>
    <line x1="9" y1="2" x2="9" y2="5"/><line x1="15" y1="2" x2="15" y2="5"/>
    <line x1="9" y1="19" x2="9" y2="22"/><line x1="15" y1="19" x2="15" y2="22"/>
    <line x1="2" y1="9" x2="5" y2="9"/><line x1="2" y1="15" x2="5" y2="15"/>
    <line x1="19" y1="9" x2="22" y2="9"/><line x1="19" y1="15" x2="22" y2="15"/>
  </g>
  <text x="384" y="72" font-size="15" font-weight="600" fill="#1d1d1f">Coordinator</text>
  <text x="384" y="94" font-size="12" fill="#86868b">plans · delegates · merges</text>

  <!-- worker cards -->
  <g filter="url(#hier-soft)">
    <rect x="48" y="226" width="190" height="76" rx="14" fill="#ffffff"/>
    <rect x="256" y="226" width="190" height="76" rx="14" fill="#ffffff"/>
    <rect x="464" y="226" width="190" height="76" rx="14" fill="#ffffff"/>
    <rect x="672" y="226" width="190" height="76" rx="14" fill="#ffffff"/>
  </g>
  <!-- worker 1: Search -->
  <g transform="translate(66,250)" fill="none" stroke="#6e6e73" stroke-width="1.6" stroke-linecap="round">
    <circle cx="8" cy="8" r="5.5"/><line x1="12.5" y1="12.5" x2="18" y2="18"/>
  </g>
  <text x="100" y="258" font-size="13.5" font-weight="600" fill="#1d1d1f">Search</text>
  <text x="100" y="278" font-size="11.5" fill="#86868b">worker 1 · web</text>
  <!-- worker 2: Search -->
  <g transform="translate(274,250)" fill="none" stroke="#6e6e73" stroke-width="1.6" stroke-linecap="round">
    <circle cx="8" cy="8" r="5.5"/><line x1="12.5" y1="12.5" x2="18" y2="18"/>
  </g>
  <text x="308" y="258" font-size="13.5" font-weight="600" fill="#1d1d1f">Search</text>
  <text x="308" y="278" font-size="11.5" fill="#86868b">worker 2 · docs</text>
  <!-- worker 3: Analyse -->
  <g transform="translate(482,250)" fill="none" stroke="#6e6e73" stroke-width="1.6" stroke-linecap="round">
    <line x1="4" y1="17" x2="4" y2="11"/><line x1="10" y1="17" x2="10" y2="5"/><line x1="16" y1="17" x2="16" y2="13"/>
  </g>
  <text x="516" y="258" font-size="13.5" font-weight="600" fill="#1d1d1f">Analyse</text>
  <text x="516" y="278" font-size="11.5" fill="#86868b">worker 3 · data</text>
  <!-- worker 4: Analyse -->
  <g transform="translate(690,250)" fill="none" stroke="#6e6e73" stroke-width="1.6" stroke-linecap="round">
    <line x1="4" y1="17" x2="4" y2="11"/><line x1="10" y1="17" x2="10" y2="5"/><line x1="16" y1="17" x2="16" y2="13"/>
  </g>
  <text x="724" y="258" font-size="13.5" font-weight="600" fill="#1d1d1f">Analyse</text>
  <text x="724" y="278" font-size="11.5" fill="#86868b">worker 4 · code</text>
</svg>
