<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 944 320" role="img" aria-label="kfifo ring buffer: 16-cell array with free-running in and out counters; the blue in pointer marks where new data lands; indices wrap with idx &amp; (size minus 1)" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arbf-arrB" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0.5 L7.5,4 L0,7.5 Z" fill="#0071e3"/>
    </marker>
    <marker id="arbf-arrK" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0.5 L7.5,4 L0,7.5 Z" fill="#1d1d1f"/>
    </marker>
    <marker id="arbf-arrN" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0.5 L7.5,4 L0,7.5 Z" fill="#aeaeb2"/>
    </marker>
    <clipPath id="arbf-cells">
      <rect x="24" y="136" width="896" height="56" rx="10"/>
    </clipPath>
  </defs>
  <rect width="944" height="320" fill="#ffffff"/>

  <!-- pointer drop lines: in (blue, the one focus) and out (ink) -->
  <line x1="332" y1="108" x2="332" y2="132" fill="none" stroke="#0071e3" stroke-width="1.8" marker-end="url(#arbf-arrB)"/>
  <line x1="836" y1="108" x2="836" y2="132" fill="none" stroke="#1d1d1f" stroke-width="1.5" marker-end="url(#arbf-arrK)"/>

  <!-- wrap-around path, split for the inline modulo label -->
  <path d="M892,224 L892,228 Q892,236 884,236 L532,236" fill="none" stroke="#aeaeb2" stroke-width="1.2"/>
  <path d="M412,236 L60,236 Q52,236 52,228 L52,224" fill="none" stroke="#aeaeb2" stroke-width="1.2" marker-end="url(#arbf-arrN)"/>

  <!-- 16-cell array: white lattice, tinted occupied span (wraps 14,15 then 0..4) -->
  <rect x="24" y="136" width="896" height="56" rx="10" fill="#ffffff"/>
  <g clip-path="url(#arbf-cells)">
    <rect x="24" y="136" width="280" height="56" fill="#eaf3fe"/>
    <rect x="808" y="136" width="112" height="56" fill="#eaf3fe"/>
  </g>
  <g stroke="#d2d2d7" stroke-width="1">
    <line x1="80" y1="136" x2="80" y2="192"/>
    <line x1="136" y1="136" x2="136" y2="192"/>
    <line x1="192" y1="136" x2="192" y2="192"/>
    <line x1="248" y1="136" x2="248" y2="192"/>
    <line x1="304" y1="136" x2="304" y2="192"/>
    <line x1="360" y1="136" x2="360" y2="192"/>
    <line x1="416" y1="136" x2="416" y2="192"/>
    <line x1="472" y1="136" x2="472" y2="192"/>
    <line x1="528" y1="136" x2="528" y2="192"/>
    <line x1="584" y1="136" x2="584" y2="192"/>
    <line x1="640" y1="136" x2="640" y2="192"/>
    <line x1="696" y1="136" x2="696" y2="192"/>
    <line x1="752" y1="136" x2="752" y2="192"/>
    <line x1="808" y1="136" x2="808" y2="192"/>
    <line x1="864" y1="136" x2="864" y2="192"/>
  </g>
  <rect x="24" y="136" width="896" height="56" rx="10" fill="none" stroke="#d2d2d7" stroke-width="1"/>

  <!-- title row + legend -->
  <text x="24" y="28" font-size="15" font-weight="600" fill="#1d1d1f">kfifo — lockless ring buffer, size = 16</text>
  <text x="24" y="48" font-size="12" fill="#86868b">single producer / single consumer · len = in − out = 7</text>
  <rect x="772" y="20" width="16" height="16" rx="4" fill="#eaf3fe"/>
  <text x="796" y="32" font-size="11" fill="#6e6e73">data</text>
  <rect x="856" y="20" width="16" height="16" rx="4" fill="#ffffff" stroke="#d2d2d7" stroke-width="1"/>
  <text x="880" y="32" font-size="11" fill="#6e6e73">free</text>

  <!-- pointer labels -->
  <text x="332" y="84" font-size="13.5" font-weight="600" fill="#0071e3" text-anchor="middle">in = 37</text>
  <text x="332" y="100" font-size="11" fill="#86868b" text-anchor="middle">new data lands here</text>
  <text x="836" y="84" font-size="13.5" font-weight="600" fill="#1d1d1f" text-anchor="middle">out = 30</text>
  <text x="836" y="100" font-size="11" fill="#86868b" text-anchor="middle">next read</text>

  <!-- index labels 0..15 -->
  <g font-size="11" fill="#86868b" text-anchor="middle">
    <text x="52" y="212">0</text>
    <text x="108" y="212">1</text>
    <text x="164" y="212">2</text>
    <text x="220" y="212">3</text>
    <text x="276" y="212">4</text>
    <text x="332" y="212">5</text>
    <text x="388" y="212">6</text>
    <text x="444" y="212">7</text>
    <text x="500" y="212">8</text>
    <text x="556" y="212">9</text>
    <text x="612" y="212">10</text>
    <text x="668" y="212">11</text>
    <text x="724" y="212">12</text>
    <text x="780" y="212">13</text>
    <text x="836" y="212">14</text>
    <text x="892" y="212">15</text>
  </g>

  <!-- wrap rule, inline on the wrap path -->
  <text x="472" y="240" font-size="12" fill="#86868b" text-anchor="middle">idx &amp; (size − 1)</text>

  <!-- memory-ordering annotations -->
  <text x="24" y="296" font-size="12" fill="#6e6e73">kfifo_in(): copy, smp_wmb(), in += len</text>
  <text x="920" y="296" font-size="12" fill="#6e6e73" text-anchor="end">kfifo_out(): smp_rmb(), out += len</text>
</svg>
