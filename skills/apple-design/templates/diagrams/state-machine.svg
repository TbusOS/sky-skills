<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 40 960 380" role="img" aria-label="State machine: blue happy path runs from entry through Idle and the Running focus card to Done; pause, resume and error transitions stay gray, and the dashed gray reset loop returns Failed to Idle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="astm-soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <marker id="astm-arrB" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0.5 L7.5,4 L0,7.5 Z" fill="#0071e3"/>
    </marker>
    <marker id="astm-arrN" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0.5 L7.5,4 L0,7.5 Z" fill="#aeaeb2"/>
    </marker>
  </defs>

  <rect x="0" y="40" width="960" height="380" fill="#ffffff"/>

  <!-- happy path: the single blue story, entry -> Idle -> Running -> Done -->
  <g fill="none" stroke="#0071e3" stroke-width="1.8">
    <line x1="40" y1="108" x2="92" y2="108" marker-end="url(#astm-arrB)"/>
    <line x1="272" y1="108" x2="416" y2="108" marker-end="url(#astm-arrB)"/>
    <line x1="620" y1="108" x2="756" y2="108" marker-end="url(#astm-arrB)"/>
  </g>
  <circle cx="31" cy="108" r="7" fill="#0071e3"/>

  <!-- secondary transitions: gray solid; reset is the only dashed return loop -->
  <g fill="none" stroke="#aeaeb2" stroke-width="1.2">
    <line x1="470" y1="152" x2="470" y2="260" marker-end="url(#astm-arrN)"/>
    <line x1="570" y1="264" x2="570" y2="156" marker-end="url(#astm-arrN)"/>
    <path d="M600,152 V200 Q600,208 608,208 H840 Q848,208 848,216 V260" marker-end="url(#astm-arrN)"/>
    <path d="M848,352 V388 Q848,396 840,396 H192 Q184,396 184,388 V156" stroke-dasharray="4 3" marker-end="url(#astm-arrN)"/>
  </g>

  <!-- transition labels -->
  <text x="344" y="92" font-size="11" font-weight="600" fill="#0071e3" text-anchor="middle">start</text>
  <text x="688" y="92" font-size="11" font-weight="600" fill="#0071e3" text-anchor="middle">success</text>
  <text x="460" y="212" font-size="12" fill="#86868b" text-anchor="end">pause</text>
  <text x="580" y="212" font-size="12" fill="#86868b">resume</text>
  <text x="724" y="198" font-size="12" fill="#86868b" text-anchor="middle">error · retry ≤ 2</text>
  <text x="516" y="386" font-size="12" fill="#86868b" text-anchor="middle">reset</text>

  <!-- state cards: white, rx 14, no stroke, soft shadow; Running is the single blue focus card -->
  <g filter="url(#astm-soft)">
    <rect x="96" y="64" width="176" height="88" rx="14" fill="#ffffff"/>
    <rect x="420" y="64" width="200" height="88" rx="14" fill="#ffffff" stroke="#0071e3" stroke-width="1.5"/>
    <rect x="760" y="64" width="176" height="88" rx="14" fill="#ffffff"/>
    <rect x="420" y="264" width="200" height="88" rx="14" fill="#ffffff"/>
    <rect x="760" y="264" width="176" height="88" rx="14" fill="#ffffff"/>
  </g>

  <!-- numbered badges on the happy path -->
  <g font-size="11" font-weight="600" text-anchor="middle">
    <circle cx="344" cy="108" r="10" fill="#0071e3"/><text x="344" y="112" fill="#ffffff">1</text>
    <circle cx="688" cy="108" r="10" fill="#0071e3"/><text x="688" y="112" fill="#ffffff">2</text>
  </g>

  <!-- state names -->
  <g font-size="14" font-weight="600" fill="#1d1d1f">
    <text x="120" y="102">Idle</text>
    <text x="444" y="102">Running</text>
    <text x="784" y="102">Done</text>
    <text x="444" y="302">Paused</text>
    <text x="784" y="302">Failed</text>
  </g>

  <!-- state sub-lines -->
  <g font-size="12" fill="#86868b">
    <text x="120" y="126">awaiting job</text>
    <text x="444" y="126">executing steps</text>
    <text x="784" y="126">all gates green</text>
    <text x="444" y="326">operator hold</text>
    <text x="784" y="326">retries exhausted</text>
  </g>
</svg>
