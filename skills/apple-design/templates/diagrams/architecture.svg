<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" role="img" aria-label="Layered architecture: pale-gray groups, soft-shadow white cards, single blue accent path">
  <defs>
    <filter id="arch-soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <marker id="arch-arrB" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0.5 L7.5,4 L0,7.5 Z" fill="#0071e3"/>
    </marker>
    <marker id="arch-arrN" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0.5 L7.5,4 L0,7.5 Z" fill="#aeaeb2"/>
    </marker>
  </defs>

  <rect width="960" height="640" fill="#ffffff"/>

  <!-- groups: pale gray, large radius, no border -->
  <rect x="40" y="36" width="880" height="168" rx="18" fill="#f5f5f7"/>
  <text x="68" y="72" font-size="12" font-weight="500" fill="#86868b">Presentation</text>
  <rect x="40" y="248" width="880" height="168" rx="18" fill="#f5f5f7"/>
  <text x="68" y="284" font-size="12" font-weight="500" fill="#86868b">Services</text>
  <rect x="40" y="460" width="880" height="144" rx="18" fill="#f5f5f7"/>
  <text x="68" y="496" font-size="12" font-weight="500" fill="#86868b">Data</text>

  <!-- connectors: blue main path, hairline neutral secondary -->
  <g fill="none">
    <path d="M196,184 L196,228 Q196,236 204,236 L424,236 Q432,236 432,244 L432,292" stroke="#0071e3" stroke-width="1.8" marker-end="url(#arch-arrB)"/>
    <path d="M480,396 L480,500" stroke="#0071e3" stroke-width="1.8" marker-end="url(#arch-arrB)"/>
    <path d="M480,184 L480,292" stroke="#aeaeb2" stroke-width="1.2" marker-end="url(#arch-arrN)"/>
    <path d="M764,184 L764,228 Q764,236 756,236 L536,236 Q528,236 528,244 L528,292" stroke="#aeaeb2" stroke-width="1.2" marker-end="url(#arch-arrN)"/>
    <path d="M196,396 L196,500" stroke="#aeaeb2" stroke-width="1.2" marker-end="url(#arch-arrN)"/>
    <path d="M764,396 L764,500" stroke="#aeaeb2" stroke-width="1.2" marker-end="url(#arch-arrN)"/>
  </g>

  <!-- numbered badges on the main path -->
  <g font-size="11" font-weight="600" text-anchor="middle">
    <circle cx="314" cy="236" r="10" fill="#0071e3"/>
    <text x="314" y="240" fill="#ffffff">1</text>
    <circle cx="480" cy="446" r="10" fill="#0071e3"/>
    <text x="480" y="450" fill="#ffffff">2</text>
  </g>

  <!-- row 1 -->
  <g filter="url(#arch-soft)">
    <rect x="76" y="96" width="240" height="88" rx="14" fill="#ffffff"/>
    <rect x="360" y="96" width="240" height="88" rx="14" fill="#ffffff"/>
    <rect x="644" y="96" width="240" height="88" rx="14" fill="#ffffff"/>
  </g>
  <g transform="translate(100,128)" fill="none" stroke="#6e6e73" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <rect x="1" y="1" width="22" height="16" rx="3"/>
    <line x1="8" y1="22" x2="16" y2="22"/><line x1="12" y1="17" x2="12" y2="22"/>
  </g>
  <text x="140" y="134" font-size="15" font-weight="600" fill="#1d1d1f">Views</text>
  <text x="140" y="156" font-size="12" fill="#86868b">Declarative UI</text>
  <g transform="translate(384,128)" fill="none" stroke="#6e6e73" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M2 12 h7"/>
    <path d="M9 12 c4 0 4 -6 8 -6 h3"/>
    <path d="M9 12 c4 0 4 6 8 6 h3"/>
    <polyline points="17.5,3 20.5,6 17.5,9"/>
    <polyline points="17.5,15 20.5,18 17.5,21"/>
  </g>
  <text x="424" y="134" font-size="15" font-weight="600" fill="#1d1d1f">Routing</text>
  <text x="424" y="156" font-size="12" fill="#86868b">Deep links</text>
  <g transform="translate(668,128)" fill="none" stroke="#6e6e73" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/>
    <path d="M12 2 v4 M12 18 v4 M2 12 h4 M18 12 h4"/>
  </g>
  <text x="708" y="134" font-size="15" font-weight="600" fill="#1d1d1f">State</text>
  <text x="708" y="156" font-size="12" fill="#86868b">Observable models</text>

  <!-- row 2: API client is the single blue focal card -->
  <g filter="url(#arch-soft)">
    <rect x="76" y="308" width="240" height="88" rx="14" fill="#ffffff"/>
    <rect x="360" y="308" width="240" height="88" rx="14" fill="#ffffff" stroke="#0071e3" stroke-width="1.5"/>
    <rect x="644" y="308" width="240" height="88" rx="14" fill="#ffffff"/>
  </g>
  <g transform="translate(100,340)" fill="none" stroke="#6e6e73" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M13 2 L4 14 h7 l-2 8 9 -12 h-7 Z"/>
  </g>
  <text x="140" y="346" font-size="15" font-weight="600" fill="#1d1d1f">Cache</text>
  <text x="140" y="368" font-size="12" fill="#86868b">Edge &amp; memory</text>
  <g transform="translate(384,340)" fill="none" stroke="#0071e3" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="9.5"/>
    <path d="M2.5 12 h19 M12 2.5 c3.5 3 3.5 16 0 19 c-3.5 -3 -3.5 -16 0 -19 Z"/>
  </g>
  <text x="424" y="346" font-size="15" font-weight="600" fill="#1d1d1f">API client</text>
  <text x="424" y="368" font-size="12" fill="#86868b">REST &amp; GraphQL</text>
  <g transform="translate(668,340)" fill="none" stroke="#6e6e73" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <rect x="4" y="10" width="16" height="10" rx="2"/>
    <path d="M8 10 V7 a4 4 0 0 1 8 0 v3"/>
  </g>
  <text x="708" y="346" font-size="15" font-weight="600" fill="#1d1d1f">Auth</text>
  <text x="708" y="368" font-size="12" fill="#86868b">Tokens &amp; sessions</text>

  <!-- row 3 -->
  <g filter="url(#arch-soft)">
    <rect x="76" y="500" width="240" height="72" rx="14" fill="#ffffff"/>
    <rect x="360" y="500" width="240" height="72" rx="14" fill="#ffffff"/>
    <rect x="644" y="500" width="240" height="72" rx="14" fill="#ffffff"/>
  </g>
  <g transform="translate(98,524)" fill="none" stroke="#6e6e73" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2" y="3" width="16" height="6.5" rx="1.6"/>
    <rect x="2" y="11.5" width="16" height="6.5" rx="1.6"/>
    <circle cx="14.8" cy="6.2" r="0.9" fill="#6e6e73" stroke="none"/>
    <circle cx="14.8" cy="14.8" r="0.9" fill="#6e6e73" stroke="none"/>
  </g>
  <text x="136" y="530" font-size="14" font-weight="600" fill="#1d1d1f">Object store</text>
  <text x="136" y="550" font-size="12" fill="#86868b">Media &amp; backups</text>
  <g transform="translate(382,524)" fill="none" stroke="#6e6e73" stroke-width="1.5" stroke-linecap="round">
    <ellipse cx="10" cy="4.5" rx="7" ry="2.6"/>
    <path d="M3 4.5 v11 c0 1.5 3.1 2.6 7 2.6 s7 -1.1 7 -2.6 v-11"/>
    <path d="M3 10 c0 1.5 3.1 2.6 7 2.6 s7 -1.1 7 -2.6"/>
  </g>
  <text x="420" y="530" font-size="14" font-weight="600" fill="#1d1d1f">Database</text>
  <text x="420" y="550" font-size="12" fill="#86868b">Postgres cluster</text>
  <g transform="translate(666,524)" fill="none" stroke="#6e6e73" stroke-width="1.5" stroke-linecap="round">
    <circle cx="3.5" cy="4" r="1.1" fill="#6e6e73" stroke="none"/><line x1="7.5" y1="4" x2="17" y2="4"/>
    <circle cx="3.5" cy="9.5" r="1.1" fill="#6e6e73" stroke="none"/><line x1="7.5" y1="9.5" x2="17" y2="9.5"/>
    <circle cx="3.5" cy="15" r="1.1" fill="#6e6e73" stroke="none"/><line x1="7.5" y1="15" x2="17" y2="15"/>
  </g>
  <text x="704" y="530" font-size="14" font-weight="600" fill="#1d1d1f">Queue</text>
  <text x="704" y="550" font-size="12" fill="#86868b">Background jobs</text>
</svg>
