<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact Apple Business — Apple</title>
  <link rel="stylesheet" href="../assets/apple.css">
</head>
<body>
  <nav class="apple-nav" aria-label="Global">
    <div class="apple-nav-inner">
      <a href="#" aria-label="Apple"><span aria-hidden="true">&#63743;</span><span class="apple-sr-only">Apple</span></a>
      <div>
        <a href="#">Business</a>
        <a href="#">Mac</a>
        <a href="#">iPad</a>
        <a href="#">iPhone</a>
        <a href="#">Support</a>
      </div>
      <div>
        <button class="apple-search-trigger" aria-label="Search apple.com">&#128269;</button>
      </div>
    </div>
  </nav>

  <main class="apple-container" style="max-width:560px; padding-block: var(--space-9);">
    <article>
      <p class="apple-badge">Apple Business</p>
      <h1 style="font-size:40px; margin:var(--space-4) 0 var(--space-4);">Contact us</h1>
      <p class="apple-lead">Tell us a little about your team and we&rsquo;ll get back to you within one business day.</p>

      <form style="margin-top:var(--space-8); display:flex; flex-direction:column; gap:var(--space-5);" onsubmit="event.preventDefault();">
        <div>
          <label class="apple-label" for="name">Full name</label>
          <input class="apple-input" id="name" name="name" type="text" autocomplete="name" placeholder="Jane Appleseed">
        </div>

        <div>
          <label class="apple-label" for="email">Work email</label>
          <input class="apple-input" id="email" name="email" type="email" autocomplete="email" placeholder="jane@company.com">
        </div>

        <div>
          <label class="apple-label" for="size">Company size</label>
          <select class="apple-select" id="size" name="size">
            <option>1&ndash;10</option>
            <option>11&ndash;50</option>
            <option>51&ndash;200</option>
            <option>201+</option>
          </select>
        </div>

        <div>
          <label class="apple-label">Which device fits your team?</label>
          <div class="apple-segmented" role="tablist" aria-label="Device preference">
            <button type="button" class="is-active">Mac</button>
            <button type="button">iPad</button>
            <button type="button">iPhone</button>
          </div>
        </div>

        <fieldset style="border:0; padding:0; margin:0;">
          <legend class="apple-label">How did you hear about us?</legend>
          <label style="display:flex; align-items:center; gap:var(--space-3); padding:var(--space-2) 0;">
            <input class="apple-radio" type="radio" name="source" value="search" checked>
            Search engine
          </label>
          <label style="display:flex; align-items:center; gap:var(--space-3); padding:var(--space-2) 0;">
            <input class="apple-radio" type="radio" name="source" value="referral">
            Referral from a colleague
          </label>
          <label style="display:flex; align-items:center; gap:var(--space-3); padding:var(--space-2) 0;">
            <input class="apple-radio" type="radio" name="source" value="event">
            Apple event or keynote
          </label>
        </fieldset>

        <div>
          <label class="apple-label">Preferences</label>
          <label style="display:flex; align-items:center; gap:var(--space-3); padding:var(--space-2) 0;">
            <input class="apple-checkbox" type="checkbox" name="newsletter" checked>
            Subscribe to Apple Business newsletter
          </label>
          <label style="display:flex; align-items:center; justify-content:space-between; padding:var(--space-2) 0;">
            <span>Enable notifications about new Mac for Business releases</span>
            <input type="checkbox" class="apple-toggle" checked>
          </label>
        </div>

        <div>
          <label class="apple-label" for="message">Message</label>
          <textarea class="apple-textarea" id="message" name="message" rows="4" placeholder="Tell us about your project or the devices you plan to deploy."></textarea>
        </div>

        <div style="margin-top:var(--space-3);">
          <button type="submit" class="apple-button">Submit</button>
          <p class="apple-caption" style="margin-top:var(--space-3);">
            By submitting, you agree to our <a class="apple-link apple-link--no-arrow" href="#">Privacy Policy</a>.
          </p>
        </div>
      </form>
    </article>
  </main>
</body>
</html>
