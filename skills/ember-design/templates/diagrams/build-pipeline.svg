<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 324" role="img" aria-label="Linux kernel build pipeline from Kconfig sources through gcc, ld and objcopy to Image.gz, with a parallel devicetree branch merged by mkimage into the boot.itb focus card" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="embld-sh" x="-20%" y="-30%" width="140%" height="180%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#492d22" flood-opacity="0.08"/>
    </filter>
    <marker id="embld-arrG" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0.5 L7.5,4 L0,7.5 Z" fill="#c49464"/>
    </marker>
    <marker id="embld-arrW" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0.5 L7.5,4 L0,7.5 Z" fill="#8a7564"/>
    </marker>
  </defs>

  <!-- group container: warm beige, mono small label -->
  <rect width="1060" height="324" rx="16" fill="#fbeedd" stroke="#e6d9bf"/>
  <text x="32" y="36" font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace" font-size="11" letter-spacing="1.1" fill="#8a7564">LINUX KERNEL · BUILD PIPELINE</text>
  <text x="1028" y="36" font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace" font-size="11" fill="#8a7564" text-anchor="end">make ARCH=arm64 Image.gz dtbs</text>

  <!-- gold main path -->
  <g fill="none" stroke="#c49464" stroke-width="1.8">
    <line x1="216" y1="100" x2="252" y2="100" marker-end="url(#embld-arrG)"/>
    <line x1="380" y1="100" x2="416" y2="100" marker-end="url(#embld-arrG)"/>
    <line x1="532" y1="100" x2="568" y2="100" marker-end="url(#embld-arrG)"/>
    <line x1="692" y1="100" x2="728" y2="100" marker-end="url(#embld-arrG)"/>
    <line x1="864" y1="100" x2="900" y2="100" marker-end="url(#embld-arrG)"/>
    <path d="M968,128 V160 Q968,168 960,168 H796 Q788,168 788,176 V200" marker-end="url(#embld-arrG)"/>
    <line x1="860" y1="232" x2="896" y2="232" marker-end="url(#embld-arrG)"/>
  </g>

  <!-- devicetree branch: warm gray, merges into mkimage -->
  <g fill="none" stroke="#8a7564" stroke-width="1.2">
    <line x1="144" y1="232" x2="180" y2="232" marker-end="url(#embld-arrW)"/>
    <line x1="336" y1="232" x2="372" y2="232" marker-end="url(#embld-arrW)"/>
    <line x1="500" y1="232" x2="712" y2="232" marker-end="url(#embld-arrW)"/>
  </g>
  <text x="608" y="220" font-size="11" fill="#8a7564" text-anchor="middle">make dtbs · runs in parallel</text>

  <!-- cards: white, borderless, warm shadow -->
  <g filter="url(#embld-sh)">
    <rect x="32" y="72" width="184" height="56" rx="12" fill="#ffffff"/>
    <rect x="256" y="72" width="124" height="56" rx="12" fill="#ffffff"/>
    <rect x="420" y="72" width="112" height="56" rx="12" fill="#ffffff"/>
    <rect x="572" y="72" width="120" height="56" rx="12" fill="#ffffff"/>
    <rect x="732" y="72" width="132" height="56" rx="12" fill="#ffffff"/>
    <rect x="904" y="72" width="132" height="56" rx="12" fill="#ffffff"/>
    <rect x="32" y="204" width="112" height="56" rx="12" fill="#ffffff"/>
    <rect x="184" y="204" width="152" height="56" rx="12" fill="#ffffff"/>
    <rect x="376" y="204" width="124" height="56" rx="12" fill="#ffffff"/>
    <rect x="716" y="204" width="144" height="56" rx="12" fill="#ffffff"/>
  </g>
  <!-- focus card: boot.itb deliverable — the only bordered card, gold 1.5px -->
  <rect x="900" y="204" width="128" height="56" rx="12" fill="#ffffff" stroke="#c49464" stroke-width="1.5" filter="url(#embld-sh)"/>

  <!-- file-corner motifs on artifact cards -->
  <g fill="none" stroke="#8a7564" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
    <g transform="translate(192,80)"><path d="M1,1 h6.5 l4,4 v8 h-10.5 Z"/><path d="M7.5,1 v4 h4"/></g>
    <g transform="translate(508,80)"><path d="M1,1 h6.5 l4,4 v8 h-10.5 Z"/><path d="M7.5,1 v4 h4"/></g>
    <g transform="translate(1012,80)"><path d="M1,1 h6.5 l4,4 v8 h-10.5 Z"/><path d="M7.5,1 v4 h4"/></g>
    <g transform="translate(120,212)"><path d="M1,1 h6.5 l4,4 v8 h-10.5 Z"/><path d="M7.5,1 v4 h4"/></g>
    <g transform="translate(476,212)"><path d="M1,1 h6.5 l4,4 v8 h-10.5 Z"/><path d="M7.5,1 v4 h4"/></g>
    <g transform="translate(1004,212)"><path d="M1,1 h6.5 l4,4 v8 h-10.5 Z"/><path d="M7.5,1 v4 h4"/></g>
  </g>

  <!-- card text: filenames and tools in mono -->
  <g font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace" font-size="13" font-weight="600" fill="#312520">
    <text x="60" y="94">.config</text>
    <text x="284" y="94">gcc -c</text>
    <text x="448" y="94">*.o</text>
    <text x="600" y="94">ld vmlinux</text>
    <text x="760" y="94">objcopy</text>
    <text x="932" y="94">Image.gz</text>
    <text x="60" y="226">*.dts</text>
    <text x="212" y="226">dtc</text>
    <text x="404" y="226">*.dtb</text>
    <text x="744" y="226">mkimage FIT</text>
  </g>
  <text x="928" y="226" font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace" font-size="13" font-weight="600" fill="#492d22">boot.itb</text>
  <g font-size="11" fill="#8a7564">
    <text x="60" y="116">Kconfig configuration</text>
    <text x="284" y="116">compile per-TU</text>
    <text x="448" y="116">object files</text>
    <text x="600" y="116">ELF + symbols</text>
    <text x="760" y="116">strip to binary</text>
    <text x="932" y="116">gzip-compressed</text>
    <text x="60" y="248">board source</text>
    <text x="212" y="248">devicetree compiler</text>
    <text x="404" y="248">flattened blob</text>
    <text x="744" y="248">kernel + dtb pack</text>
    <text x="928" y="248">bootable image</text>
  </g>

  <!-- numbered badges on tool steps: gold disc + dark text -->
  <g font-size="11" font-weight="700" text-anchor="middle" font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace">
    <circle cx="260" cy="76" r="10" fill="#c49464"/><text x="260" y="80" fill="#312520">1</text>
    <circle cx="576" cy="76" r="10" fill="#c49464"/><text x="576" y="80" fill="#312520">2</text>
    <circle cx="736" cy="76" r="10" fill="#c49464"/><text x="736" y="80" fill="#312520">3</text>
    <circle cx="720" cy="208" r="10" fill="#c49464"/><text x="720" y="212" fill="#312520">4</text>
  </g>

  <!-- legend -->
  <g font-size="11" fill="#6b5a4f">
    <line x1="36" y1="296" x2="60" y2="296" stroke="#c49464" stroke-width="1.8" stroke-linecap="round"/>
    <text x="68" y="300">main path · numbered tool steps</text>
    <line x1="288" y1="296" x2="312" y2="296" stroke="#8a7564" stroke-width="1.2" stroke-linecap="round"/>
    <text x="320" y="300">devicetree branch</text>
    <g fill="none" stroke="#8a7564" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" transform="translate(448,288)">
      <path d="M1,1 h6.5 l4,4 v8 h-10.5 Z"/><path d="M7.5,1 v4 h4"/>
    </g>
    <text x="472" y="300">file corner = artifact</text>
  </g>
</svg>
