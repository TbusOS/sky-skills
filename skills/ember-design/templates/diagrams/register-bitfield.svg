<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 944 308" role="img" aria-label="UART_CTRL register bit-field layout at offset 0x04: BAUD_DIV, PARITY, STOP, DATA8, FIFO_TH and TX/RX enable bits; RX_EN at bit 0 is the focus field, reset value 0x0000_0301" font-family="Inter, -apple-system, 'Helvetica Neue', Arial, sans-serif">

  <!-- title row -->
  <text id="emreg-title" x="24" y="32" font-size="14" font-weight="600" fill="#312520">UART_CTRL</text>
  <text x="132" y="32" font-size="11.5" fill="#6b5a4f">offset 0x04 &#183; reset 0x0000_0301</text>
  <text x="920" y="32" text-anchor="end" font-size="11" font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace" letter-spacing="1.1" fill="#8a7564">RESERVED READ AS 0 &#183; WRITE AS 0</text>

  <!-- ====== row 1 · bits 31..16 ====== -->
  <g font-size="11" font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace" fill="#8a7564" text-anchor="middle">
    <text x="52" y="64">31</text><text x="108" y="64">30</text><text x="164" y="64">29</text><text x="220" y="64">28</text>
    <text x="276" y="64">27</text><text x="332" y="64">26</text><text x="388" y="64">25</text><text x="444" y="64">24</text>
    <text x="500" y="64">23</text><text x="556" y="64">22</text><text x="612" y="64">21</text><text x="668" y="64">20</text>
    <text x="724" y="64">19</text><text x="780" y="64">18</text><text x="836" y="64">17</text><text x="892" y="64">16</text>
  </g>

  <!-- [31:24] reserved -->
  <rect x="24" y="72" width="448" height="44" fill="#ffffff" stroke="#e6d9bf"/>
  <g stroke="#e6d9bf">
    <line x1="80" y1="72" x2="80" y2="88"/><line x1="136" y1="72" x2="136" y2="88"/>
    <line x1="192" y1="72" x2="192" y2="88"/><line x1="248" y1="72" x2="248" y2="88"/>
    <line x1="304" y1="72" x2="304" y2="88"/><line x1="360" y1="72" x2="360" y2="88"/>
    <line x1="416" y1="72" x2="416" y2="88"/>
  </g>
  <!-- [23:16] BAUD_DIV -->
  <rect x="472" y="72" width="448" height="44" fill="#ffffff" stroke="#e6d9bf"/>
  <g stroke="#e6d9bf">
    <line x1="528" y1="72" x2="528" y2="88"/><line x1="584" y1="72" x2="584" y2="88"/>
    <line x1="640" y1="72" x2="640" y2="88"/><line x1="696" y1="72" x2="696" y2="88"/>
    <line x1="752" y1="72" x2="752" y2="88"/><line x1="808" y1="72" x2="808" y2="88"/>
    <line x1="864" y1="72" x2="864" y2="88"/>
  </g>
  <text x="248" y="100" font-size="12" fill="#8a7564" text-anchor="middle">&#8212;</text>
  <text x="696" y="100" font-size="12" font-weight="600" fill="#312520" text-anchor="middle">BAUD_DIV</text>

  <!-- ====== row 2 · bits 15..0 ====== -->
  <g font-size="11" font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace" fill="#8a7564" text-anchor="middle">
    <text x="52" y="144">15</text><text x="108" y="144">14</text><text x="164" y="144">13</text><text x="220" y="144">12</text>
    <text x="276" y="144">11</text><text x="332" y="144">10</text><text x="388" y="144">9</text><text x="444" y="144">8</text>
    <text x="500" y="144">7</text><text x="556" y="144">6</text><text x="612" y="144">5</text><text x="668" y="144">4</text>
    <text x="724" y="144">3</text><text x="780" y="144">2</text><text x="836" y="144">1</text><text x="892" y="144">0</text>
  </g>

  <!-- [15:12] reserved -->
  <rect x="24" y="152" width="224" height="44" fill="#ffffff" stroke="#e6d9bf"/>
  <g stroke="#e6d9bf">
    <line x1="80" y1="152" x2="80" y2="168"/><line x1="136" y1="152" x2="136" y2="168"/>
    <line x1="192" y1="152" x2="192" y2="168"/>
  </g>
  <!-- [11:10] PARITY -->
  <rect x="248" y="152" width="112" height="44" fill="#ffffff" stroke="#e6d9bf"/>
  <line x1="304" y1="152" x2="304" y2="168" stroke="#e6d9bf"/>
  <!-- [9] STOP -->
  <rect x="360" y="152" width="56" height="44" fill="#ffffff" stroke="#e6d9bf"/>
  <!-- [8] DATA8 -->
  <rect x="416" y="152" width="56" height="44" fill="#ffffff" stroke="#e6d9bf"/>
  <!-- [7:4] FIFO_TH -->
  <rect x="472" y="152" width="224" height="44" fill="#ffffff" stroke="#e6d9bf"/>
  <g stroke="#e6d9bf">
    <line x1="528" y1="152" x2="528" y2="168"/><line x1="584" y1="152" x2="584" y2="168"/>
    <line x1="640" y1="152" x2="640" y2="168"/>
  </g>
  <!-- [3:2] reserved -->
  <rect x="696" y="152" width="112" height="44" fill="#ffffff" stroke="#e6d9bf"/>
  <line x1="752" y1="152" x2="752" y2="168" stroke="#e6d9bf"/>
  <!-- [1] TX_EN -->
  <rect x="808" y="152" width="56" height="44" fill="#ffffff" stroke="#e6d9bf"/>
  <!-- [0] RX_EN · focus field: tint + gold border (the one gold spend) -->
  <rect id="emreg-focus" x="864" y="152" width="56" height="44" fill="#f5e5c8" stroke="#c49464" stroke-width="1.5"/>

  <g font-size="12" font-weight="600" fill="#312520" text-anchor="middle">
    <text x="136" y="180" font-weight="400" fill="#8a7564">&#8212;</text>
    <text x="304" y="180">PARITY</text>
    <text x="388" y="180">STOP</text>
    <text x="444" y="180">DATA8</text>
    <text x="584" y="180">FIFO_TH</text>
    <text x="752" y="180" font-weight="400" fill="#8a7564">&#8212;</text>
    <text x="836" y="180">TX_EN</text>
    <text x="892" y="180" fill="#492d22">RX_EN</text>
  </g>

  <!-- ====== legend: key fields ====== -->
  <line x1="24" y1="220" x2="920" y2="220" stroke="#e6d9bf"/>

  <rect x="24" y="238" width="12" height="12" fill="#ffffff" stroke="#e6d9bf"/>
  <text x="48" y="248" font-size="12" font-weight="600" fill="#312520">BAUD_DIV</text>
  <rect x="136" y="236" width="32" height="16" rx="8" fill="#ffffff" stroke="#e6d9bf"/>
  <text x="152" y="248" font-size="11" font-weight="600" font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace" fill="#6b5a4f" text-anchor="middle">RW</text>
  <text x="180" y="248" font-size="11.5" fill="#6b5a4f">bits 23:16 &#183; baud = PCLK / (16 &#183; div)</text>

  <rect x="24" y="274" width="12" height="12" fill="#ffffff" stroke="#e6d9bf"/>
  <text x="48" y="284" font-size="12" font-weight="600" fill="#312520">PARITY</text>
  <rect x="136" y="272" width="32" height="16" rx="8" fill="#ffffff" stroke="#e6d9bf"/>
  <text x="152" y="284" font-size="11" font-weight="600" font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace" fill="#6b5a4f" text-anchor="middle">RW</text>
  <text x="180" y="284" font-size="11.5" fill="#6b5a4f">bits 11:10 &#183; 00 none &#183; 01 even &#183; 10 odd</text>

  <rect x="492" y="238" width="12" height="12" fill="#ffffff" stroke="#e6d9bf"/>
  <text x="516" y="248" font-size="12" font-weight="600" fill="#312520">DATA8</text>
  <rect x="600" y="236" width="32" height="16" rx="8" fill="#ffffff" stroke="#e6d9bf"/>
  <text x="616" y="248" font-size="11" font-weight="600" font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace" fill="#6b5a4f" text-anchor="middle">RW</text>
  <text x="644" y="248" font-size="11.5" fill="#6b5a4f">bit 8 &#183; 1 = 8 data bits &#183; 0 = 7 data bits</text>

  <rect x="492" y="274" width="12" height="12" fill="#f5e5c8" stroke="#c49464" stroke-width="1.5"/>
  <text x="516" y="284" font-size="12" font-weight="600" fill="#492d22">RX_EN</text>
  <rect x="600" y="272" width="32" height="16" rx="8" fill="#ffffff" stroke="#e6d9bf"/>
  <text x="616" y="284" font-size="11" font-weight="600" font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace" fill="#6b5a4f" text-anchor="middle">RW</text>
  <text x="644" y="284" font-size="11.5" fill="#6b5a4f">bit 0 &#183; receiver enable &#183; 1 at reset &#183; focus</text>
</svg>
