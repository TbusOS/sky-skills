<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 704" role="img" aria-label="Layered architecture: four warm-beige layer groups with a gold numbered request path and the Orchestrator focus card" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="emarch-sh" x="-20%" y="-30%" width="140%" height="180%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#492d22" flood-opacity="0.08"/>
    </filter>
    <marker id="emarch-arr" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0.5 L7.5,4 L0,7.5 Z" fill="#c49464"/>
    </marker>
  </defs>

  <!-- layer groups: warm-beige containers, hairline edge, mono small label -->
  <g>
    <rect x="0" y="0" width="1080" height="140" rx="16" fill="#fbeedd" stroke="#e6d9bf"/>
    <rect x="0" y="188" width="1080" height="140" rx="16" fill="#fbeedd" stroke="#e6d9bf"/>
    <rect x="0" y="376" width="1080" height="140" rx="16" fill="#fbeedd" stroke="#e6d9bf"/>
    <rect x="0" y="564" width="1080" height="140" rx="16" fill="#fbeedd" stroke="#e6d9bf"/>
  </g>

  <!-- group labels (mono uppercase) + right-edge annotations -->
  <g font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace" font-size="11" letter-spacing="1.1" fill="#8a7564">
    <text x="24" y="32">PRESENTATION</text>
    <text x="24" y="220">APPLICATION</text>
    <text x="24" y="408">DOMAIN</text>
    <text x="24" y="596">INFRASTRUCTURE</text>
  </g>
  <g font-size="11" fill="#8a7564" text-anchor="end">
    <text x="1056" y="32">user-facing surfaces</text>
    <text x="1056" y="220">coordination &amp; policy</text>
    <text x="1056" y="408">business logic</text>
    <text x="1056" y="596">runtime substrate</text>
  </g>

  <!-- gold request path: the diagram's single accent narrative -->
  <g fill="none" stroke="#c49464" stroke-width="1.8">
    <line x1="540" y1="148" x2="540" y2="176" marker-end="url(#emarch-arr)"/>
    <line x1="540" y1="336" x2="540" y2="364" marker-end="url(#emarch-arr)"/>
    <line x1="540" y1="524" x2="540" y2="552" marker-end="url(#emarch-arr)"/>
  </g>
  <g font-size="11" font-weight="700" text-anchor="middle" font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace">
    <circle cx="568" cy="162" r="10" fill="#c49464"/><text x="568" y="166" fill="#312520">1</text>
    <circle cx="568" cy="350" r="10" fill="#c49464"/><text x="568" y="354" fill="#312520">2</text>
    <circle cx="568" cy="538" r="10" fill="#c49464"/><text x="568" y="542" fill="#312520">3</text>
  </g>

  <!-- node cards: white, borderless, warm shadow -->
  <g filter="url(#emarch-sh)">
    <rect x="24" y="52" width="240" height="64" rx="12" fill="#ffffff"/>
    <rect x="288" y="52" width="240" height="64" rx="12" fill="#ffffff"/>
    <rect x="552" y="52" width="240" height="64" rx="12" fill="#ffffff"/>
    <rect x="816" y="52" width="240" height="64" rx="12" fill="#ffffff"/>
    <rect x="24" y="240" width="240" height="64" rx="12" fill="#ffffff"/>
    <rect x="552" y="240" width="240" height="64" rx="12" fill="#ffffff"/>
    <rect x="816" y="240" width="240" height="64" rx="12" fill="#ffffff"/>
    <rect x="24" y="428" width="240" height="64" rx="12" fill="#ffffff"/>
    <rect x="288" y="428" width="240" height="64" rx="12" fill="#ffffff"/>
    <rect x="552" y="428" width="240" height="64" rx="12" fill="#ffffff"/>
    <rect x="816" y="428" width="240" height="64" rx="12" fill="#ffffff"/>
    <rect x="24" y="616" width="240" height="64" rx="12" fill="#ffffff"/>
    <rect x="288" y="616" width="240" height="64" rx="12" fill="#ffffff"/>
    <rect x="552" y="616" width="240" height="64" rx="12" fill="#ffffff"/>
    <rect x="816" y="616" width="240" height="64" rx="12" fill="#ffffff"/>
  </g>
  <!-- focus card: Orchestrator — the only bordered card, gold 1.5px -->
  <rect x="288" y="240" width="240" height="64" rx="12" fill="#ffffff" stroke="#c49464" stroke-width="1.5" filter="url(#emarch-sh)"/>

  <!-- card text: main 14px / sub 11px -->
  <g font-size="14" font-weight="600" fill="#312520">
    <text x="44" y="79">Web</text>
    <text x="308" y="79">Mobile</text>
    <text x="572" y="79">CLI</text>
    <text x="836" y="79">API</text>
    <text x="44" y="267">Router</text>
    <text x="572" y="267">Gateway</text>
    <text x="836" y="267">Guard</text>
    <text x="44" y="455">Billing</text>
    <text x="308" y="455">Catalog</text>
    <text x="572" y="455">Identity</text>
    <text x="836" y="455">Reporting</text>
    <text x="44" y="643">Database</text>
    <text x="308" y="643">Storage</text>
    <text x="572" y="643">Network</text>
    <text x="836" y="643">Queue</text>
  </g>
  <text x="308" y="267" font-size="14" font-weight="600" fill="#492d22">Orchestrator</text>
  <g font-size="11" fill="#8a7564">
    <text x="44" y="99">browser client</text>
    <text x="308" y="99">iOS · Android</text>
    <text x="572" y="99">terminal tools</text>
    <text x="836" y="99">REST · SDK</text>
    <text x="44" y="287">match &amp; dispatch</text>
    <text x="308" y="287">plan · collect · merge</text>
    <text x="572" y="287">tool calls · rate limits</text>
    <text x="836" y="287">allow · deny · confirm</text>
    <text x="44" y="475">invoices · ledger</text>
    <text x="308" y="475">products · pricing</text>
    <text x="572" y="475">accounts · roles</text>
    <text x="836" y="475">rollups · exports</text>
    <text x="44" y="663">Postgres cluster</text>
    <text x="308" y="663">objects · backups</text>
    <text x="572" y="663">LB · CDN · DNS</text>
    <text x="836" y="663">async jobs</text>
  </g>
</svg>
