<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 388" role="img" aria-label="SPI mode 0 read transaction timing waveform: SCLK, CS_N, MOSI and MISO lanes with data-valid windows, sampling edges at each SCLK rising edge, and tCSS / tSU timing annotations; CS_N is the gold focus signal and its active-low window is tinted" font-family="Inter, -apple-system, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="emwav-arr" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0.5 L7.5,4 L0,7.5 Z" fill="#6b5a4f"/>
    </marker>
  </defs>

  <!-- header -->
  <text x="24" y="32" font-size="11" font-weight="600" font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace" letter-spacing="1.1" fill="#8a7564">SPI MODE 0 &#183; CPOL=0 CPHA=0</text>
  <text x="1096" y="32" text-anchor="end" font-size="11" fill="#8a7564">MX25L6433F &#183; JEDEC ID read</text>

  <!-- CS_N active-low window: the focus signal's tint (one narrative with the gold line) -->
  <rect id="emwav-window" x="176" y="64" width="824" height="208" rx="4" fill="#f5e5c8"/>

  <!-- phase brackets + labels -->
  <path d="M208,62 V58 H556 V62" fill="none" stroke="#8a7564" stroke-width="1"/>
  <path d="M572,62 V58 H916 V62" fill="none" stroke="#8a7564" stroke-width="1"/>
  <text x="384" y="48" text-anchor="middle" font-size="11" fill="#6b5a4f">command phase &#183; MOSI drives</text>
  <text x="744" y="48" text-anchor="middle" font-size="11" fill="#6b5a4f">data phase &#183; MISO drives</text>

  <!-- sampling lines at each SCLK rising edge -->
  <g stroke="#e6d9bf" stroke-width="1" stroke-dasharray="3 3">
    <line x1="256" y1="64" x2="256" y2="272"/>
    <line x1="344" y1="64" x2="344" y2="272"/>
    <line x1="432" y1="64" x2="432" y2="272"/>
    <line x1="520" y1="64" x2="520" y2="272"/>
    <line x1="608" y1="64" x2="608" y2="272"/>
    <line x1="696" y1="64" x2="696" y2="272"/>
    <line x1="784" y1="64" x2="784" y2="272"/>
    <line x1="872" y1="64" x2="872" y2="272"/>
  </g>

  <!-- timing reference extensions -->
  <g stroke="#8a7564" stroke-width="1" stroke-dasharray="2 3">
    <line x1="176" y1="156" x2="176" y2="300"/>
    <line x1="256" y1="272" x2="256" y2="300"/>
    <line x1="564" y1="212" x2="564" y2="300"/>
    <line x1="608" y1="272" x2="608" y2="300"/>
  </g>

  <!-- waveforms -->
  <!-- SCLK: heavy ink, 8 periods, CPOL=0 idle low -->
  <path d="M120,96 H256 V72 H300 V96 H344 V72 H388 V96 H432 V72 H476 V96 H520 V72 H564 V96 H608 V72 H652 V96 H696 V72 H740 V96 H784 V72 H828 V96 H872 V72 H916 V96 H1096" fill="none" stroke="#492d22" stroke-width="1.8"/>
  <!-- CS_N: gold focus signal, frames the transaction -->
  <path id="emwav-focus" d="M120,128 H176 V152 H1000 V128 H1096" fill="none" stroke="#c49464" stroke-width="1.8"/>
  <!-- MOSI: secondary ink, idle low with slants into bus cells -->
  <path d="M120,208 H200 L208,196" fill="none" stroke="#6b5a4f" stroke-width="1.8"/>
  <path d="M916,196 L924,208 H1096" fill="none" stroke="#6b5a4f" stroke-width="1.8"/>
  <!-- data-valid bus cells: white against the tinted window -->
  <path d="M208,196 L216,184 H556 L564,196 L556,208 H216 Z" fill="#ffffff" stroke="#6b5a4f" stroke-width="1.4"/>
  <path d="M564,196 L572,184 H908 L916,196 L908,208 H572 Z" fill="#ffffff" stroke="#6b5a4f" stroke-width="1.4"/>
  <!-- MISO: weak ink, high-Z before and after data -->
  <path d="M120,252 H564" fill="none" stroke="#8a7564" stroke-width="1.4" stroke-dasharray="5 4"/>
  <path d="M916,252 H1096" fill="none" stroke="#8a7564" stroke-width="1.4" stroke-dasharray="5 4"/>
  <path d="M564,252 L572,240 H732 L740,252 L732,264 H572 Z" fill="#ffffff" stroke="#8a7564" stroke-width="1.4"/>
  <path d="M740,252 L748,240 H908 L916,252 L908,264 H748 Z" fill="#ffffff" stroke="#8a7564" stroke-width="1.4"/>

  <!-- timing parameter arrows -->
  <line x1="176" y1="292" x2="256" y2="292" stroke="#6b5a4f" stroke-width="1.1" marker-start="url(#emwav-arr)" marker-end="url(#emwav-arr)"/>
  <line x1="564" y1="292" x2="608" y2="292" stroke="#6b5a4f" stroke-width="1.1" marker-start="url(#emwav-arr)" marker-end="url(#emwav-arr)"/>
  <text x="216" y="284" text-anchor="middle" font-size="11" font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace" fill="#8a7564">tCSS</text>
  <text x="616" y="296" font-size="11" font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace" fill="#8a7564">tSU &#8805; 5 ns</text>

  <!-- lane labels -->
  <text x="24" y="88" font-size="12" font-weight="600" fill="#312520">SCLK</text>
  <text x="24" y="144" font-size="12" font-weight="600" fill="#492d22">CS_N</text>
  <text x="24" y="200" font-size="12" font-weight="600" fill="#312520">MOSI</text>
  <text x="24" y="256" font-size="12" font-weight="600" fill="#312520">MISO</text>

  <!-- bus cell values -->
  <text x="388" y="200" text-anchor="middle" font-size="12.5" font-weight="600" fill="#312520">0x9F</text>
  <text x="740" y="200" text-anchor="middle" font-size="12.5" font-weight="600" fill="#312520">0x00</text>
  <text x="652" y="256" text-anchor="middle" font-size="12.5" font-weight="600" fill="#312520">0xC2</text>
  <text x="828" y="256" text-anchor="middle" font-size="12.5" font-weight="600" fill="#312520">0x20</text>

  <!-- time axis -->
  <line x1="120" y1="312" x2="1096" y2="312" stroke="#e6d9bf" stroke-width="1"/>
  <g stroke="#8a7564" stroke-width="1">
    <line x1="256" y1="312" x2="256" y2="320"/>
    <line x1="344" y1="312" x2="344" y2="320"/>
    <line x1="432" y1="312" x2="432" y2="320"/>
    <line x1="520" y1="312" x2="520" y2="320"/>
    <line x1="608" y1="312" x2="608" y2="320"/>
    <line x1="696" y1="312" x2="696" y2="320"/>
    <line x1="784" y1="312" x2="784" y2="320"/>
    <line x1="872" y1="312" x2="872" y2="320"/>
    <line x1="960" y1="312" x2="960" y2="320"/>
  </g>
  <g font-size="11" font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace" fill="#8a7564" text-anchor="middle">
    <text x="256" y="336">t0</text>
    <text x="344" y="336">t1</text>
    <text x="432" y="336">t2</text>
    <text x="520" y="336">t3</text>
    <text x="608" y="336">t4</text>
    <text x="696" y="336">t5</text>
    <text x="784" y="336">t6</text>
    <text x="872" y="336">t7</text>
    <text x="960" y="336">t8</text>
  </g>

  <!-- legend -->
  <rect x="120" y="352" width="18" height="12" fill="#ffffff" stroke="#6b5a4f" stroke-width="1"/>
  <rect x="280" y="352" width="18" height="12" rx="2" fill="#f5e5c8"/>
  <line x1="464" y1="358" x2="488" y2="358" stroke="#c49464" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="664" y1="358" x2="688" y2="358" stroke="#8a7564" stroke-width="1.4" stroke-dasharray="5 4"/>
  <g font-size="11" fill="#6b5a4f">
    <text x="146" y="362">data-valid window</text>
    <text x="306" y="362">CS_N active window</text>
    <text x="496" y="362">CS_N &#183; focus signal</text>
    <text x="696" y="362">high-Z (not driven)</text>
    <text x="1096" y="362" text-anchor="end">SCLK 25 MHz &#183; bit period 40 ns</text>
  </g>
</svg>
