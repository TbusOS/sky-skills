<!doctype html>
<html lang="en" data-lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BAD anthropic page — diagram content letterboxed inside oversized viewBox</title>
<link rel="stylesheet" href="../../../anthropic-design/assets/fonts.css">
<link rel="stylesheet" href="../../../anthropic-design/assets/anthropic.css">
</head>
<body>
<nav class="anth-nav"><div class="anth-nav-inner">
  <a href="#" class="anth-nav-brand">Fixture</a>
  <a href="#" class="anth-button">Get started</a>
</div></nav>
<section class="anth-section">
  <div class="anth-container">
    <h1>Letterboxed diagram</h1>
    <p>The viewBox is 1200 wide but all content sits between x=380 and x=820 —
    37% fill. Both side margins are dead space, and every label shrinks for
    nothing. The full-size cream backplate below must NOT count as content.</p>
    <!-- Intentionally violate: content clustered in the middle of a wide viewBox -->
    <div style="max-width:900px;">
      <figure>
        <svg viewBox="0 0 1200 400" width="100%" role="img" aria-label="Two-step handshake">
          <rect x="0" y="0" width="1200" height="400" fill="#faf9f5"/>
          <rect x="380" y="80" width="200" height="90" rx="10" fill="#ffffff" stroke="#d8d4c8"/>
          <text x="410" y="130" font-family="Poppins" font-size="14" fill="#141413">client</text>
          <rect x="620" y="80" width="200" height="90" rx="10" fill="#ffffff" stroke="#d8d4c8"/>
          <text x="650" y="130" font-family="Poppins" font-size="14" fill="#141413">server</text>
          <rect x="380" y="240" width="200" height="90" rx="10" fill="#fbeee7" stroke="#d97757"/>
          <text x="410" y="290" font-family="Poppins" font-size="14" fill="#c2613f">token</text>
          <rect x="620" y="240" width="200" height="90" rx="10" fill="#ffffff" stroke="#d8d4c8"/>
          <text x="650" y="290" font-family="Poppins" font-size="14" fill="#6b6a5f">session</text>
        </svg>
        <figcaption>Handshake between client and server; orange marks the token exchange.</figcaption>
      </figure>
    </div>
  </div>
</section>
</body>
</html>
