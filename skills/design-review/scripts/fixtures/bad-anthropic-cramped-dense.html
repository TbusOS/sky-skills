<!doctype html>
<html lang="en" data-lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BAD anthropic page — dense diagram crammed into a narrow container</title>
<link rel="stylesheet" href="../../../anthropic-design/assets/fonts.css">
<link rel="stylesheet" href="../../../anthropic-design/assets/anthropic.css">
</head>
<body>
<nav class="anth-nav"><div class="anth-nav-inner">
  <a href="#" class="anth-nav-brand">Fixture</a>
  <a href="#" class="anth-button">Get started</a>
</div></nav>
<section class="anth-section">
  <div class="anth-container">
    <h1>Dense diagram in a narrow container</h1>
    <p>22 text labels rendered at 480px. Each label still clears the 9px
    legibility floor (so tiny-text stays silent), but a diagram this dense
    belongs in the wide container — reading it at this size is hard work.</p>
    <!-- Intentionally violate: >=20 <text> elements rendered under 760px wide -->
    <div style="max-width:480px;">
      <figure>
        <svg viewBox="0 0 760 420" width="100%" role="img" aria-label="Service mesh map">
          <circle cx="700" cy="30" r="10" fill="#d97757"/>
          <text x="30"  y="50"  font-family="Poppins" font-size="18" fill="#141413">node 01</text>
          <text x="215" y="50"  font-family="Poppins" font-size="18" fill="#141413">node 02</text>
          <text x="400" y="50"  font-family="Poppins" font-size="18" fill="#141413">node 03</text>
          <text x="585" y="50"  font-family="Poppins" font-size="18" fill="#141413">node 04</text>
          <text x="30"  y="120" font-family="Poppins" font-size="18" fill="#141413">node 05</text>
          <text x="215" y="120" font-family="Poppins" font-size="18" fill="#141413">node 06</text>
          <text x="400" y="120" font-family="Poppins" font-size="18" fill="#141413">node 07</text>
          <text x="585" y="120" font-family="Poppins" font-size="18" fill="#141413">node 08</text>
          <text x="30"  y="190" font-family="Poppins" font-size="18" fill="#141413">node 09</text>
          <text x="215" y="190" font-family="Poppins" font-size="18" fill="#141413">node 10</text>
          <text x="400" y="190" font-family="Poppins" font-size="18" fill="#141413">node 11</text>
          <text x="585" y="190" font-family="Poppins" font-size="18" fill="#141413">node 12</text>
          <text x="30"  y="260" font-family="Poppins" font-size="18" fill="#141413">node 13</text>
          <text x="215" y="260" font-family="Poppins" font-size="18" fill="#141413">node 14</text>
          <text x="400" y="260" font-family="Poppins" font-size="18" fill="#141413">node 15</text>
          <text x="585" y="260" font-family="Poppins" font-size="18" fill="#141413">node 16</text>
          <text x="30"  y="330" font-family="Poppins" font-size="18" fill="#141413">node 17</text>
          <text x="215" y="330" font-family="Poppins" font-size="18" fill="#141413">node 18</text>
          <text x="400" y="330" font-family="Poppins" font-size="18" fill="#141413">node 19</text>
          <text x="585" y="330" font-family="Poppins" font-size="18" fill="#141413">node 20</text>
          <text x="30"  y="400" font-family="Poppins" font-size="18" fill="#141413">node 21</text>
          <text x="215" y="400" font-family="Poppins" font-size="18" fill="#141413">node 22</text>
        </svg>
        <figcaption>Twenty-two services in one mesh map — needs the 1200px wide container.</figcaption>
      </figure>
    </div>
  </div>
</section>
</body>
</html>
