<!doctype html>
<html lang="en" data-lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BAD anthropic page — engineering diagram with zero saturated hues</title>
<link rel="stylesheet" href="../../../anthropic-design/assets/fonts.css">
<link rel="stylesheet" href="../../../anthropic-design/assets/anthropic.css">
</head>
<body>
<nav class="anth-nav"><div class="anth-nav-inner">
  <a href="#" class="anth-nav-brand">Fixture</a>
  <a href="#" class="anth-button">Get started</a>
</div></nav>
<section class="anth-section">
  <div class="anth-container">
    <h1>Gray diagram</h1>
    <p>Six node cards, eight labels, connecting lines — and not a single
    saturated hue anywhere in the SVG. White cards, gray strokes, gray text.
    It reads as an unfinished wireframe, not an anthropic diagram.</p>
    <!-- Intentionally violate: engineering diagram, zero saturated hues -->
    <figure>
      <svg viewBox="0 0 900 400" width="100%" role="img" aria-label="Build system components">
        <text x="40" y="40" font-family="Poppins" font-size="12" fill="#8c8a7d">BUILD SYSTEM</text>
        <rect x="40"  y="60"  width="220" height="90" rx="10" fill="#ffffff" stroke="#d8d4c8"/>
        <text x="70"  y="100" font-family="Poppins" font-size="14" fill="#141413">parser</text>
        <text x="70"  y="125" font-family="Lora"    font-size="11" fill="#6b6a5f">reads manifests</text>
        <rect x="340" y="60"  width="220" height="90" rx="10" fill="#ffffff" stroke="#d8d4c8"/>
        <text x="370" y="100" font-family="Poppins" font-size="14" fill="#141413">scheduler</text>
        <text x="370" y="125" font-family="Lora"    font-size="11" fill="#6b6a5f">orders targets</text>
        <rect x="640" y="60"  width="220" height="90" rx="10" fill="#ffffff" stroke="#d8d4c8"/>
        <text x="670" y="100" font-family="Poppins" font-size="14" fill="#141413">executor</text>
        <rect x="40"  y="250" width="220" height="90" rx="10" fill="#ffffff" stroke="#d8d4c8"/>
        <text x="70"  y="290" font-family="Poppins" font-size="14" fill="#141413">cache</text>
        <rect x="340" y="250" width="220" height="90" rx="10" fill="#ffffff" stroke="#d8d4c8"/>
        <text x="370" y="290" font-family="Poppins" font-size="14" fill="#141413">sandbox</text>
        <rect x="640" y="250" width="220" height="90" rx="10" fill="#ffffff" stroke="#d8d4c8"/>
        <text x="670" y="290" font-family="Poppins" font-size="14" fill="#141413">reporter</text>
        <line x1="260" y1="105" x2="340" y2="105" stroke="#a8a496" stroke-width="1.2"/>
        <line x1="560" y1="105" x2="640" y2="105" stroke="#a8a496" stroke-width="1.2"/>
        <line x1="150" y1="150" x2="150" y2="250" stroke="#a8a496" stroke-width="1.2" stroke-dasharray="4 3"/>
        <line x1="450" y1="150" x2="450" y2="250" stroke="#a8a496" stroke-width="1.2" stroke-dasharray="4 3"/>
      </svg>
      <figcaption>Build system components — parser feeds scheduler feeds executor.</figcaption>
    </figure>
  </div>
</section>
</body>
</html>
