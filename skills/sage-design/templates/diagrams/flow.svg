<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 208" role="img" aria-label="Ingest pipeline flow: four numbered steps from fetch input through verify, a Valid? decision diamond, process and publish; the green happy path runs left to right and a muted dashed fail loop returns from the diamond to verify" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="sgflow-arrG" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0.5 L7.5,4 L0,7.5 Z" fill="#97B077"/>
    </marker>
    <marker id="sgflow-arrK" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0.5 L7.5,4 L0,7.5 Z" fill="#6d6f82"/>
    </marker>
  </defs>

  <!-- panel -->
  <rect width="960" height="208" rx="16" fill="#ffffff" stroke="#e5e8da"/>
  <text x="28" y="32" font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="10.5" font-weight="500" letter-spacing="1.5" fill="#6d6f82">FLOW · INGEST PIPELINE</text>

  <!-- happy path: the single green narrative -->
  <g fill="none" stroke="#97B077" stroke-width="1.8">
    <line x1="206" y1="90" x2="240" y2="90" marker-end="url(#sgflow-arrG)"/>
    <line x1="396" y1="90" x2="459" y2="90" marker-end="url(#sgflow-arrG)"/>
    <line x1="557" y1="90" x2="589" y2="90" marker-end="url(#sgflow-arrG)"/>
    <line x1="745" y1="90" x2="779" y2="90" marker-end="url(#sgflow-arrG)"/>
  </g>
  <text x="573" y="78" font-size="11" font-weight="600" fill="#7a9561" text-anchor="middle">pass</text>

  <!-- fail loop: muted return flow -->
  <path d="M511,128 L511,160 Q511,168 503,168 L329,168 Q321,168 321,160 L321,134" fill="none" stroke="#6d6f82" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#sgflow-arrK)"/>
  <text x="416" y="186" font-size="11" fill="#6d6f82" text-anchor="middle">fail · retry</text>

  <!-- step cards -->
  <rect x="56" y="52" width="150" height="76" rx="12" fill="#ffffff" stroke="#e5e8da"/>
  <rect x="246" y="52" width="150" height="76" rx="12" fill="#ffffff" stroke="#e5e8da"/>
  <rect x="595" y="52" width="150" height="76" rx="12" fill="#ffffff" stroke="#e5e8da"/>
  <rect x="785" y="52" width="150" height="76" rx="12" fill="#ffffff" stroke="#e5e8da"/>

  <!-- decision diamond: tint + the same green narrative -->
  <path d="M511,52 L557,90 L511,128 L465,90 Z" fill="#f0f3e2" stroke="#97B077" stroke-width="1.5"/>
  <text x="511" y="94" font-size="12" font-weight="600" fill="#393C54" text-anchor="middle">Valid?</text>

  <!-- step 1: Fetch -->
  <g transform="translate(72,70)" fill="none" stroke="#393C54" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M10 2v9"/><polyline points="6,8 10,12 14,8"/><path d="M3 14v2.5a1.5 1.5 0 0 0 1.5 1.5h11a1.5 1.5 0 0 0 1.5-1.5V14"/>
  </g>
  <text x="104" y="84" font-size="13.5" font-weight="600" fill="#393C54">Fetch input</text>
  <text x="104" y="104" font-size="11" fill="#6d6f82">pull raw events</text>
  <!-- step 2: Verify -->
  <g transform="translate(262,70)" fill="none" stroke="#393C54" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M10 2 L17 5 v5 c0 4.5 -3 7.5 -7 8 -4 -0.5 -7 -3.5 -7 -8 V5 Z"/>
    <polyline points="6.5,10 9,12.5 13.5,7.5"/>
  </g>
  <text x="294" y="84" font-size="13.5" font-weight="600" fill="#393C54">Verify</text>
  <text x="294" y="104" font-size="11" fill="#6d6f82">schema + checksum</text>
  <!-- step 3: Process -->
  <g transform="translate(611,70)" fill="none" stroke="#393C54" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="3" width="14" height="14" rx="2"/>
    <path d="M7 10 l2 2 l4 -5"/>
  </g>
  <text x="643" y="84" font-size="13.5" font-weight="600" fill="#393C54">Process</text>
  <text x="643" y="104" font-size="11" fill="#6d6f82">transform · enrich</text>
  <!-- step 4: Publish -->
  <g transform="translate(801,70)" fill="none" stroke="#393C54" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M17 3 L3 9 l5.5 2 2 5.5 Z"/><path d="M8.5 11 L17 3"/>
  </g>
  <text x="833" y="84" font-size="13.5" font-weight="600" fill="#393C54">Publish</text>
  <text x="833" y="104" font-size="11" fill="#6d6f82">emit downstream</text>

  <!-- numbered badges: ink, never green -->
  <g font-size="11" font-weight="600" text-anchor="middle">
    <circle cx="60" cy="56" r="10" fill="#393C54"/><text x="60" y="60" fill="#ffffff">1</text>
    <circle cx="250" cy="56" r="10" fill="#393C54"/><text x="250" y="60" fill="#ffffff">2</text>
    <circle cx="599" cy="56" r="10" fill="#393C54"/><text x="599" y="60" fill="#ffffff">3</text>
    <circle cx="789" cy="56" r="10" fill="#393C54"/><text x="789" y="60" fill="#ffffff">4</text>
  </g>
</svg>
