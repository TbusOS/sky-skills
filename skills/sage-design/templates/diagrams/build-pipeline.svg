<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 324" role="img" aria-label="Linux kernel build pipeline from Kconfig sources through gcc, ld and objcopy to Image.gz, with a parallel devicetree branch merged by mkimage into the boot.itb deliverable, the only green-bordered focus card" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="sgbld-arrG" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0.5 L7.5,4 L0,7.5 Z" fill="#97B077"/>
    </marker>
    <marker id="sgbld-arrK" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0.5 L7.5,4 L0,7.5 Z" fill="#6d6f82"/>
    </marker>
  </defs>

  <!-- panel -->
  <rect width="1060" height="324" rx="16" fill="#ffffff" stroke="#e5e8da"/>

  <!-- header -->
  <text x="32" y="36" font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="10.5" font-weight="500" letter-spacing="1.5" fill="#6d6f82">LINUX KERNEL · BUILD PIPELINE</text>
  <text x="1028" y="36" font-size="11" font-style="italic" fill="#6d6f82" text-anchor="end">make ARCH=arm64 Image.gz dtbs</text>

  <!-- main path (green 1.8px) -->
  <g fill="none" stroke="#97B077" stroke-width="1.8">
    <line x1="216" y1="100" x2="256" y2="100" marker-end="url(#sgbld-arrG)"/>
    <line x1="380" y1="100" x2="420" y2="100" marker-end="url(#sgbld-arrG)"/>
    <line x1="532" y1="100" x2="572" y2="100" marker-end="url(#sgbld-arrG)"/>
    <line x1="692" y1="100" x2="732" y2="100" marker-end="url(#sgbld-arrG)"/>
    <line x1="864" y1="100" x2="904" y2="100" marker-end="url(#sgbld-arrG)"/>
    <path d="M968,128 V160 Q968,168 960,168 H796 Q788,168 788,176 V204" marker-end="url(#sgbld-arrG)"/>
    <line x1="860" y1="232" x2="900" y2="232" marker-end="url(#sgbld-arrG)"/>
  </g>

  <!-- devicetree branch (muted 1.2px, merges into mkimage) -->
  <g fill="none" stroke="#6d6f82" stroke-width="1.2">
    <line x1="144" y1="232" x2="184" y2="232" marker-end="url(#sgbld-arrK)"/>
    <line x1="336" y1="232" x2="376" y2="232" marker-end="url(#sgbld-arrK)"/>
    <line x1="500" y1="232" x2="716" y2="232" marker-end="url(#sgbld-arrK)"/>
  </g>
  <text x="608" y="220" font-size="11" font-style="italic" fill="#6d6f82" text-anchor="middle">make dtbs · runs in parallel</text>

  <!-- cards -->
  <g>
    <rect x="32" y="72" width="184" height="56" rx="12" fill="#ffffff" stroke="#e5e8da"/>
    <rect x="256" y="72" width="124" height="56" rx="12" fill="#ffffff" stroke="#e5e8da"/>
    <rect x="420" y="72" width="112" height="56" rx="12" fill="#ffffff" stroke="#e5e8da"/>
    <rect x="572" y="72" width="120" height="56" rx="12" fill="#ffffff" stroke="#e5e8da"/>
    <rect x="732" y="72" width="132" height="56" rx="12" fill="#ffffff" stroke="#e5e8da"/>
    <rect x="904" y="72" width="132" height="56" rx="12" fill="#ffffff" stroke="#e5e8da"/>
    <rect x="32" y="204" width="112" height="56" rx="12" fill="#ffffff" stroke="#e5e8da"/>
    <rect x="184" y="204" width="152" height="56" rx="12" fill="#ffffff" stroke="#e5e8da"/>
    <rect x="376" y="204" width="124" height="56" rx="12" fill="#ffffff" stroke="#e5e8da"/>
    <rect x="716" y="204" width="144" height="56" rx="12" fill="#ffffff" stroke="#e5e8da"/>
    <!-- deliverable focus card: tint + the only green border -->
    <rect x="900" y="204" width="128" height="56" rx="12" fill="#f0f3e2" stroke="#97B077" stroke-width="1.5"/>
  </g>

  <!-- file-corner motifs on artifact cards -->
  <g fill="none" stroke="#6d6f82" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
    <g transform="translate(192,80)"><path d="M1,1 h6.5 l4,4 v8 h-10.5 Z"/><path d="M7.5,1 v4 h4"/></g>
    <g transform="translate(508,80)"><path d="M1,1 h6.5 l4,4 v8 h-10.5 Z"/><path d="M7.5,1 v4 h4"/></g>
    <g transform="translate(1012,80)"><path d="M1,1 h6.5 l4,4 v8 h-10.5 Z"/><path d="M7.5,1 v4 h4"/></g>
    <g transform="translate(120,212)"><path d="M1,1 h6.5 l4,4 v8 h-10.5 Z"/><path d="M7.5,1 v4 h4"/></g>
    <g transform="translate(476,212)"><path d="M1,1 h6.5 l4,4 v8 h-10.5 Z"/><path d="M7.5,1 v4 h4"/></g>
    <g transform="translate(1004,212)"><path d="M1,1 h6.5 l4,4 v8 h-10.5 Z"/><path d="M7.5,1 v4 h4"/></g>
  </g>

  <!-- tool-step dots: ink (artifacts carry the file motif instead) -->
  <circle cx="272" cy="92" r="3.5" fill="#393C54"/>
  <circle cx="588" cy="92" r="3.5" fill="#393C54"/>
  <circle cx="748" cy="92" r="3.5" fill="#393C54"/>
  <circle cx="200" cy="224" r="3.5" fill="#393C54"/>
  <circle cx="732" cy="224" r="3.5" fill="#393C54"/>

  <!-- card text -->
  <g font-size="13" font-weight="600" fill="#393C54">
    <text x="48" y="96">.config + Kconfig</text>
    <text x="284" y="96">gcc -c</text>
    <text x="436" y="96">*.o</text>
    <text x="600" y="96">ld vmlinux</text>
    <text x="760" y="96">objcopy</text>
    <text x="920" y="96">Image.gz</text>
    <text x="48" y="228">*.dts</text>
    <text x="212" y="228">dtc</text>
    <text x="392" y="228">*.dtb</text>
    <text x="744" y="228">mkimage FIT</text>
    <text x="916" y="228">boot.itb</text>
  </g>
  <g font-size="11" fill="#6d6f82">
    <text x="48" y="114">build configuration</text>
    <text x="284" y="114">compile per-TU</text>
    <text x="436" y="114">object files</text>
    <text x="600" y="114">ELF + symbols</text>
    <text x="760" y="114">strip to binary</text>
    <text x="920" y="114">gzip-compressed</text>
    <text x="48" y="246">board source</text>
    <text x="212" y="246">devicetree compiler</text>
    <text x="392" y="246">flattened blob</text>
    <text x="744" y="246">kernel + dtb pack</text>
    <text x="916" y="246">bootable image</text>
  </g>

  <!-- numbered badges on tool steps of the main path (ink) -->
  <g font-size="11" font-weight="600" text-anchor="middle">
    <circle cx="260" cy="76" r="10" fill="#393C54"/><text x="260" y="80" fill="#ffffff">1</text>
    <circle cx="576" cy="76" r="10" fill="#393C54"/><text x="576" y="80" fill="#ffffff">2</text>
    <circle cx="736" cy="76" r="10" fill="#393C54"/><text x="736" y="80" fill="#ffffff">3</text>
    <circle cx="720" cy="208" r="10" fill="#393C54"/><text x="720" y="212" fill="#ffffff">4</text>
  </g>

  <!-- legend -->
  <g font-size="11" fill="#6d6f82">
    <circle cx="36" cy="296" r="4" fill="#393C54"/><text x="48" y="300">tool step</text>
    <g fill="none" stroke="#6d6f82" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" transform="translate(128,289)"><path d="M1,1 h6.5 l4,4 v8 h-10.5 Z"/><path d="M7.5,1 v4 h4"/></g>
    <text x="148" y="300">artifact</text>
    <line x1="216" y1="296" x2="240" y2="296" stroke="#97B077" stroke-width="1.8" stroke-linecap="round"/><text x="248" y="300">main path</text>
    <line x1="328" y1="296" x2="352" y2="296" stroke="#6d6f82" stroke-width="1.2" stroke-linecap="round"/><text x="360" y="300">devicetree branch</text>
  </g>
</svg>
