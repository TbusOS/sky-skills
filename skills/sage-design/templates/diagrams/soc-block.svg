<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 560" role="img" aria-label="Quartz-3550 SoC block diagram: dual Cortex-A55 CPU cluster and clock-reset unit feed an AXI NoC interconnect that fans out to memory, high-speed peripherals and an APB bridge serving low-speed peripherals; the main data path runs CPU to NoC to DDR4" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="sgsoc-arr-g" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0.5 L7.5,4 L0,7.5 Z" fill="#97B077"/>
    </marker>
    <marker id="sgsoc-arr-n" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0.5 L7.5,4 L0,7.5 Z" fill="#6d6f82"/>
    </marker>
  </defs>

  <!-- panel: white card + hairline frame -->
  <rect width="1120" height="560" rx="12" fill="#ffffff" stroke="#e5e8da"/>

  <!-- header -->
  <text x="32" y="36" font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="11" font-weight="600" letter-spacing="1.5" fill="#6d6f82">QUARTZ-3550 SoC &#183; BLOCK DIAGRAM</text>
  <text x="1088" y="36" text-anchor="end" font-size="11" fill="#6d6f82">arm64 &#183; 12 nm LP &#183; 0.8 V core rail</text>

  <!-- zones: borderless tint containers, mono numbered labels -->
  <rect x="32" y="60" width="728" height="112" rx="12" fill="#f0f3e2"/>
  <text x="56" y="88" font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="11" font-weight="600" letter-spacing="1.5" fill="#6d6f82">01 &#183; CPU SUBSYSTEM</text>
  <text x="744" y="88" text-anchor="end" font-size="11" fill="#6d6f82">DynamIQ cluster &#183; 1.8 GHz</text>

  <rect x="784" y="60" width="304" height="112" rx="12" fill="#f0f3e2"/>
  <text x="808" y="88" font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="11" font-weight="600" letter-spacing="1.5" fill="#6d6f82">02 &#183; CLOCK &amp; RESET</text>
  <text x="1072" y="88" text-anchor="end" font-size="11" fill="#6d6f82">24 MHz xtal</text>

  <rect x="32" y="332" width="336" height="164" rx="12" fill="#f0f3e2"/>
  <text x="56" y="360" font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="11" font-weight="600" letter-spacing="1.5" fill="#6d6f82">03 &#183; MEMORY</text>
  <text x="352" y="360" text-anchor="end" font-size="11" fill="#6d6f82">AXI slaves</text>

  <rect x="392" y="332" width="336" height="164" rx="12" fill="#f0f3e2"/>
  <text x="416" y="360" font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="11" font-weight="600" letter-spacing="1.5" fill="#6d6f82">04 &#183; HIGH-SPEED PERIPH</text>
  <text x="712" y="360" text-anchor="end" font-size="11" fill="#6d6f82">DMA masters</text>

  <rect x="752" y="332" width="336" height="164" rx="12" fill="#f0f3e2"/>
  <text x="776" y="360" font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="11" font-weight="600" letter-spacing="1.5" fill="#6d6f82">05 &#183; LOW-SPEED PERIPH</text>
  <text x="1072" y="360" text-anchor="end" font-size="11" fill="#6d6f82">via APB</text>

  <!-- connectors -->
  <!-- main data path: Cortex-A55 -> NoC (sage 1.8) -->
  <path d="M176,152 V196 Q176,204 184,204 H392 Q400,204 400,212 V228" fill="none" stroke="#97B077" stroke-width="1.8" marker-end="url(#sgsoc-arr-g)"/>
  <!-- main data path: NoC -> DDR4 ctrl (sage 1.8) -->
  <path d="M312,276 V296 Q312,304 304,304 H208 Q200,304 200,312 V376" fill="none" stroke="#97B077" stroke-width="1.8" marker-end="url(#sgsoc-arr-g)"/>
  <!-- clock/reset fan-out -> NoC (neutral dashed 1.2) -->
  <path d="M820,172 V196 Q820,204 812,204 H728 Q720,204 720,212 V228" fill="none" stroke="#6d6f82" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#sgsoc-arr-n)"/>
  <text x="832" y="196" font-size="11" fill="#6d6f82">clk &#183; rst</text>
  <!-- NoC <-> high-speed zone (neutral 1.2, both directions) -->
  <line x1="560" y1="276" x2="560" y2="332" stroke="#6d6f82" stroke-width="1.2" marker-start="url(#sgsoc-arr-n)" marker-end="url(#sgsoc-arr-n)"/>
  <!-- NoC -> APB bridge -> low-speed zone (neutral 1.2) -->
  <line x1="760" y1="252" x2="848" y2="252" stroke="#6d6f82" stroke-width="1.2" marker-end="url(#sgsoc-arr-n)"/>
  <line x1="936" y1="276" x2="936" y2="332" stroke="#6d6f82" stroke-width="1.2" marker-end="url(#sgsoc-arr-n)"/>

  <!-- IP cards: white + hairline; Cortex-A55 is the single focus card (sage edge) -->
  <rect x="56" y="104" width="240" height="48" rx="12" fill="#ffffff" stroke="#97B077" stroke-width="1.5"/>
  <rect x="312" y="104" width="208" height="48" rx="12" fill="#ffffff" stroke="#e5e8da"/>
  <rect x="536" y="104" width="208" height="48" rx="12" fill="#ffffff" stroke="#e5e8da"/>
  <rect x="800" y="104" width="144" height="48" rx="12" fill="#ffffff" stroke="#e5e8da"/>
  <rect x="956" y="104" width="116" height="48" rx="12" fill="#ffffff" stroke="#e5e8da"/>
  <rect x="280" y="228" width="480" height="48" rx="12" fill="#ffffff" stroke="#e5e8da"/>
  <rect x="848" y="228" width="176" height="48" rx="12" fill="#ffffff" stroke="#e5e8da"/>
  <rect x="56" y="376" width="288" height="48" rx="12" fill="#ffffff" stroke="#e5e8da"/>
  <rect x="56" y="432" width="136" height="48" rx="12" fill="#ffffff" stroke="#e5e8da"/>
  <rect x="204" y="432" width="140" height="48" rx="12" fill="#ffffff" stroke="#e5e8da"/>
  <rect x="416" y="376" width="288" height="48" rx="12" fill="#ffffff" stroke="#e5e8da"/>
  <rect x="416" y="432" width="136" height="48" rx="12" fill="#ffffff" stroke="#e5e8da"/>
  <rect x="564" y="432" width="140" height="48" rx="12" fill="#ffffff" stroke="#e5e8da"/>
  <rect x="776" y="376" width="136" height="48" rx="12" fill="#ffffff" stroke="#e5e8da"/>
  <rect x="924" y="376" width="140" height="48" rx="12" fill="#ffffff" stroke="#e5e8da"/>
  <rect x="776" y="432" width="136" height="48" rx="12" fill="#ffffff" stroke="#e5e8da"/>
  <rect x="924" y="432" width="140" height="48" rx="12" fill="#ffffff" stroke="#e5e8da"/>

  <!-- card names -->
  <g font-size="13" font-weight="600" fill="#393C54">
    <text x="72" y="128">Cortex-A55 &#215;2</text>
    <text x="328" y="128">L2 512K</text>
    <text x="552" y="128">GIC-600</text>
    <text x="816" y="128">PLL &#215;3</text>
    <text x="972" y="128">CRU</text>
    <text x="296" y="252">AXI NoC &#183; 64-bit @ 800 MHz</text>
    <text x="864" y="252">APB bridge</text>
    <text x="72" y="400">DDR4 ctrl + PHY</text>
    <text x="72" y="456">SRAM 256K</text>
    <text x="220" y="456">Boot ROM</text>
    <text x="432" y="400">PCIe Gen3 x2</text>
    <text x="432" y="456">USB 3.0</text>
    <text x="580" y="456">GbE MAC</text>
    <text x="792" y="400">UART &#215;4</text>
    <text x="940" y="400">I2C &#215;3</text>
    <text x="792" y="456">SPI &#215;2</text>
    <text x="940" y="456">GPIO</text>
  </g>

  <!-- card sub-lines -->
  <g font-size="11" fill="#6d6f82">
    <text x="72" y="144">L1 32K I/D per core</text>
    <text x="328" y="144">unified &#183; ECC</text>
    <text x="552" y="144">interrupt distributor</text>
    <text x="816" y="144">core &#183; ddr &#183; peri</text>
    <text x="972" y="144">gate &#183; reset</text>
    <text x="296" y="268">system interconnect &#183; QoS arbitration &#183; 4 masters</text>
    <text x="864" y="268">AXI-to-APB &#183; 100 MHz</text>
    <text x="72" y="416">DDR4-3200 &#183; 32-bit + ECC</text>
    <text x="72" y="472">on-chip scratch</text>
    <text x="220" y="472">64K mask</text>
    <text x="432" y="416">root complex &#183; MSI-X</text>
    <text x="432" y="472">xHCI DRD</text>
    <text x="580" y="472">RGMII &#183; TSO</text>
    <text x="792" y="416">16550A</text>
    <text x="940" y="416">400 kHz FM</text>
    <text x="792" y="472">mode 0-3</text>
    <text x="940" y="472">4 banks &#215;32</text>
  </g>

  <!-- numbered badges on main data path: ink fill + white text -->
  <g font-size="11" font-weight="600" text-anchor="middle">
    <circle cx="288" cy="204" r="10" fill="#393C54"/><text x="288" y="208" fill="#ffffff">1</text>
    <circle cx="256" cy="304" r="10" fill="#393C54"/><text x="256" y="308" fill="#ffffff">2</text>
  </g>

  <!-- legend -->
  <g font-size="11" fill="#6d6f82">
    <line x1="544" y1="524" x2="568" y2="524" stroke="#97B077" stroke-width="1.8" stroke-linecap="round"/>
    <text x="576" y="528">main data path &#183; CPU &#8594; NoC &#8594; DDR4</text>
    <line x1="800" y1="524" x2="824" y2="524" stroke="#6d6f82" stroke-width="1.2" stroke-dasharray="4 3" stroke-linecap="round"/>
    <text x="832" y="528">clk / rst</text>
    <line x1="908" y1="524" x2="932" y2="524" stroke="#6d6f82" stroke-width="1.2" stroke-linecap="round"/>
    <text x="940" y="528">secondary bus</text>
  </g>
</svg>
