<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 324" role="img" aria-label="UART_CTRL register bit-field layout at offset 0x04: BAUD_DIV, PARITY, STOP, DATA8, FIFO_TH and TX/RX enable bits, reset value 0x0000_0301; RX_EN is the focus field" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif">

  <!-- panel: white card + hairline frame -->
  <rect width="1040" height="324" rx="12" fill="#ffffff" stroke="#e5e8da"/>

  <!-- title row -->
  <text x="72" y="44" font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="13" font-weight="600" fill="#393C54">UART_CTRL</text>
  <text x="184" y="44" font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="11" fill="#6d6f82">offset 0x04 &#183; reset 0x0000_0301</text>
  <text x="968" y="44" font-size="11" fill="#6d6f82" text-anchor="end">reserved bits read as 0 &#183; write as 0</text>

  <!-- ====== row 1 · bits 31..16 ====== -->
  <g font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="11" fill="#6d6f82" text-anchor="middle">
    <text x="100" y="76">31</text><text x="156" y="76">30</text><text x="212" y="76">29</text><text x="268" y="76">28</text>
    <text x="324" y="76">27</text><text x="380" y="76">26</text><text x="436" y="76">25</text><text x="492" y="76">24</text>
    <text x="548" y="76">23</text><text x="604" y="76">22</text><text x="660" y="76">21</text><text x="716" y="76">20</text>
    <text x="772" y="76">19</text><text x="828" y="76">18</text><text x="884" y="76">17</text><text x="940" y="76">16</text>
  </g>

  <!-- [31:24] reserved -->
  <rect x="72" y="84" width="448" height="44" fill="#ffffff" stroke="#e5e8da"/>
  <g stroke="#e5e8da">
    <line x1="128" y1="84" x2="128" y2="100"/><line x1="184" y1="84" x2="184" y2="100"/>
    <line x1="240" y1="84" x2="240" y2="100"/><line x1="296" y1="84" x2="296" y2="100"/>
    <line x1="352" y1="84" x2="352" y2="100"/><line x1="408" y1="84" x2="408" y2="100"/>
    <line x1="464" y1="84" x2="464" y2="100"/>
  </g>
  <!-- [23:16] BAUD_DIV -->
  <rect x="520" y="84" width="448" height="44" fill="#eef2de" stroke="#e5e8da"/>
  <g stroke="#e5e8da">
    <line x1="576" y1="84" x2="576" y2="100"/><line x1="632" y1="84" x2="632" y2="100"/>
    <line x1="688" y1="84" x2="688" y2="100"/><line x1="744" y1="84" x2="744" y2="100"/>
    <line x1="800" y1="84" x2="800" y2="100"/><line x1="856" y1="84" x2="856" y2="100"/>
    <line x1="912" y1="84" x2="912" y2="100"/>
  </g>
  <text x="296" y="112" font-size="12" fill="#6d6f82" text-anchor="middle">&#8212;</text>
  <text x="744" y="112" font-size="12" font-weight="600" fill="#393C54" text-anchor="middle">BAUD_DIV</text>

  <!-- ====== row 2 · bits 15..0 ====== -->
  <g font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="11" fill="#6d6f82" text-anchor="middle">
    <text x="100" y="156">15</text><text x="156" y="156">14</text><text x="212" y="156">13</text><text x="268" y="156">12</text>
    <text x="324" y="156">11</text><text x="380" y="156">10</text><text x="436" y="156">9</text><text x="492" y="156">8</text>
    <text x="548" y="156">7</text><text x="604" y="156">6</text><text x="660" y="156">5</text><text x="716" y="156">4</text>
    <text x="772" y="156">3</text><text x="828" y="156">2</text><text x="884" y="156">1</text><text x="940" y="156">0</text>
  </g>

  <!-- [15:12] reserved -->
  <rect x="72" y="164" width="224" height="44" fill="#ffffff" stroke="#e5e8da"/>
  <g stroke="#e5e8da">
    <line x1="128" y1="164" x2="128" y2="180"/><line x1="184" y1="164" x2="184" y2="180"/>
    <line x1="240" y1="164" x2="240" y2="180"/>
  </g>
  <!-- [11:10] PARITY -->
  <rect x="296" y="164" width="112" height="44" fill="#eef2de" stroke="#e5e8da"/>
  <line x1="352" y1="164" x2="352" y2="180" stroke="#e5e8da"/>
  <!-- [9] STOP -->
  <rect x="408" y="164" width="56" height="44" fill="#eef2de" stroke="#e5e8da"/>
  <!-- [8] DATA8 -->
  <rect x="464" y="164" width="56" height="44" fill="#eef2de" stroke="#e5e8da"/>
  <!-- [7:4] FIFO_TH -->
  <rect x="520" y="164" width="224" height="44" fill="#eef2de" stroke="#e5e8da"/>
  <g stroke="#e5e8da">
    <line x1="576" y1="164" x2="576" y2="180"/><line x1="632" y1="164" x2="632" y2="180"/>
    <line x1="688" y1="164" x2="688" y2="180"/>
  </g>
  <!-- [3:2] reserved -->
  <rect x="744" y="164" width="112" height="44" fill="#ffffff" stroke="#e5e8da"/>
  <line x1="800" y1="164" x2="800" y2="180" stroke="#e5e8da"/>
  <!-- [1] TX_EN -->
  <rect x="856" y="164" width="56" height="44" fill="#eef2de" stroke="#e5e8da"/>
  <!-- [0] RX_EN · focus field: tint + sage 1.5px edge + 4px top bar -->
  <rect x="912" y="164" width="56" height="44" fill="#f0f3e2" stroke="#97B077" stroke-width="1.5"/>
  <rect x="912" y="164" width="56" height="4" fill="#97B077"/>

  <g font-size="12" font-weight="600" fill="#393C54" text-anchor="middle">
    <text x="184" y="192" font-weight="400" fill="#6d6f82">&#8212;</text>
    <text x="352" y="192">PARITY</text>
    <text x="436" y="192">STOP</text>
    <text x="492" y="192">DATA8</text>
    <text x="632" y="192">FIFO_TH</text>
    <text x="800" y="192" font-weight="400" fill="#6d6f82">&#8212;</text>
    <text x="884" y="192">TX_EN</text>
    <text x="940" y="192">RX_EN</text>
  </g>

  <!-- ====== legend: key fields ====== -->
  <line x1="72" y1="232" x2="968" y2="232" stroke="#e5e8da"/>

  <rect x="72" y="248" width="12" height="12" rx="2" fill="#eef2de" stroke="#e5e8da"/>
  <text x="96" y="260" font-size="12" font-weight="600" fill="#393C54">BAUD_DIV</text>
  <rect x="176" y="248" width="32" height="16" rx="8" fill="#393C54"/>
  <text x="192" y="260" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">RW</text>
  <text x="216" y="260" font-size="11.5" fill="#6d6f82">bits 23:16 &#183; baud = PCLK / (16 &#183; div)</text>

  <rect x="72" y="280" width="12" height="12" rx="2" fill="#eef2de" stroke="#e5e8da"/>
  <text x="96" y="292" font-size="12" font-weight="600" fill="#393C54">PARITY</text>
  <rect x="176" y="280" width="32" height="16" rx="8" fill="#393C54"/>
  <text x="192" y="292" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">RW</text>
  <text x="216" y="292" font-size="11.5" fill="#6d6f82">bits 11:10 &#183; 00 none &#183; 01 even &#183; 10 odd</text>

  <rect x="540" y="248" width="12" height="12" rx="2" fill="#eef2de" stroke="#e5e8da"/>
  <text x="564" y="260" font-size="12" font-weight="600" fill="#393C54">DATA8</text>
  <rect x="640" y="248" width="32" height="16" rx="8" fill="#393C54"/>
  <text x="656" y="260" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">RW</text>
  <text x="680" y="260" font-size="11.5" fill="#6d6f82">bit 8 &#183; 1 = 8 data bits &#183; 0 = 7 data bits</text>

  <rect x="540" y="280" width="12" height="12" rx="2" fill="#f0f3e2" stroke="#97B077" stroke-width="1.5"/>
  <text x="564" y="292" font-size="12" font-weight="600" fill="#393C54">RX_EN</text>
  <rect x="640" y="280" width="32" height="16" rx="8" fill="#393C54"/>
  <text x="656" y="292" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">RW</text>
  <text x="680" y="292" font-size="11.5" fill="#6d6f82">bit 0 &#183; receiver enable &#183; 1 at reset &#183; focus field</text>
</svg>
