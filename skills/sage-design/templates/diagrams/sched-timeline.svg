<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 360" role="img" aria-label="Scheduler timeline: CFS run view across CPU 0 to CPU 2 where app: render runs on CPU 0, is preempted by the eth0 IRQ thread at 4 ms, then migrates to CPU 2 under load balancing while kworker runs periodically on CPU 1; app: render is the tracked task" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="sgsch-arr-g" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0.5 L7.5,4 L0,7.5 Z" fill="#97B077"/>
    </marker>
  </defs>

  <!-- panel: white card + hairline frame -->
  <rect width="1120" height="360" rx="12" fill="#ffffff" stroke="#e5e8da"/>

  <!-- tick gridlines (under everything) -->
  <g stroke="#e5e8da" stroke-width="1">
    <line x1="104" y1="96" x2="104" y2="288"/>
    <line x1="264" y1="96" x2="264" y2="288"/>
    <line x1="424" y1="96" x2="424" y2="288"/>
    <line x1="584" y1="96" x2="584" y2="288"/>
    <line x1="744" y1="96" x2="744" y2="288"/>
    <line x1="904" y1="96" x2="904" y2="288"/>
    <line x1="1064" y1="96" x2="1064" y2="288"/>
  </g>

  <!-- time axis -->
  <g stroke="#6d6f82" stroke-width="1">
    <line x1="104" y1="288" x2="1064" y2="288"/>
    <line x1="104" y1="288" x2="104" y2="296"/>
    <line x1="264" y1="288" x2="264" y2="296"/>
    <line x1="424" y1="288" x2="424" y2="296"/>
    <line x1="584" y1="288" x2="584" y2="296"/>
    <line x1="744" y1="288" x2="744" y2="296"/>
    <line x1="904" y1="288" x2="904" y2="296"/>
    <line x1="1064" y1="288" x2="1064" y2="296"/>
  </g>

  <!-- CPU 0 lane: app 0-4 ms (tracked · deep tint + sage edge), irq/eth0 4-5 ms, idle 5-12 ms -->
  <rect x="104" y="104" width="320" height="36" rx="6" fill="#c9d1b3" stroke="#97B077" stroke-width="1.5"/>
  <rect x="424" y="104" width="80" height="36" rx="6" fill="#eef2de" stroke="#e5e8da"/>
  <rect x="504" y="104" width="560" height="36" rx="6" fill="#ffffff" stroke="#c9d1b3" stroke-dasharray="4 3"/>

  <!-- CPU 1 lane: kworker bursts every 4 ms -->
  <rect x="104" y="168" width="80" height="36" rx="6" fill="#ffffff" stroke="#c9d1b3" stroke-dasharray="4 3"/>
  <rect x="184" y="168" width="120" height="36" rx="6" fill="#eef2de" stroke="#e5e8da"/>
  <rect x="304" y="168" width="200" height="36" rx="6" fill="#ffffff" stroke="#c9d1b3" stroke-dasharray="4 3"/>
  <rect x="504" y="168" width="120" height="36" rx="6" fill="#eef2de" stroke="#e5e8da"/>
  <rect x="624" y="168" width="200" height="36" rx="6" fill="#ffffff" stroke="#c9d1b3" stroke-dasharray="4 3"/>
  <rect x="824" y="168" width="120" height="36" rx="6" fill="#eef2de" stroke="#e5e8da"/>
  <rect x="944" y="168" width="120" height="36" rx="6" fill="#ffffff" stroke="#c9d1b3" stroke-dasharray="4 3"/>

  <!-- CPU 2 lane: idle 0-5 ms, app continuation 5-9 ms (tracked), idle 9-12 ms -->
  <rect x="104" y="232" width="400" height="36" rx="6" fill="#ffffff" stroke="#c9d1b3" stroke-dasharray="4 3"/>
  <rect x="504" y="232" width="320" height="36" rx="6" fill="#c9d1b3" stroke="#97B077" stroke-width="1.5"/>
  <rect x="824" y="232" width="240" height="36" rx="6" fill="#ffffff" stroke="#c9d1b3" stroke-dasharray="4 3"/>

  <!-- IRQ event marker at 4 ms: ink, never sage -->
  <line x1="424" y1="88" x2="424" y2="104" stroke="#393C54" stroke-width="1.8"/>
  <rect x="400" y="64" width="48" height="24" rx="12" fill="#393C54"/>

  <!-- migration arrow: tracked task CPU 0 -> CPU 2 (same sage narrative) -->
  <path d="M408,140 V208 Q408,216 416,216 H512 Q520,216 520,224 V232" fill="none" stroke="#97B077" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#sgsch-arr-g)"/>

  <!-- legend swatches -->
  <rect x="104" y="328" width="20" height="16" rx="4" fill="#c9d1b3" stroke="#97B077" stroke-width="1.5"/>
  <rect x="356" y="328" width="20" height="16" rx="4" fill="#eef2de" stroke="#e5e8da"/>
  <rect x="640" y="328" width="20" height="16" rx="4" fill="#ffffff" stroke="#c9d1b3" stroke-dasharray="4 3"/>
  <rect x="744" y="328" width="36" height="16" rx="8" fill="#393C54"/>

  <!-- text layer (always last) -->
  <text x="32" y="36" font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="11" font-weight="600" letter-spacing="1.5" fill="#6d6f82">SCHED &#183; CFS RUN VIEW &#183; 12 MS WINDOW</text>
  <text x="1088" y="36" font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="11" fill="#6d6f82" text-anchor="end">trace-cmd record -e sched_switch -e sched_migrate_task</text>

  <text x="32" y="128" font-size="12" font-weight="600" fill="#393C54">CPU 0</text>
  <text x="32" y="192" font-size="12" font-weight="600" fill="#393C54">CPU 1</text>
  <text x="32" y="256" font-size="12" font-weight="600" fill="#393C54">CPU 2</text>

  <text x="424" y="80" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">IRQ</text>
  <text x="456" y="80" font-size="11" font-weight="600" fill="#393C54">eth0 rx</text>

  <text x="116" y="128" font-size="11.5" font-weight="600" fill="#393C54">app: render</text>
  <text x="436" y="128" font-size="11.5" font-weight="600" fill="#393C54">irq/eth0</text>
  <text x="516" y="128" font-size="11.5" fill="#6d6f82">idle</text>
  <text x="432" y="160" font-size="11" fill="#6d6f82">preempted by irq/eth0</text>

  <text x="116" y="192" font-size="11.5" fill="#6d6f82">idle</text>
  <text x="196" y="192" font-size="11.5" font-weight="600" fill="#393C54">kworker/u8</text>
  <text x="316" y="192" font-size="11.5" fill="#6d6f82">idle</text>
  <text x="516" y="192" font-size="11.5" font-weight="600" fill="#393C54">kworker/u8</text>
  <text x="636" y="192" font-size="11.5" fill="#6d6f82">idle</text>
  <text x="836" y="192" font-size="11.5" font-weight="600" fill="#393C54">kworker/u8</text>
  <text x="956" y="192" font-size="11.5" fill="#6d6f82">idle</text>

  <text x="532" y="220" font-size="11" fill="#6d6f82">migrate (load balance)</text>

  <text x="116" y="256" font-size="11.5" fill="#6d6f82">idle</text>
  <text x="516" y="256" font-size="11.5" font-weight="600" fill="#393C54">app: render</text>
  <text x="836" y="256" font-size="11.5" fill="#6d6f82">idle</text>

  <g font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="11" fill="#6d6f82" text-anchor="middle">
    <text x="104" y="312">0</text>
    <text x="264" y="312">2</text>
    <text x="424" y="312">4</text>
    <text x="584" y="312">6</text>
    <text x="744" y="312">8</text>
    <text x="904" y="312">10</text>
    <text x="1064" y="312">12</text>
  </g>
  <text x="1080" y="312" font-size="11" fill="#6d6f82">ms</text>

  <g font-size="11" fill="#6d6f82">
    <text x="132" y="340">app: render &#183; tracked CFS task</text>
    <text x="384" y="340">kworker / irq &#183; other tasks</text>
    <text x="668" y="340">idle</text>
    <text x="788" y="340">threaded IRQ marker</text>
  </g>
  <text x="762" y="340" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">IRQ</text>
</svg>
