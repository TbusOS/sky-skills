<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 380" role="img" aria-label="SPI mode 0 read transaction timing waveform: SCLK, CS_N, MOSI and MISO lanes with data-valid windows, sampling edges at each SCLK rising edge, and tCSS / tSU timing annotations; CS_N is the focus signal and its active window is tinted" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="sgwav-arr-n" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0.5 L7.5,4 L0,7.5 Z" fill="#6d6f82"/>
    </marker>
  </defs>

  <!-- panel: white card + hairline frame -->
  <rect x="0" y="0" width="1120" height="380" rx="12" fill="#ffffff" stroke="#e5e8da"/>

  <!-- CS_N active window tint (focus narrative, behind everything) -->
  <rect x="176" y="60" width="824" height="212" rx="8" fill="#f0f3e2"/>

  <!-- title pill: ink fill + white text (chips never sit on sage green) -->
  <rect x="24" y="16" width="200" height="24" rx="12" fill="#393C54"/>
  <text x="124" y="32" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">SPI mode 0 &#183; CPOL=0 CPHA=0</text>
  <text x="1096" y="32" text-anchor="end" font-size="11" fill="#6d6f82">MX25L6433F &#183; JEDEC ID read</text>

  <!-- data-valid windows (bus cells): MOSI = white cell, MISO = deep tint cell -->
  <!-- MOSI 0x9F -->
  <path d="M208,196 L216,184 H556 L564,196 L556,208 H216 Z" fill="#ffffff" stroke="#393C54" stroke-width="1.4"/>
  <!-- MOSI 0x00 -->
  <path d="M564,196 L572,184 H908 L916,196 L908,208 H572 Z" fill="#ffffff" stroke="#393C54" stroke-width="1.4"/>
  <!-- MISO 0xC2 -->
  <path d="M564,252 L572,240 H732 L740,252 L732,264 H572 Z" fill="#c9d1b3" stroke="#393C54" stroke-width="1.2"/>
  <!-- MISO 0x20 -->
  <path d="M740,252 L748,240 H908 L916,252 L908,264 H748 Z" fill="#c9d1b3" stroke="#393C54" stroke-width="1.2"/>

  <!-- sampling lines at each SCLK rising edge -->
  <g stroke="#c9d1b3" stroke-width="1" stroke-dasharray="3 3">
    <line x1="256" y1="64" x2="256" y2="272"/>
    <line x1="344" y1="64" x2="344" y2="272"/>
    <line x1="432" y1="64" x2="432" y2="272"/>
    <line x1="520" y1="64" x2="520" y2="272"/>
    <line x1="608" y1="64" x2="608" y2="272"/>
    <line x1="696" y1="64" x2="696" y2="272"/>
    <line x1="784" y1="64" x2="784" y2="272"/>
    <line x1="872" y1="64" x2="872" y2="272"/>
  </g>

  <!-- timing reference extensions -->
  <g stroke="#6d6f82" stroke-width="1" stroke-dasharray="2 3">
    <line x1="176" y1="156" x2="176" y2="300"/>
    <line x1="256" y1="272" x2="256" y2="300"/>
    <line x1="564" y1="212" x2="564" y2="300"/>
    <line x1="608" y1="272" x2="608" y2="300"/>
  </g>

  <!-- phase brackets -->
  <path d="M208,62 V58 H556 V62" fill="none" stroke="#6d6f82" stroke-width="1"/>
  <path d="M572,62 V58 H916 V62" fill="none" stroke="#6d6f82" stroke-width="1"/>

  <!-- time axis -->
  <line x1="120" y1="312" x2="1080" y2="312" stroke="#e5e8da" stroke-width="1"/>
  <g stroke="#6d6f82" stroke-width="1">
    <line x1="256" y1="312" x2="256" y2="320"/>
    <line x1="344" y1="312" x2="344" y2="320"/>
    <line x1="432" y1="312" x2="432" y2="320"/>
    <line x1="520" y1="312" x2="520" y2="320"/>
    <line x1="608" y1="312" x2="608" y2="320"/>
    <line x1="696" y1="312" x2="696" y2="320"/>
    <line x1="784" y1="312" x2="784" y2="320"/>
    <line x1="872" y1="312" x2="872" y2="320"/>
    <line x1="960" y1="312" x2="960" y2="320"/>
  </g>

  <!-- waveforms -->
  <!-- SCLK: 8 periods, CPOL=0 idle low (ink) -->
  <path d="M120,96 H256 V72 H300 V96 H344 V72 H388 V96 H432 V72 H476 V96 H520 V72 H564 V96 H608 V72 H652 V96 H696 V72 H740 V96 H784 V72 H828 V96 H872 V72 H916 V96 H1080" fill="none" stroke="#393C54" stroke-width="1.8"/>
  <!-- CS_N: frames the transaction (sage focus signal) -->
  <path d="M120,128 H176 V152 H1000 V128 H1080" fill="none" stroke="#97B077" stroke-width="1.8"/>
  <!-- MOSI idle low, entry/exit slants into bus cells (ink) -->
  <path d="M120,208 H200 L208,196" fill="none" stroke="#393C54" stroke-width="1.8"/>
  <path d="M916,196 L924,208 H1080" fill="none" stroke="#393C54" stroke-width="1.8"/>
  <!-- MISO high-Z before and after data (neutral dashed) -->
  <path d="M120,252 H564" fill="none" stroke="#6d6f82" stroke-width="1.4" stroke-dasharray="5 4"/>
  <path d="M916,252 H1080" fill="none" stroke="#6d6f82" stroke-width="1.4" stroke-dasharray="5 4"/>

  <!-- timing parameter arrows -->
  <line x1="176" y1="292" x2="256" y2="292" stroke="#6d6f82" stroke-width="1.1" marker-start="url(#sgwav-arr-n)" marker-end="url(#sgwav-arr-n)"/>
  <line x1="564" y1="292" x2="608" y2="292" stroke="#6d6f82" stroke-width="1.1" marker-start="url(#sgwav-arr-n)" marker-end="url(#sgwav-arr-n)"/>

  <!-- legend swatches -->
  <rect x="120" y="348" width="18" height="12" rx="2" fill="#ffffff" stroke="#393C54" stroke-width="1"/>
  <rect x="288" y="348" width="18" height="12" rx="2" fill="#c9d1b3" stroke="#393C54" stroke-width="1"/>
  <line x1="452" y1="356" x2="472" y2="356" stroke="#6d6f82" stroke-width="1.4" stroke-dasharray="5 4"/>
  <line x1="628" y1="348" x2="628" y2="364" stroke="#c9d1b3" stroke-width="1.2" stroke-dasharray="3 3"/>
  <line x1="848" y1="356" x2="872" y2="356" stroke="#97B077" stroke-width="1.8" stroke-linecap="round"/>

  <!-- lane focus dot (CS_N only) -->
  <circle cx="32" cy="140" r="3.5" fill="#97B077"/>

  <!-- text (drawn last, nothing covers it) -->
  <text x="384" y="48" text-anchor="middle" font-size="11" fill="#6d6f82">command phase &#183; MOSI drives</text>
  <text x="744" y="48" text-anchor="middle" font-size="11" fill="#6d6f82">data phase &#183; MISO drives</text>
  <text x="1096" y="48" text-anchor="end" font-size="11" fill="#6d6f82">SCLK 25 MHz &#183; bit period 40 ns</text>

  <text x="44" y="88" font-size="12" font-weight="600" fill="#393C54">SCLK</text>
  <text x="44" y="144" font-size="12" font-weight="600" fill="#393C54">CS_N</text>
  <text x="44" y="200" font-size="12" font-weight="600" fill="#393C54">MOSI</text>
  <text x="44" y="256" font-size="12" font-weight="600" fill="#393C54">MISO</text>

  <g font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="12" font-weight="600" fill="#393C54" text-anchor="middle">
    <text x="388" y="200">0x9F</text>
    <text x="740" y="200">0x00</text>
    <text x="652" y="256">0xC2</text>
    <text x="828" y="256">0x20</text>
  </g>

  <text x="216" y="284" text-anchor="middle" font-size="11" fill="#6d6f82">tCSS</text>
  <text x="616" y="296" font-size="11" fill="#6d6f82">tSU &#8805; 5 ns</text>

  <g font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="11" fill="#6d6f82" text-anchor="middle">
    <text x="256" y="336">t0</text>
    <text x="344" y="336">t1</text>
    <text x="432" y="336">t2</text>
    <text x="520" y="336">t3</text>
    <text x="608" y="336">t4</text>
    <text x="696" y="336">t5</text>
    <text x="784" y="336">t6</text>
    <text x="872" y="336">t7</text>
    <text x="960" y="336">t8</text>
  </g>

  <g font-size="11" fill="#6d6f82">
    <text x="148" y="360">MOSI data-valid</text>
    <text x="316" y="360">MISO data-valid</text>
    <text x="480" y="360">high-Z (not driven)</text>
    <text x="640" y="360">sampling edge &#183; SCLK rising</text>
    <text x="880" y="360">CS_N &#183; focus signal</text>
  </g>
</svg>
