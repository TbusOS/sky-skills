<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 588" role="img" aria-label="Kernel driver probe flowchart: mydev_probe happy path through devm_kzalloc, ioremap, request_irq and chardev registration in green, with a quiet tinted error lane collecting -ENOMEM errors and iounmap cleanup into a shared return ret exit" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="sgffc-arrG" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0.5 L7.5,4 L0,7.5 Z" fill="#97B077"/>
    </marker>
    <marker id="sgffc-arrK" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0.5 L7.5,4 L0,7.5 Z" fill="#6d6f82"/>
    </marker>
  </defs>

  <!-- panel -->
  <rect x="0" y="0" width="920" height="588" rx="16" fill="#ffffff" stroke="#e5e8da"/>

  <!-- error lane container: tint, no border -->
  <rect x="624" y="56" width="252" height="496" rx="12" fill="#f0f3e2"/>
  <text x="648" y="84" font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="10.5" font-weight="500" letter-spacing="1.5" fill="#6d6f82">ERROR LANE</text>

  <!-- happy path connectors (green 1.8 solid) -->
  <g fill="none" stroke="#97B077" stroke-width="1.8">
    <line x1="188" y1="60" x2="188" y2="92" marker-end="url(#sgffc-arrG)"/>
    <line x1="312" y1="124" x2="392" y2="124" marker-end="url(#sgffc-arrG)"/>
    <path d="M472,152 V168 Q472,176 464,176 H196 Q188,176 188,184 V196" marker-end="url(#sgffc-arrG)"/>
    <line x1="312" y1="228" x2="392" y2="228" marker-end="url(#sgffc-arrG)"/>
    <path d="M472,256 V272 Q472,280 464,280 H196 Q188,280 188,288 V300" marker-end="url(#sgffc-arrG)"/>
    <line x1="312" y1="332" x2="392" y2="332" marker-end="url(#sgffc-arrG)"/>
    <path d="M472,360 V376 Q472,384 464,384 H196 Q188,384 188,392 V404" marker-end="url(#sgffc-arrG)"/>
    <line x1="188" y1="464" x2="188" y2="492" marker-end="url(#sgffc-arrG)"/>
  </g>

  <!-- error lane connectors (muted 1.2 dashed) -->
  <g fill="none" stroke="#6d6f82" stroke-width="1.2" stroke-dasharray="4 3">
    <line x1="548" y1="124" x2="640" y2="124" marker-end="url(#sgffc-arrK)"/>
    <line x1="548" y1="228" x2="640" y2="228" marker-end="url(#sgffc-arrK)"/>
    <line x1="548" y1="332" x2="640" y2="332" marker-end="url(#sgffc-arrK)"/>
    <path d="M836,124 H848 Q856,124 856,132 V476 Q856,484 848,484 H748 Q740,484 740,492" marker-end="url(#sgffc-arrK)"/>
    <path d="M836,228 H848 Q856,228 856,236 V240"/>
    <path d="M836,332 H848 Q856,332 856,340 V344"/>
  </g>

  <!-- entry capsule: ink fill, white text -->
  <rect x="100" y="24" width="176" height="36" rx="18" fill="#393C54"/>

  <!-- main step cards -->
  <g>
    <rect x="64" y="96" width="248" height="56" rx="12" fill="#ffffff" stroke="#e5e8da"/>
    <rect x="64" y="200" width="248" height="56" rx="12" fill="#ffffff" stroke="#e5e8da"/>
    <rect x="64" y="304" width="248" height="56" rx="12" fill="#ffffff" stroke="#e5e8da"/>
    <rect x="64" y="408" width="248" height="56" rx="12" fill="#ffffff" stroke="#e5e8da"/>
  </g>

  <!-- decision diamonds: tint + sage border, same happy-path narrative -->
  <g fill="#f0f3e2" stroke="#97B077" stroke-width="1.5">
    <path d="M472,96 L548,124 L472,152 L396,124 Z"/>
    <path d="M472,200 L548,228 L472,256 L396,228 Z"/>
    <path d="M472,304 L548,332 L472,360 L396,332 Z"/>
  </g>

  <!-- error lane cards -->
  <g>
    <rect x="644" y="96" width="192" height="56" rx="12" fill="#ffffff" stroke="#e5e8da"/>
    <rect x="644" y="200" width="192" height="56" rx="12" fill="#ffffff" stroke="#e5e8da"/>
    <rect x="644" y="304" width="192" height="56" rx="12" fill="#ffffff" stroke="#e5e8da"/>
  </g>

  <!-- exit capsules: white + hairline, dot carries the verdict -->
  <rect x="120" y="496" width="136" height="36" rx="18" fill="#ffffff" stroke="#e5e8da"/>
  <rect x="668" y="496" width="144" height="36" rx="18" fill="#ffffff" stroke="#e5e8da"/>
  <circle cx="148" cy="514" r="4" fill="#97B077"/>
  <circle cx="696" cy="514" r="4" fill="#6d6f82"/>

  <!-- numbered badges (ink, happy path) -->
  <g font-size="11" font-weight="600" text-anchor="middle">
    <circle cx="68" cy="100" r="10" fill="#393C54"/><text x="68" y="104" fill="#ffffff">1</text>
    <circle cx="68" cy="204" r="10" fill="#393C54"/><text x="68" y="208" fill="#ffffff">2</text>
    <circle cx="68" cy="308" r="10" fill="#393C54"/><text x="68" y="312" fill="#ffffff">3</text>
    <circle cx="68" cy="412" r="10" fill="#393C54"/><text x="68" y="416" fill="#ffffff">4</text>
  </g>

  <!-- text: entry / steps -->
  <text x="188" y="46" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">mydev_probe(pdev)</text>
  <text x="92" y="120" font-size="13" font-weight="600" fill="#393C54">devm_kzalloc(ctx)</text>
  <text x="92" y="140" font-size="11" fill="#6d6f82">sizeof(*ctx) · GFP_KERNEL</text>
  <text x="92" y="224" font-size="13" font-weight="600" fill="#393C54">ioremap registers</text>
  <text x="92" y="244" font-size="11" fill="#6d6f82">MMIO window · res-&gt;start</text>
  <text x="92" y="328" font-size="13" font-weight="600" fill="#393C54">request_irq(irq, handler)</text>
  <text x="92" y="348" font-size="11" fill="#6d6f82">IRQF_SHARED · dev_id = ctx</text>
  <text x="92" y="432" font-size="13" font-weight="600" fill="#393C54">register chardev</text>
  <text x="92" y="452" font-size="11" fill="#6d6f82">misc_register(&amp;ctx-&gt;mdev)</text>

  <!-- text: diamonds -->
  <g font-size="12" font-weight="600" fill="#393C54" text-anchor="middle">
    <text x="472" y="128">ctx == NULL?</text>
    <text x="472" y="232">base == NULL?</text>
    <text x="472" y="336">ret &lt; 0?</text>
  </g>

  <!-- text: branch labels (happy continuation green-dark, error branch muted) -->
  <g font-size="11" font-weight="600">
    <text x="596" y="112" fill="#6d6f82" text-anchor="middle">yes</text>
    <text x="596" y="216" fill="#6d6f82" text-anchor="middle">yes</text>
    <text x="596" y="320" fill="#6d6f82" text-anchor="middle">yes</text>
    <text x="484" y="168" fill="#7a9561">no</text>
    <text x="484" y="272" fill="#7a9561">no</text>
    <text x="484" y="376" fill="#7a9561">no</text>
  </g>

  <!-- text: error lane -->
  <text x="660" y="120" font-size="13" font-weight="600" fill="#393C54">ret = -ENOMEM</text>
  <text x="660" y="140" font-size="11" fill="#6d6f82">ctx alloc failed</text>
  <text x="660" y="224" font-size="13" font-weight="600" fill="#393C54">ret = -ENOMEM</text>
  <text x="660" y="244" font-size="11" fill="#6d6f82">mmio map failed</text>
  <text x="660" y="328" font-size="13" font-weight="600" fill="#393C54">iounmap(base)</text>
  <text x="660" y="348" font-size="11" fill="#6d6f82">unwind mmio mapping</text>

  <!-- text: exits -->
  <text x="196" y="518" font-size="13" font-weight="600" fill="#393C54" text-anchor="middle">return 0</text>
  <text x="748" y="518" font-size="13" font-weight="600" fill="#393C54" text-anchor="middle">return ret</text>

  <!-- annotation -->
  <text x="888" y="44" font-size="11" font-style="italic" fill="#6d6f82" text-anchor="end">platform_driver · drivers/misc/mydev.c</text>

  <!-- legend -->
  <line x1="56" y1="564" x2="80" y2="564" stroke="#97B077" stroke-width="1.8" stroke-linecap="round"/>
  <text x="88" y="568" font-size="11" fill="#6d6f82">happy path</text>
  <line x1="176" y1="564" x2="200" y2="564" stroke="#6d6f82" stroke-width="1.2" stroke-dasharray="4 3" stroke-linecap="round"/>
  <text x="208" y="568" font-size="11" fill="#6d6f82">error path · dashed</text>
  <circle cx="344" cy="564" r="4" fill="#97B077"/>
  <text x="356" y="568" font-size="11" fill="#6d6f82">success exit</text>
</svg>
