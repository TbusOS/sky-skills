<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 520" role="img" aria-label="Layered architecture: presentation, application, domain and infrastructure zones rendered as quiet tinted bands, with a single green request path stepping down through numbered indigo badges; the Orchestrator card carries the only green focus border" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="sgarch-arrG" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0.5 L7.5,4 L0,7.5 Z" fill="#97B077"/>
    </marker>
  </defs>

  <!-- Zone 1: PRESENTATION -->
  <rect x="24" y="24" width="1032" height="100" rx="12" fill="#f0f3e2"/>
  <text x="48" y="48" font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="10.5" font-weight="500" letter-spacing="1.5" fill="#6d6f82">01 · PRESENTATION</text>
  <text x="1032" y="48" text-anchor="end" font-size="11" font-style="italic" fill="#6d6f82">user-facing surfaces</text>
  <rect x="48" y="60" width="234" height="48" rx="12" fill="#ffffff" stroke="#e5e8da"/>
  <text x="64" y="80" font-size="13" font-weight="600" fill="#393C54">Web</text>
  <text x="64" y="98" font-size="11" fill="#6d6f82">browser client</text>
  <rect x="296" y="60" width="234" height="48" rx="12" fill="#ffffff" stroke="#e5e8da"/>
  <text x="312" y="80" font-size="13" font-weight="600" fill="#393C54">Mobile</text>
  <text x="312" y="98" font-size="11" fill="#6d6f82">iOS · Android</text>
  <rect x="544" y="60" width="234" height="48" rx="12" fill="#ffffff" stroke="#e5e8da"/>
  <text x="560" y="80" font-size="13" font-weight="600" fill="#393C54">CLI</text>
  <text x="560" y="98" font-size="11" fill="#6d6f82">terminal tools</text>
  <rect x="792" y="60" width="234" height="48" rx="12" fill="#ffffff" stroke="#e5e8da"/>
  <text x="808" y="80" font-size="13" font-weight="600" fill="#393C54">API</text>
  <text x="808" y="98" font-size="11" fill="#6d6f82">REST · SDK</text>

  <line x1="540" y1="124" x2="540" y2="142" stroke="#97B077" stroke-width="1.8" marker-end="url(#sgarch-arrG)"/>
  <circle cx="568" cy="136" r="10" fill="#393C54"/>
  <text x="568" y="140" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">1</text>

  <!-- Zone 2: APPLICATION -->
  <rect x="24" y="148" width="1032" height="100" rx="12" fill="#f0f3e2"/>
  <text x="48" y="172" font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="10.5" font-weight="500" letter-spacing="1.5" fill="#6d6f82">02 · APPLICATION</text>
  <text x="1032" y="172" text-anchor="end" font-size="11" font-style="italic" fill="#6d6f82">coordination &amp; policy</text>
  <rect x="48" y="184" width="234" height="48" rx="12" fill="#ffffff" stroke="#e5e8da"/>
  <text x="64" y="204" font-size="13" font-weight="600" fill="#393C54">Router</text>
  <text x="64" y="222" font-size="11" fill="#6d6f82">match &amp; dispatch</text>
  <!-- focus card: the only green border in the diagram -->
  <rect x="296" y="184" width="234" height="48" rx="12" fill="#ffffff" stroke="#97B077" stroke-width="1.5"/>
  <text x="312" y="204" font-size="13" font-weight="600" fill="#393C54">Orchestrator</text>
  <text x="312" y="222" font-size="11" fill="#6d6f82">plan · collect · merge</text>
  <rect x="544" y="184" width="234" height="48" rx="12" fill="#ffffff" stroke="#e5e8da"/>
  <text x="560" y="204" font-size="13" font-weight="600" fill="#393C54">Gateway</text>
  <text x="560" y="222" font-size="11" fill="#6d6f82">tool calls · rate limits</text>
  <rect x="792" y="184" width="234" height="48" rx="12" fill="#ffffff" stroke="#e5e8da"/>
  <text x="808" y="204" font-size="13" font-weight="600" fill="#393C54">Guard</text>
  <text x="808" y="222" font-size="11" fill="#6d6f82">allow · deny · confirm</text>

  <line x1="540" y1="248" x2="540" y2="266" stroke="#97B077" stroke-width="1.8" marker-end="url(#sgarch-arrG)"/>
  <circle cx="568" cy="260" r="10" fill="#393C54"/>
  <text x="568" y="264" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">2</text>

  <!-- Zone 3: DOMAIN -->
  <rect x="24" y="272" width="1032" height="100" rx="12" fill="#f0f3e2"/>
  <text x="48" y="296" font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="10.5" font-weight="500" letter-spacing="1.5" fill="#6d6f82">03 · DOMAIN</text>
  <text x="1032" y="296" text-anchor="end" font-size="11" font-style="italic" fill="#6d6f82">business logic</text>
  <rect x="48" y="308" width="234" height="48" rx="12" fill="#ffffff" stroke="#e5e8da"/>
  <text x="64" y="328" font-size="13" font-weight="600" fill="#393C54">Billing</text>
  <text x="64" y="346" font-size="11" fill="#6d6f82">invoices · ledger</text>
  <rect x="296" y="308" width="234" height="48" rx="12" fill="#ffffff" stroke="#e5e8da"/>
  <text x="312" y="328" font-size="13" font-weight="600" fill="#393C54">Catalog</text>
  <text x="312" y="346" font-size="11" fill="#6d6f82">products · pricing</text>
  <rect x="544" y="308" width="234" height="48" rx="12" fill="#ffffff" stroke="#e5e8da"/>
  <text x="560" y="328" font-size="13" font-weight="600" fill="#393C54">Identity</text>
  <text x="560" y="346" font-size="11" fill="#6d6f82">accounts · roles</text>
  <rect x="792" y="308" width="234" height="48" rx="12" fill="#ffffff" stroke="#e5e8da"/>
  <text x="808" y="328" font-size="13" font-weight="600" fill="#393C54">Reporting</text>
  <text x="808" y="346" font-size="11" fill="#6d6f82">rollups · exports</text>

  <line x1="540" y1="372" x2="540" y2="390" stroke="#97B077" stroke-width="1.8" marker-end="url(#sgarch-arrG)"/>
  <circle cx="568" cy="384" r="10" fill="#393C54"/>
  <text x="568" y="388" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">3</text>

  <!-- Zone 4: INFRASTRUCTURE -->
  <rect x="24" y="396" width="1032" height="100" rx="12" fill="#f0f3e2"/>
  <text x="48" y="420" font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="10.5" font-weight="500" letter-spacing="1.5" fill="#6d6f82">04 · INFRASTRUCTURE</text>
  <text x="1032" y="420" text-anchor="end" font-size="11" font-style="italic" fill="#6d6f82">runtime substrate</text>
  <rect x="48" y="432" width="234" height="48" rx="12" fill="#ffffff" stroke="#e5e8da"/>
  <text x="64" y="452" font-size="13" font-weight="600" fill="#393C54">Database</text>
  <text x="64" y="470" font-size="11" fill="#6d6f82">Postgres cluster</text>
  <rect x="296" y="432" width="234" height="48" rx="12" fill="#ffffff" stroke="#e5e8da"/>
  <text x="312" y="452" font-size="13" font-weight="600" fill="#393C54">Storage</text>
  <text x="312" y="470" font-size="11" fill="#6d6f82">objects · backups</text>
  <rect x="544" y="432" width="234" height="48" rx="12" fill="#ffffff" stroke="#e5e8da"/>
  <text x="560" y="452" font-size="13" font-weight="600" fill="#393C54">Network</text>
  <text x="560" y="470" font-size="11" fill="#6d6f82">LB · CDN · DNS</text>
  <rect x="792" y="432" width="234" height="48" rx="12" fill="#ffffff" stroke="#e5e8da"/>
  <text x="808" y="452" font-size="13" font-weight="600" fill="#393C54">Queue</text>
  <text x="808" y="470" font-size="11" fill="#6d6f82">async jobs</text>
</svg>
