<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 360" role="img" aria-label="Scheduler timeline: CFS run view across CPU 0 to CPU 2 where app: render runs on CPU 0, is preempted by the eth0 IRQ thread at 4 ms, then migrates to CPU 2 under load balancing while kworker runs periodically on CPU 1" font-family="Poppins, 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <pattern id="schDots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1" fill="#141413" opacity="0.05"/>
    </pattern>
    <marker id="schArrG" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0.5 L7.5,4 L0,7.5 Z" fill="#a8a496"/>
    </marker>
  </defs>

  <!-- panel -->
  <rect width="1120" height="360" rx="16" fill="#faf9f5" stroke="#eceadf"/>
  <rect width="1120" height="360" rx="16" fill="url(#schDots)"/>

  <!-- tick gridlines (under everything) -->
  <g stroke="#eceadf" stroke-width="1">
    <line x1="104" y1="96" x2="104" y2="288"/>
    <line x1="264" y1="96" x2="264" y2="288"/>
    <line x1="424" y1="96" x2="424" y2="288"/>
    <line x1="584" y1="96" x2="584" y2="288"/>
    <line x1="744" y1="96" x2="744" y2="288"/>
    <line x1="904" y1="96" x2="904" y2="288"/>
    <line x1="1064" y1="96" x2="1064" y2="288"/>
  </g>

  <!-- time axis -->
  <g stroke="#a8a496" stroke-width="1">
    <line x1="104" y1="288" x2="1064" y2="288"/>
    <line x1="104" y1="288" x2="104" y2="296"/>
    <line x1="264" y1="288" x2="264" y2="296"/>
    <line x1="424" y1="288" x2="424" y2="296"/>
    <line x1="584" y1="288" x2="584" y2="296"/>
    <line x1="744" y1="288" x2="744" y2="296"/>
    <line x1="904" y1="288" x2="904" y2="296"/>
    <line x1="1064" y1="288" x2="1064" y2="296"/>
  </g>

  <!-- CPU 0 lane: app 0-4 ms, irq/eth0 4-5 ms, idle 5-12 ms -->
  <rect x="104" y="104" width="320" height="36" rx="6" fill="#e2ecf5"/>
  <rect x="104" y="104" width="4" height="36" rx="2" fill="#6a9bcc"/>
  <rect x="424" y="104" width="80" height="36" rx="6" fill="#f7e4dc"/>
  <rect x="424" y="104" width="4" height="36" rx="2" fill="#d97757"/>
  <rect x="504" y="104" width="560" height="36" rx="6" fill="#ffffff" stroke="#d8d4c8" stroke-dasharray="4 3"/>

  <!-- CPU 1 lane: kworker bursts every 4 ms -->
  <rect x="104" y="168" width="80" height="36" rx="6" fill="#ffffff" stroke="#d8d4c8" stroke-dasharray="4 3"/>
  <rect x="184" y="168" width="120" height="36" rx="6" fill="#e5e9dd"/>
  <rect x="184" y="168" width="4" height="36" rx="2" fill="#788c5d"/>
  <rect x="304" y="168" width="200" height="36" rx="6" fill="#ffffff" stroke="#d8d4c8" stroke-dasharray="4 3"/>
  <rect x="504" y="168" width="120" height="36" rx="6" fill="#e5e9dd"/>
  <rect x="504" y="168" width="4" height="36" rx="2" fill="#788c5d"/>
  <rect x="624" y="168" width="200" height="36" rx="6" fill="#ffffff" stroke="#d8d4c8" stroke-dasharray="4 3"/>
  <rect x="824" y="168" width="120" height="36" rx="6" fill="#e5e9dd"/>
  <rect x="824" y="168" width="4" height="36" rx="2" fill="#788c5d"/>
  <rect x="944" y="168" width="120" height="36" rx="6" fill="#ffffff" stroke="#d8d4c8" stroke-dasharray="4 3"/>

  <!-- CPU 2 lane: idle 0-5 ms, app continuation 5-9 ms, idle 9-12 ms -->
  <rect x="104" y="232" width="400" height="36" rx="6" fill="#ffffff" stroke="#d8d4c8" stroke-dasharray="4 3"/>
  <rect x="504" y="232" width="320" height="36" rx="6" fill="#e2ecf5"/>
  <rect x="504" y="232" width="4" height="36" rx="2" fill="#6a9bcc"/>
  <rect x="824" y="232" width="240" height="36" rx="6" fill="#ffffff" stroke="#d8d4c8" stroke-dasharray="4 3"/>

  <!-- IRQ event marker at 4 ms -->
  <line x1="424" y1="88" x2="424" y2="104" stroke="#d97757" stroke-width="1.8"/>
  <rect x="400" y="64" width="48" height="24" rx="12" fill="#d97757"/>

  <!-- migration arrow: CPU 0 app block to CPU 2 continuation -->
  <path d="M408,140 V208 Q408,216 416,216 H512 Q520,216 520,224 V232" fill="none" stroke="#a8a496" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#schArrG)"/>

  <!-- legend swatches -->
  <circle cx="108" cy="336" r="4" fill="#d97757"/>
  <circle cx="276" cy="336" r="4" fill="#788c5d"/>
  <circle cx="436" cy="336" r="4" fill="#6a9bcc"/>
  <rect x="596" y="328" width="20" height="16" rx="4" fill="#ffffff" stroke="#d8d4c8" stroke-dasharray="4 3"/>

  <!-- text layer (always last) -->
  <text x="32" y="36" font-size="11" font-weight="600" letter-spacing="1.2" fill="#6b6a5f">SCHED · CFS RUN VIEW · 12 MS WINDOW</text>
  <text x="1088" y="36" font-size="11" font-style="italic" fill="#8c8a7d" text-anchor="end">trace-cmd record -e sched_switch -e sched_migrate_task</text>

  <text x="32" y="128" font-size="12" font-weight="600" fill="#141413">CPU 0</text>
  <text x="32" y="192" font-size="12" font-weight="600" fill="#141413">CPU 1</text>
  <text x="32" y="256" font-size="12" font-weight="600" fill="#141413">CPU 2</text>

  <text x="424" y="80" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">IRQ</text>
  <text x="456" y="80" font-size="11" font-weight="600" fill="#c2613f">eth0 rx</text>

  <text x="116" y="128" font-size="11.5" font-weight="600" fill="#141413">app: render</text>
  <text x="436" y="128" font-size="11.5" font-weight="600" fill="#141413">irq/eth0</text>
  <text x="516" y="128" font-size="11.5" fill="#6b6a5f">idle</text>
  <text x="432" y="160" font-size="11" fill="#6b6a5f">preempted by irq/eth0</text>

  <text x="116" y="192" font-size="11.5" fill="#6b6a5f">idle</text>
  <text x="196" y="192" font-size="11.5" font-weight="600" fill="#141413">kworker/u8</text>
  <text x="316" y="192" font-size="11.5" fill="#6b6a5f">idle</text>
  <text x="516" y="192" font-size="11.5" font-weight="600" fill="#141413">kworker/u8</text>
  <text x="636" y="192" font-size="11.5" fill="#6b6a5f">idle</text>
  <text x="836" y="192" font-size="11.5" font-weight="600" fill="#141413">kworker/u8</text>
  <text x="956" y="192" font-size="11.5" fill="#6b6a5f">idle</text>

  <text x="532" y="220" font-size="11" fill="#6b6a5f">migrate (load balance)</text>

  <text x="116" y="256" font-size="11.5" fill="#6b6a5f">idle</text>
  <text x="516" y="256" font-size="11.5" font-weight="600" fill="#141413">app: render</text>
  <text x="836" y="256" font-size="11.5" fill="#6b6a5f">idle</text>

  <g font-size="11" fill="#6b6a5f" text-anchor="middle">
    <text x="104" y="312">0</text>
    <text x="264" y="312">2</text>
    <text x="424" y="312">4</text>
    <text x="584" y="312">6</text>
    <text x="744" y="312">8</text>
    <text x="904" y="312">10</text>
    <text x="1064" y="312">12</text>
  </g>
  <text x="1080" y="312" font-size="11" fill="#6b6a5f">ms</text>

  <g font-size="11" fill="#6b6a5f">
    <text x="120" y="340">irq/eth0 · threaded IRQ</text>
    <text x="288" y="340">kworker/u8 · workqueue</text>
    <text x="448" y="340">app: render · CFS task</text>
    <text x="624" y="340">idle</text>
  </g>
</svg>
