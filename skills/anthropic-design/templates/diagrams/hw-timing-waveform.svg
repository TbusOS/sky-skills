<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 380" role="img" aria-label="SPI mode 0 read transaction timing waveform: SCLK, CS_N, MOSI and MISO lanes with data-valid windows, sampling edges at each SCLK rising edge, and tCSS / tSU timing annotations" font-family="Poppins, 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <pattern id="wavDots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1" fill="#141413" opacity="0.05"/>
    </pattern>
    <marker id="wavArrG" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0.5 L7.5,4 L0,7.5 Z" fill="#6b6a5f"/>
    </marker>
  </defs>

  <!-- panel -->
  <rect x="0" y="0" width="1120" height="380" rx="16" fill="#faf9f5" stroke="#eceadf"/>
  <rect x="0" y="0" width="1120" height="380" rx="16" fill="url(#wavDots)"/>

  <!-- title chip -->
  <rect x="24" y="16" width="192" height="24" rx="12" fill="#e7e4d9"/>

  <!-- data-valid windows (bus cells, tint) -->
  <!-- MOSI 0x9F -->
  <path d="M208,196 L216,184 H556 L564,196 L556,208 H216 Z" fill="#e2ecf5" stroke="#6a9bcc" stroke-width="1.4"/>
  <!-- MOSI 0x00 -->
  <path d="M564,196 L572,184 H908 L916,196 L908,208 H572 Z" fill="#e2ecf5" stroke="#6a9bcc" stroke-width="1.4"/>
  <!-- MISO 0xC2 -->
  <path d="M564,252 L572,240 H732 L740,252 L732,264 H572 Z" fill="#e5e9dd" stroke="#788c5d" stroke-width="1.4"/>
  <!-- MISO 0x20 -->
  <path d="M740,252 L748,240 H908 L916,252 L908,264 H748 Z" fill="#e5e9dd" stroke="#788c5d" stroke-width="1.4"/>

  <!-- sampling lines at each SCLK rising edge -->
  <g stroke="#d8d4c8" stroke-width="1" stroke-dasharray="3 3">
    <line x1="256" y1="64" x2="256" y2="272"/>
    <line x1="344" y1="64" x2="344" y2="272"/>
    <line x1="432" y1="64" x2="432" y2="272"/>
    <line x1="520" y1="64" x2="520" y2="272"/>
    <line x1="608" y1="64" x2="608" y2="272"/>
    <line x1="696" y1="64" x2="696" y2="272"/>
    <line x1="784" y1="64" x2="784" y2="272"/>
    <line x1="872" y1="64" x2="872" y2="272"/>
  </g>

  <!-- timing reference extensions -->
  <g stroke="#a8a496" stroke-width="1" stroke-dasharray="2 3">
    <line x1="176" y1="156" x2="176" y2="300"/>
    <line x1="256" y1="272" x2="256" y2="300"/>
    <line x1="564" y1="212" x2="564" y2="300"/>
    <line x1="608" y1="272" x2="608" y2="300"/>
  </g>

  <!-- phase brackets -->
  <path d="M208,62 V58 H556 V62" fill="none" stroke="#a8a496" stroke-width="1"/>
  <path d="M572,62 V58 H916 V62" fill="none" stroke="#a8a496" stroke-width="1"/>

  <!-- time axis -->
  <line x1="120" y1="312" x2="1080" y2="312" stroke="#d8d4c8" stroke-width="1"/>
  <g stroke="#a8a496" stroke-width="1">
    <line x1="256" y1="312" x2="256" y2="320"/>
    <line x1="344" y1="312" x2="344" y2="320"/>
    <line x1="432" y1="312" x2="432" y2="320"/>
    <line x1="520" y1="312" x2="520" y2="320"/>
    <line x1="608" y1="312" x2="608" y2="320"/>
    <line x1="696" y1="312" x2="696" y2="320"/>
    <line x1="784" y1="312" x2="784" y2="320"/>
    <line x1="872" y1="312" x2="872" y2="320"/>
    <line x1="960" y1="312" x2="960" y2="320"/>
  </g>

  <!-- waveforms -->
  <!-- SCLK: 8 periods, CPOL=0 idle low -->
  <path d="M120,96 H256 V72 H300 V96 H344 V72 H388 V96 H432 V72 H476 V96 H520 V72 H564 V96 H608 V72 H652 V96 H696 V72 H740 V96 H784 V72 H828 V96 H872 V72 H916 V96 H1080" fill="none" stroke="#141413" stroke-width="1.8"/>
  <!-- CS_N: frames the transaction (focus) -->
  <path d="M120,128 H176 V152 H1000 V128 H1080" fill="none" stroke="#d97757" stroke-width="1.8"/>
  <!-- MOSI idle low, entry/exit slants into bus cells -->
  <path d="M120,208 H200 L208,196" fill="none" stroke="#6a9bcc" stroke-width="1.8"/>
  <path d="M916,196 L924,208 H1080" fill="none" stroke="#6a9bcc" stroke-width="1.8"/>
  <!-- MISO high-Z before and after data -->
  <path d="M120,252 H564" fill="none" stroke="#a8a496" stroke-width="1.4" stroke-dasharray="5 4"/>
  <path d="M916,252 H1080" fill="none" stroke="#a8a496" stroke-width="1.4" stroke-dasharray="5 4"/>

  <!-- timing parameter arrows -->
  <line x1="176" y1="292" x2="256" y2="292" stroke="#6b6a5f" stroke-width="1.1" marker-start="url(#wavArrG)" marker-end="url(#wavArrG)"/>
  <line x1="564" y1="292" x2="608" y2="292" stroke="#6b6a5f" stroke-width="1.1" marker-start="url(#wavArrG)" marker-end="url(#wavArrG)"/>

  <!-- legend swatches -->
  <rect x="120" y="348" width="18" height="12" rx="2" fill="#e2ecf5" stroke="#6a9bcc" stroke-width="1"/>
  <line x1="296" y1="356" x2="316" y2="356" stroke="#a8a496" stroke-width="1.4" stroke-dasharray="5 4"/>
  <line x1="484" y1="348" x2="484" y2="364" stroke="#d8d4c8" stroke-width="1.2" stroke-dasharray="3 3"/>
  <circle cx="704" cy="356" r="4" fill="#d97757"/>

  <!-- lane label dots -->
  <circle cx="32" cy="84" r="3.5" fill="#141413"/>
  <circle cx="32" cy="140" r="3.5" fill="#d97757"/>
  <circle cx="32" cy="196" r="3.5" fill="#6a9bcc"/>
  <circle cx="32" cy="252" r="3.5" fill="#788c5d"/>

  <!-- text (drawn last, nothing covers it) -->
  <text x="120" y="32" text-anchor="middle" font-size="11.5" font-weight="600" fill="#141413">SPI mode 0 · CPOL=0 CPHA=0</text>
  <text x="1096" y="32" text-anchor="end" font-size="11" fill="#6b6a5f">MX25L6433F · JEDEC ID read</text>

  <text x="384" y="48" text-anchor="middle" font-size="11" fill="#6b6a5f">command phase · MOSI drives</text>
  <text x="744" y="48" text-anchor="middle" font-size="11" fill="#6b6a5f">data phase · MISO drives</text>

  <text x="42" y="88" font-size="12" font-weight="600" fill="#141413">SCLK</text>
  <text x="42" y="144" font-size="12" font-weight="600" fill="#c2613f">CS_N</text>
  <text x="42" y="200" font-size="12" font-weight="600" fill="#4a7bab">MOSI</text>
  <text x="42" y="256" font-size="12" font-weight="600" fill="#5d7045">MISO</text>

  <text x="388" y="200" text-anchor="middle" font-size="12.5" font-weight="600" fill="#4a7bab">0x9F</text>
  <text x="740" y="200" text-anchor="middle" font-size="12.5" font-weight="600" fill="#4a7bab">0x00</text>
  <text x="652" y="256" text-anchor="middle" font-size="12.5" font-weight="600" fill="#5d7045">0xC2</text>
  <text x="828" y="256" text-anchor="middle" font-size="12.5" font-weight="600" fill="#5d7045">0x20</text>

  <text x="216" y="284" text-anchor="middle" font-size="11" fill="#6b6a5f">tCSS</text>
  <text x="616" y="296" font-size="11" fill="#6b6a5f">tSU ≥ 5 ns</text>

  <g font-size="11" fill="#6b6a5f" text-anchor="middle">
    <text x="256" y="336">t0</text>
    <text x="344" y="336">t1</text>
    <text x="432" y="336">t2</text>
    <text x="520" y="336">t3</text>
    <text x="608" y="336">t4</text>
    <text x="696" y="336">t5</text>
    <text x="784" y="336">t6</text>
    <text x="872" y="336">t7</text>
    <text x="960" y="336">t8</text>
  </g>

  <g font-size="11" fill="#6b6a5f">
    <text x="148" y="360">data-valid window</text>
    <text x="324" y="360">high-Z (not driven)</text>
    <text x="496" y="360">sampling edge · SCLK rising</text>
    <text x="716" y="360">CS_N · focus signal</text>
    <text x="1080" y="360" text-anchor="end">SCLK 25 MHz · bit period 40 ns</text>
  </g>
</svg>
