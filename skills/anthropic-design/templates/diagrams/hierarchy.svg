<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" font-family="Poppins, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#141413">
  <rect width="500" height="400" fill="#faf9f5"/>

  <!-- Orchestrator central node -->
  <circle cx="250" cy="200" r="46" fill="#d97757"/>
  <text x="250" y="197" text-anchor="middle" fill="#faf9f5" font-weight="600" font-size="14">Lead</text>
  <text x="250" y="214" text-anchor="middle" fill="#faf9f5" font-size="11">Researcher</text>

  <!-- Connecting lines -->
  <g stroke="#b0aea5" stroke-width="1.5" fill="none">
    <line x1="250" y1="154" x2="100" y2="80"/>
    <line x1="250" y1="154" x2="400" y2="80"/>
    <line x1="250" y1="246" x2="100" y2="320"/>
    <line x1="250" y1="246" x2="400" y2="320"/>
  </g>

  <!-- Four subagents -->
  <g>
    <circle cx="100" cy="80" r="34" fill="#6a9bcc"/>
    <text x="100" y="78" text-anchor="middle" fill="#faf9f5" font-size="12" font-weight="500">Search</text>
    <text x="100" y="94" text-anchor="middle" fill="#faf9f5" font-size="10">Agent 1</text>

    <circle cx="400" cy="80" r="34" fill="#6a9bcc"/>
    <text x="400" y="78" text-anchor="middle" fill="#faf9f5" font-size="12" font-weight="500">Search</text>
    <text x="400" y="94" text-anchor="middle" fill="#faf9f5" font-size="10">Agent 2</text>

    <circle cx="100" cy="320" r="34" fill="#788c5d"/>
    <text x="100" y="318" text-anchor="middle" fill="#faf9f5" font-size="12" font-weight="500">Analyze</text>
    <text x="100" y="334" text-anchor="middle" fill="#faf9f5" font-size="10">Agent 3</text>

    <circle cx="400" cy="320" r="34" fill="#788c5d"/>
    <text x="400" y="318" text-anchor="middle" fill="#faf9f5" font-size="12" font-weight="500">Analyze</text>
    <text x="400" y="334" text-anchor="middle" fill="#faf9f5" font-size="10">Agent 4</text>
  </g>
</svg>
