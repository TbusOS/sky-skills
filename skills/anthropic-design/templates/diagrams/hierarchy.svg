<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" font-family="Poppins, 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif" role="img" aria-label="Hierarchy: focal coordinator card fanning out to four worker cards, connectors colored by category">
  <defs>
    <pattern id="hier-dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1" fill="#141413" opacity="0.05"/>
    </pattern>
    <filter id="hier-sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#141413" flood-opacity="0.06"/>
    </filter>
    <marker id="hier-arrB" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0.5 L7.5,4 L0,7.5 Z" fill="#6a9bcc"/>
    </marker>
    <marker id="hier-arrG" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0.5 L7.5,4 L0,7.5 Z" fill="#788c5d"/>
    </marker>
  </defs>
  <rect width="880" height="360" rx="14" fill="#faf9f5" stroke="#eceadf"/>
  <rect width="880" height="360" rx="14" fill="url(#hier-dots)"/>

  <!-- fan-out connectors (edge anchors on coordinator bottom) -->
  <g fill="none">
    <path d="M380,124 L380,160 Q380,168 372,168 L151,168 Q143,168 143,176 L143,226" stroke="#6a9bcc" stroke-width="1.5" marker-end="url(#hier-arrB)"/>
    <path d="M420,124 L420,184 Q420,192 412,192 L359,192 Q351,192 351,200 L351,226" stroke="#6a9bcc" stroke-width="1.5" marker-end="url(#hier-arrB)"/>
    <path d="M460,124 L460,184 Q460,192 468,192 L551,192 Q559,192 559,200 L559,226" stroke="#788c5d" stroke-width="1.5" marker-end="url(#hier-arrG)"/>
    <path d="M500,124 L500,160 Q500,168 508,168 L759,168 Q767,168 767,176 L767,226" stroke="#788c5d" stroke-width="1.5" marker-end="url(#hier-arrG)"/>
  </g>

  <!-- coordinator card (focal: the only orange element) -->
  <g filter="url(#hier-sh)">
    <rect x="320" y="40" width="240" height="84" rx="10" fill="#fbeee7" stroke="#d97757" stroke-width="1.5"/>
  </g>
  <rect x="338" y="62" width="40" height="40" rx="10" fill="#f4d9cd"/>
  <g transform="translate(346,70)" fill="none" stroke="#c2613f" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <rect x="5" y="5" width="14" height="14" rx="2"/>
    <rect x="9.5" y="9.5" width="5" height="5"/>
    <line x1="9" y1="2" x2="9" y2="5"/><line x1="15" y1="2" x2="15" y2="5"/>
    <line x1="9" y1="19" x2="9" y2="22"/><line x1="15" y1="19" x2="15" y2="22"/>
    <line x1="2" y1="9" x2="5" y2="9"/><line x1="2" y1="15" x2="5" y2="15"/>
    <line x1="19" y1="9" x2="22" y2="9"/><line x1="19" y1="15" x2="22" y2="15"/>
  </g>
  <text x="394" y="78" font-size="14" font-weight="600" fill="#141413">Coordinator</text>
  <text x="394" y="98" font-size="11" fill="#6b6a5f">plans · delegates · merges</text>

  <!-- worker cards -->
  <g filter="url(#hier-sh)">
    <rect x="48" y="232" width="190" height="76" rx="10" fill="#ffffff" stroke="#d8d4c8"/>
    <rect x="256" y="232" width="190" height="76" rx="10" fill="#ffffff" stroke="#d8d4c8"/>
    <rect x="464" y="232" width="190" height="76" rx="10" fill="#ffffff" stroke="#d8d4c8"/>
    <rect x="672" y="232" width="190" height="76" rx="10" fill="#ffffff" stroke="#d8d4c8"/>
  </g>
  <!-- search worker 1 -->
  <rect x="62" y="246" width="32" height="32" rx="8" fill="#e2ecf5"/>
  <g transform="translate(68,252)" fill="none" stroke="#4a7bab" stroke-width="1.6" stroke-linecap="round">
    <circle cx="8" cy="8" r="5.5"/><line x1="12.5" y1="12.5" x2="18" y2="18"/>
  </g>
  <text x="104" y="264" font-size="13" font-weight="600" fill="#141413">Search</text>
  <text x="104" y="284" font-size="11" fill="#6b6a5f">worker 1 · web</text>
  <!-- search worker 2 -->
  <rect x="270" y="246" width="32" height="32" rx="8" fill="#e2ecf5"/>
  <g transform="translate(276,252)" fill="none" stroke="#4a7bab" stroke-width="1.6" stroke-linecap="round">
    <circle cx="8" cy="8" r="5.5"/><line x1="12.5" y1="12.5" x2="18" y2="18"/>
  </g>
  <text x="312" y="264" font-size="13" font-weight="600" fill="#141413">Search</text>
  <text x="312" y="284" font-size="11" fill="#6b6a5f">worker 2 · docs</text>
  <!-- analyse worker 3 -->
  <rect x="478" y="246" width="32" height="32" rx="8" fill="#e5e9dd"/>
  <g transform="translate(484,252)" fill="none" stroke="#5d7045" stroke-width="1.6" stroke-linecap="round">
    <line x1="4" y1="17" x2="4" y2="11"/><line x1="10" y1="17" x2="10" y2="5"/><line x1="16" y1="17" x2="16" y2="13"/>
  </g>
  <text x="520" y="264" font-size="13" font-weight="600" fill="#141413">Analyse</text>
  <text x="520" y="284" font-size="11" fill="#6b6a5f">worker 3 · data</text>
  <!-- analyse worker 4 -->
  <rect x="686" y="246" width="32" height="32" rx="8" fill="#e5e9dd"/>
  <g transform="translate(692,252)" fill="none" stroke="#5d7045" stroke-width="1.6" stroke-linecap="round">
    <line x1="4" y1="17" x2="4" y2="11"/><line x1="10" y1="17" x2="10" y2="5"/><line x1="16" y1="17" x2="16" y2="13"/>
  </g>
  <text x="728" y="264" font-size="13" font-weight="600" fill="#141413">Analyse</text>
  <text x="728" y="284" font-size="11" fill="#6b6a5f">worker 4 · code</text>

  <!-- legend -->
  <g font-size="11" fill="#6b6a5f">
    <circle cx="54" cy="338" r="5" fill="#d97757"/><text x="66" y="342">coordinator</text>
    <circle cx="168" cy="338" r="5" fill="#6a9bcc"/><text x="180" y="342">search workers</text>
    <circle cx="304" cy="338" r="5" fill="#788c5d"/><text x="316" y="342">analysis workers</text>
  </g>
</svg>
