<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 210" font-family="Poppins, 'Noto Sans SC', sans-serif" font-size="12" role="img" aria-label="Timeline: shipped milestones as filled orange nodes, upcoming as outlined nodes, with a today marker">
  <line x1="60" y1="110" x2="980" y2="110" stroke="#d9d5c7" stroke-width="2"/>

  <!-- today marker -->
  <line x1="520" y1="58" x2="520" y2="162" stroke="#d97757" stroke-width="1.2" stroke-dasharray="4 3"/>
  <rect x="484" y="34" width="72" height="20" rx="10" fill="#f4d9cd"/>
  <text x="520" y="48" text-anchor="middle" font-size="10" font-weight="600" fill="#c2613f">today</text>

  <g text-anchor="middle">
    <circle cx="60" cy="110" r="8" fill="#d97757"/><circle cx="60" cy="110" r="2.5" fill="#ffffff"/>
    <text x="60" y="82" font-weight="600" fill="#141413">v0.9</text><text x="60" y="142" font-size="10" fill="#8c8a7d">Jan</text>
    <circle cx="244" cy="110" r="8" fill="#d97757"/><circle cx="244" cy="110" r="2.5" fill="#ffffff"/>
    <text x="244" y="82" font-weight="600" fill="#141413">v1.0</text><text x="244" y="142" font-size="10" fill="#8c8a7d">Mar</text>
    <circle cx="428" cy="110" r="8" fill="#d97757"/><circle cx="428" cy="110" r="2.5" fill="#ffffff"/>
    <text x="428" y="82" font-weight="600" fill="#141413">v1.5</text><text x="428" y="142" font-size="10" fill="#8c8a7d">May</text>
    <circle cx="612" cy="110" r="8" fill="#ffffff" stroke="#b0aea5" stroke-width="1.6"/>
    <text x="612" y="82" fill="#6b6a5f">v2.0</text><text x="612" y="142" font-size="10" fill="#8c8a7d">Q3</text>
    <circle cx="796" cy="110" r="8" fill="#ffffff" stroke="#b0aea5" stroke-width="1.6"/>
    <text x="796" y="82" fill="#6b6a5f">v2.5</text><text x="796" y="142" font-size="10" fill="#8c8a7d">Q4</text>
    <circle cx="980" cy="110" r="8" fill="#ffffff" stroke="#b0aea5" stroke-width="1.6"/>
    <text x="980" y="82" fill="#6b6a5f">v3.0</text><text x="980" y="142" font-size="10" fill="#8c8a7d">next year</text>
  </g>

  <g font-size="11" fill="#6b6a5f">
    <circle cx="856" cy="186" r="5" fill="#d97757"/><text x="868" y="190">shipped</text>
    <circle cx="936" cy="186" r="5" fill="#ffffff" stroke="#b0aea5" stroke-width="1.4"/><text x="948" y="190">upcoming</text>
  </g>
</svg>
