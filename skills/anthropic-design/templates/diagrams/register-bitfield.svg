<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 324" role="img" aria-label="UART_CTRL register bit-field layout at offset 0x04: BAUD_DIV, PARITY, STOP, DATA8, FIFO_TH and TX/RX enable bits, reset value 0x0000_0301" font-family="Poppins, 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <pattern id="regDots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1" fill="#141413" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- panel -->
  <rect x="4" y="4" width="1032" height="316" rx="16" fill="#faf9f5" stroke="#eceadf"/>
  <rect x="4" y="4" width="1032" height="316" rx="16" fill="url(#regDots)"/>

  <!-- title row -->
  <text x="72" y="44" font-size="14" font-weight="600" fill="#141413">UART_CTRL</text>
  <text x="180" y="44" font-size="11.5" fill="#6b6a5f">offset 0x04 &#183; reset 0x0000_0301</text>
  <text x="968" y="44" font-size="11" font-style="italic" fill="#8c8a7d" text-anchor="end">reserved bits read as 0 &#183; write as 0</text>

  <!-- ====== row 1 · bits 31..16 ====== -->
  <g font-size="11" fill="#6b6a5f" text-anchor="middle">
    <text x="100" y="76">31</text><text x="156" y="76">30</text><text x="212" y="76">29</text><text x="268" y="76">28</text>
    <text x="324" y="76">27</text><text x="380" y="76">26</text><text x="436" y="76">25</text><text x="492" y="76">24</text>
    <text x="548" y="76">23</text><text x="604" y="76">22</text><text x="660" y="76">21</text><text x="716" y="76">20</text>
    <text x="772" y="76">19</text><text x="828" y="76">18</text><text x="884" y="76">17</text><text x="940" y="76">16</text>
  </g>

  <!-- [31:24] reserved -->
  <rect x="72" y="84" width="448" height="44" fill="#ffffff" stroke="#d8d4c8"/>
  <g stroke="#eceadf">
    <line x1="128" y1="84" x2="128" y2="100"/><line x1="184" y1="84" x2="184" y2="100"/>
    <line x1="240" y1="84" x2="240" y2="100"/><line x1="296" y1="84" x2="296" y2="100"/>
    <line x1="352" y1="84" x2="352" y2="100"/><line x1="408" y1="84" x2="408" y2="100"/>
    <line x1="464" y1="84" x2="464" y2="100"/>
  </g>
  <!-- [23:16] BAUD_DIV -->
  <rect x="520" y="84" width="448" height="44" fill="#e2ecf5" stroke="#d8d4c8"/>
  <rect x="520" y="84" width="448" height="4" fill="#6a9bcc"/>
  <g stroke="#d6e3f0">
    <line x1="576" y1="88" x2="576" y2="100"/><line x1="632" y1="88" x2="632" y2="100"/>
    <line x1="688" y1="88" x2="688" y2="100"/><line x1="744" y1="88" x2="744" y2="100"/>
    <line x1="800" y1="88" x2="800" y2="100"/><line x1="856" y1="88" x2="856" y2="100"/>
    <line x1="912" y1="88" x2="912" y2="100"/>
  </g>
  <text x="296" y="112" font-size="12" fill="#8c8a7d" text-anchor="middle">&#8212;</text>
  <text x="744" y="112" font-size="12" font-weight="600" fill="#4a7bab" text-anchor="middle">BAUD_DIV</text>

  <!-- ====== row 2 · bits 15..0 ====== -->
  <g font-size="11" fill="#6b6a5f" text-anchor="middle">
    <text x="100" y="156">15</text><text x="156" y="156">14</text><text x="212" y="156">13</text><text x="268" y="156">12</text>
    <text x="324" y="156">11</text><text x="380" y="156">10</text><text x="436" y="156">9</text><text x="492" y="156">8</text>
    <text x="548" y="156">7</text><text x="604" y="156">6</text><text x="660" y="156">5</text><text x="716" y="156">4</text>
    <text x="772" y="156">3</text><text x="828" y="156">2</text><text x="884" y="156">1</text><text x="940" y="156">0</text>
  </g>

  <!-- [15:12] reserved -->
  <rect x="72" y="164" width="224" height="44" fill="#ffffff" stroke="#d8d4c8"/>
  <g stroke="#eceadf">
    <line x1="128" y1="164" x2="128" y2="180"/><line x1="184" y1="164" x2="184" y2="180"/>
    <line x1="240" y1="164" x2="240" y2="180"/>
  </g>
  <!-- [11:10] PARITY -->
  <rect x="296" y="164" width="112" height="44" fill="#e5e9dd" stroke="#d8d4c8"/>
  <rect x="296" y="164" width="112" height="4" fill="#788c5d"/>
  <line x1="352" y1="168" x2="352" y2="180" stroke="#e0e5d4"/>
  <!-- [9] STOP -->
  <rect x="408" y="164" width="56" height="44" fill="#f0e4d8" stroke="#d8d4c8"/>
  <rect x="408" y="164" width="56" height="4" fill="#c9913f"/>
  <!-- [8] DATA8 -->
  <rect x="464" y="164" width="56" height="44" fill="#f0e4d8" stroke="#d8d4c8"/>
  <rect x="464" y="164" width="56" height="4" fill="#c9913f"/>
  <!-- [7:4] FIFO_TH -->
  <rect x="520" y="164" width="224" height="44" fill="#e2ecf5" stroke="#d8d4c8"/>
  <rect x="520" y="164" width="224" height="4" fill="#6a9bcc"/>
  <g stroke="#d6e3f0">
    <line x1="576" y1="168" x2="576" y2="180"/><line x1="632" y1="168" x2="632" y2="180"/>
    <line x1="688" y1="168" x2="688" y2="180"/>
  </g>
  <!-- [3:2] reserved -->
  <rect x="744" y="164" width="112" height="44" fill="#ffffff" stroke="#d8d4c8"/>
  <line x1="800" y1="164" x2="800" y2="180" stroke="#eceadf"/>
  <!-- [1] TX_EN -->
  <rect x="856" y="164" width="56" height="44" fill="#f7e4dc" stroke="#d8d4c8"/>
  <rect x="856" y="164" width="56" height="4" fill="#d97757"/>
  <!-- [0] RX_EN · focus -->
  <rect x="912" y="164" width="56" height="44" fill="#fbeee7" stroke="#d97757" stroke-width="1.5"/>
  <rect x="912" y="164" width="56" height="4" fill="#d97757"/>

  <g font-size="12" font-weight="600" text-anchor="middle">
    <text x="184" y="192" font-weight="400" fill="#8c8a7d">&#8212;</text>
    <text x="352" y="192" fill="#5d7045">PARITY</text>
    <text x="436" y="192" fill="#8a5a2a">STOP</text>
    <text x="492" y="192" fill="#8a5a2a">DATA8</text>
    <text x="632" y="192" fill="#4a7bab">FIFO_TH</text>
    <text x="800" y="192" font-weight="400" fill="#8c8a7d">&#8212;</text>
    <text x="884" y="192" fill="#c2613f">TX_EN</text>
    <text x="940" y="192" fill="#c2613f">RX_EN</text>
  </g>

  <!-- ====== legend: key fields ====== -->
  <line x1="72" y1="232" x2="968" y2="232" stroke="#eceadf"/>

  <circle cx="76" cy="256" r="4" fill="#6a9bcc"/>
  <text x="88" y="260" font-size="12" font-weight="600" fill="#141413">BAUD_DIV</text>
  <rect x="168" y="248" width="32" height="16" rx="8" fill="#141413"/>
  <text x="184" y="260" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">RW</text>
  <text x="208" y="260" font-size="11.5" fill="#6b6a5f">bits 23:16 &#183; baud = PCLK / (16 &#183; div)</text>

  <circle cx="76" cy="288" r="4" fill="#788c5d"/>
  <text x="88" y="292" font-size="12" font-weight="600" fill="#141413">PARITY</text>
  <rect x="168" y="280" width="32" height="16" rx="8" fill="#141413"/>
  <text x="184" y="292" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">RW</text>
  <text x="208" y="292" font-size="11.5" fill="#6b6a5f">bits 11:10 &#183; 00 none &#183; 01 even &#183; 10 odd</text>

  <circle cx="540" cy="256" r="4" fill="#c9913f"/>
  <text x="552" y="260" font-size="12" font-weight="600" fill="#141413">DATA8</text>
  <rect x="632" y="248" width="32" height="16" rx="8" fill="#141413"/>
  <text x="648" y="260" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">RW</text>
  <text x="672" y="260" font-size="11.5" fill="#6b6a5f">bit 8 &#183; 1 = 8 data bits &#183; 0 = 7 data bits</text>

  <circle cx="540" cy="288" r="4" fill="#d97757"/>
  <text x="552" y="292" font-size="12" font-weight="600" fill="#141413">RX_EN</text>
  <rect x="632" y="280" width="32" height="16" rx="8" fill="#141413"/>
  <text x="648" y="292" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">RW</text>
  <text x="672" y="292" font-size="11.5" fill="#6b6a5f">bit 0 &#183; receiver enable &#183; 1 at reset</text>
</svg>
