  <circle cx="322" cy="217" r="3.5" fill="#d97757"/>
  <text x="334" y="221" font-size="12.5" font-weight="600" fill="#141413">Orchestrator</text>
  <text x="334" y="237" font-size="9.5" fill="#6b6a5f">plan · collect · merge</text>
  <rect x="552" y="202" width="232" height="44" rx="8" fill="#ffffff" stroke="#e3e0d4"/>
  <circle cx="568" cy="217" r="3.5" fill="#d97757"/>
  <text x="580" y="221" font-size="12.5" font-weight="600" fill="#141413">Gateway</text>
  <text x="580" y="237" font-size="9.5" fill="#6b6a5f">tool calls · rate limits</text>
  <rect x="798" y="202" width="232" height="44" rx="8" fill="#ffffff" stroke="#e3e0d4"/>
  <circle cx="814" cy="217" r="3.5" fill="#d97757"/>
  <text x="826" y="221" font-size="12.5" font-weight="600" fill="#141413">Guard</text>
  <text x="826" y="237" font-size="9.5" fill="#6b6a5f">allow · deny · confirm</text>

  <line x1="540" y1="260" x2="540" y2="276" stroke="#d97757" stroke-width="1.8"/>
  <polygon points="540,282 534,273 546,273" fill="#d97757"/>
  <circle cx="566" cy="271" r="9" fill="#d97757"/>
  <text x="566" y="275" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">2</text>

  <!-- Layer 3: DOMAIN (olive) -->
  <rect x="36" y="284" width="1008" height="92" rx="10" fill="#e5e9dd" stroke="#ccd3bd"/>
  <rect x="36" y="284" width="4" height="92" rx="2" fill="#788c5d"/>
  <circle cx="62" cy="306" r="4" fill="#788c5d"/>
  <text x="74" y="310" font-size="10.5" font-weight="600" letter-spacing="1.2" fill="#5d7045">DOMAIN</text>
  <text x="1024" y="310" text-anchor="end" font-size="10" font-style="italic" fill="#8c8a7d">business logic</text>
  <rect x="60" y="322" width="232" height="44" rx="8" fill="#ffffff" stroke="#e3e0d4"/>
  <circle cx="76" cy="337" r="3.5" fill="#788c5d"/>
  <text x="88" y="341" font-size="12.5" font-weight="600" fill="#141413">Billing</text>
  <text x="88" y="357" font-size="9.5" fill="#6b6a5f">invoices · ledger</text>
  <rect x="306" y="322" width="232" height="44" rx="8" fill="#ffffff" stroke="#e3e0d4"/>
  <circle cx="322" cy="337" r="3.5" fill="#788c5d"/>
  <text x="334" y="341" font-size="12.5" font-weight="600" fill="#141413">Catalog</text>
  <text x="334" y="357" font-size="9.5" fill="#6b6a5f">products · pricing</text>
  <rect x="552" y="322" width="232" height="44" rx="8" fill="#ffffff" stroke="#e3e0d4"/>
  <circle cx="568" cy="337" r="3.5" fill="#788c5d"/>
  <text x="580" y="341" font-size="12.5" font-weight="600" fill="#141413">Identity</text>
  <text x="580" y="357" font-size="9.5" fill="#6b6a5f">accounts · roles</text>
  <rect x="798" y="322" width="232" height="44" rx="8" fill="#ffffff" stroke="#e3e0d4"/>
  <circle cx="814" cy="337" r="3.5" fill="#788c5d"/>
  <text x="826" y="341" font-size="12.5" font-weight="600" fill="#141413">Reporting</text>
  <text x="826" y="357" font-size="9.5" fill="#6b6a5f">rollups · exports</text>

  <line x1="540" y1="380" x2="540" y2="396" stroke="#d97757" stroke-width="1.8"/>
  <polygon points="540,402 534,393 546,393" fill="#d97757"/>
  <circle cx="566" cy="391" r="9" fill="#d97757"/>
  <text x="566" y="395" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">3</text>

  <!-- Layer 4: INFRASTRUCTURE (ink) -->
  <rect x="36" y="404" width="1008" height="92" rx="10" fill="#e7e4d9" stroke="#cfccc0"/>
  <rect x="36" y="404" width="4" height="92" rx="2" fill="#141413"/>
  <circle cx="62" cy="426" r="4" fill="#141413"/>
  <text x="74" y="430" font-size="10.5" font-weight="600" letter-spacing="1.2" fill="#141413">INFRASTRUCTURE</text>
  <text x="1024" y="430" text-anchor="end" font-size="10" font-style="italic" fill="#8c8a7d">runtime substrate</text>
  <rect x="60" y="442" width="232" height="44" rx="8" fill="#ffffff" stroke="#e3e0d4"/>
  <circle cx="76" cy="457" r="3.5" fill="#141413"/>
  <text x="88" y="461" font-size="12.5" font-weight="600" fill="#141413">Database</text>
  <text x="88" y="477" font-size="9.5" fill="#6b6a5f">Postgres cluster</text>
  <rect x="306" y="442" width="232" height="44" rx="8" fill="#ffffff" stroke="#e3e0d4"/>
  <circle cx="322" cy="457" r="3.5" fill="#141413"/>
  <text x="334" y="461" font-size="12.5" font-weight="600" fill="#141413">Storage</text>
  <text x="334" y="477" font-size="9.5" fill="#6b6a5f">objects · backups</text>
  <rect x="552" y="442" width="232" height="44" rx="8" fill="#ffffff" stroke="#e3e0d4"/>
  <circle cx="568" cy="457" r="3.5" fill="#141413"/>
  <text x="580" y="461" font-size="12.5" font-weight="600" fill="#141413">Network</text>
  <text x="580" y="477" font-size="9.5" fill="#6b6a5f">LB · CDN · DNS</text>
  <rect x="798" y="442" width="232" height="44" rx="8" fill="#ffffff" stroke="#e3e0d4"/>
  <circle cx="814" cy="457" r="3.5" fill="#141413"/>
  <text x="826" y="461" font-size="12.5" font-weight="600" fill="#141413">Queue</text>
  <text x="826" y="477" font-size="9.5" fill="#6b6a5f">async jobs</text>
