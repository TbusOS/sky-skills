<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 520" font-family="Poppins, 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif" role="img" aria-label="Layered architecture: four tinted groups with a numbered request path">
  <defs>
    <linearGradient id="arch-stage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#faf9f5"/><stop offset="1" stop-color="#f5f3ea"/>
    </linearGradient>
    <pattern id="arch-dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1" fill="#141413" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1080" height="520" rx="12" fill="url(#arch-stage)"/>
  <rect width="1080" height="520" rx="12" fill="url(#arch-dots)"/>

  <!-- Layer 1: PRESENTATION (blue) -->
  <rect x="36" y="44" width="1008" height="92" rx="10" fill="#e2ecf5" stroke="#c4d5e6"/>
  <rect x="36" y="44" width="4" height="92" rx="2" fill="#6a9bcc"/>
  <circle cx="62" cy="66" r="4" fill="#6a9bcc"/>
  <text x="74" y="70" font-size="10.5" font-weight="600" letter-spacing="1.2" fill="#4a7bab">PRESENTATION</text>
  <text x="1024" y="70" text-anchor="end" font-size="10" font-style="italic" fill="#8c8a7d">user-facing surfaces</text>
  <rect x="60" y="82" width="232" height="44" rx="8" fill="#ffffff" stroke="#e3e0d4"/>
  <circle cx="76" cy="97" r="3.5" fill="#6a9bcc"/>
  <text x="88" y="101" font-size="12.5" font-weight="600" fill="#141413">Web</text>
  <text x="88" y="117" font-size="9.5" fill="#6b6a5f">browser client</text>
  <rect x="306" y="82" width="232" height="44" rx="8" fill="#ffffff" stroke="#e3e0d4"/>
  <circle cx="322" cy="97" r="3.5" fill="#6a9bcc"/>
  <text x="334" y="101" font-size="12.5" font-weight="600" fill="#141413">Mobile</text>
  <text x="334" y="117" font-size="9.5" fill="#6b6a5f">iOS · Android</text>
  <rect x="552" y="82" width="232" height="44" rx="8" fill="#ffffff" stroke="#e3e0d4"/>
  <circle cx="568" cy="97" r="3.5" fill="#6a9bcc"/>
  <text x="580" y="101" font-size="12.5" font-weight="600" fill="#141413">CLI</text>
  <text x="580" y="117" font-size="9.5" fill="#6b6a5f">terminal tools</text>
  <rect x="798" y="82" width="232" height="44" rx="8" fill="#ffffff" stroke="#e3e0d4"/>
  <circle cx="814" cy="97" r="3.5" fill="#6a9bcc"/>
