  <text x="826" y="117" font-size="9.5" fill="#6b6a5f">REST · SDK</text>

  <line x1="540" y1="140" x2="540" y2="156" stroke="#d97757" stroke-width="1.8"/>
  <polygon points="540,162 534,153 546,153" fill="#d97757"/>
  <circle cx="566" cy="151" r="9" fill="#d97757"/>
  <text x="566" y="155" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">1</text>

