  <circle cx="76" cy="217" r="3.5" fill="#d97757"/>
  <text x="88" y="221" font-size="12.5" font-weight="600" fill="#141413">Router</text>
  <text x="88" y="237" font-size="9.5" fill="#6b6a5f">match &amp; dispatch</text>
